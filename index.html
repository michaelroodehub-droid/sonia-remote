<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sonia</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
 
:root{
  --bg:#000000;
  --text:#ffffff;
  --sub:rgba(255,255,255,0.45);
  --line:rgba(255,255,255,0.12);
  --line-hi:rgba(255,255,255,0.3);
  --orb-idle:#8844ff;
  --orb-listen:#ff2266;
  --orb-think:#2299ff;
  --orb-speak:#00ffaa;
  --green:#00ff88;
  --sans:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
  --nav-h:64px;
  --top-h:56px;
  --status-h:32px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
 
html,body{
  height:100%;width:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}
 
/* ── SETUP ── */
#setup{
  position:fixed;inset:0;z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);padding:32px 24px;
  padding-top:calc(var(--safe-top) + 32px);
  overflow-y:auto;
}
.setup-inner{width:100%;max-width:420px}
.setup-name{font-family:var(--mono);font-size:2.8rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:4px;color:var(--text)}
.setup-sub{font-family:var(--mono);font-size:0.72rem;letter-spacing:0.2em;color:var(--text);opacity:0.7;text-transform:uppercase;margin-bottom:40px}
.sf{margin-bottom:18px}
.sf label{display:block;font-family:var(--mono);font-size:0.68rem;letter-spacing:0.18em;color:var(--text);opacity:0.8;text-transform:uppercase;margin-bottom:8px}
.sf input{
  width:100%;background:transparent;border:none;border-bottom:1px solid var(--line-hi);
  color:var(--text);font-family:var(--mono);font-size:0.95rem;
  padding:12px 0;outline:none;transition:border-color 0.2s;border-radius:0;
}
.sf input:focus{border-bottom-color:var(--text)}
.sf input::placeholder{color:var(--text);opacity:0.4}
#setupBtn{
  width:100%;margin-top:32px;background:transparent;
  border:1px solid var(--line-hi);color:var(--text);
  font-family:var(--mono);font-size:0.85rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;padding:18px;cursor:pointer;
  transition:border-color 0.2s;
}
#setupBtn:hover{border-color:var(--text)}
#setupBtn:active{opacity:0.7}
 
/* ── APP SHELL ── */
#app{
  display:flex;flex-direction:column;
  position:fixed;inset:0;
  padding-top:var(--safe-top);
  background:var(--bg);
}
 
/* ── TOP BAR ── */
#topBar{
  height:var(--top-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.top-left{display:flex;align-items:center;gap:14px}
.top-name{font-family:var(--mono);font-weight:700;font-size:1.05rem;letter-spacing:0.05em;color:var(--text)}
 
/* ── ORB ── */
#orb{
  width:28px;height:28px;border-radius:50%;
  background:var(--orb-idle);
  border:none;flex-shrink:0;cursor:default;
  transition:background 0.4s ease,box-shadow 0.4s ease;
}
#orb.listening{background:var(--orb-listen);animation:orbPulse 0.6s ease-in-out infinite alternate}
#orb.thinking{background:var(--orb-think);animation:orbPulse 1.2s ease-in-out infinite alternate}
#orb.speaking{background:var(--orb-speak);animation:orbBreathe 0.8s ease-in-out infinite alternate}
#orb.syncing{background:var(--green);box-shadow:0 0 18px var(--green);animation:orbBreathe 1s ease-in-out infinite alternate}
@keyframes orbPulse{from{transform:scale(0.85);filter:brightness(0.9)}to{transform:scale(1.15);filter:brightness(1.3)}}
@keyframes orbBreathe{from{transform:scale(0.9);filter:brightness(1)}to{transform:scale(1.1);filter:brightness(1.5)}}
 
.top-right{display:flex;align-items:center;gap:12px}
#modeBtn{
  width:34px;height:34px;border-radius:50%;
  background:transparent;border:1px solid var(--line);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text);opacity:0.8;transition:opacity 0.2s;
}
#modeBtn:hover{opacity:1}
 
/* ── PANELS ── */
#panels{flex:1;overflow:hidden;position:relative;min-height:0}
.panel{position:absolute;inset:0;display:none;flex-direction:column;opacity:0;transition:opacity 0.2s ease}
.panel.active{display:flex;opacity:1}
 
/* ── STATUS STRIP ── */
#statusStrip{
  height:var(--status-h);
  border-top:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
  padding:0 20px;flex-shrink:0;
}
#presenceDot{width:6px;height:6px;border-radius:50%;background:var(--text);opacity:0.4;flex-shrink:0;transition:background 0.3s,box-shadow 0.3s}
#presenceDot.online{background:#00d47e;box-shadow:0 0 6px #00d47e;opacity:1}
#presenceDot.thinking{background:var(--orb-think);box-shadow:0 0 6px var(--orb-think);opacity:1}
#presenceDot.listening{background:var(--orb-listen);box-shadow:0 0 6px var(--orb-listen);opacity:1}
#presenceDot.syncing{background:var(--green);box-shadow:0 0 8px var(--green);opacity:1}
#statusTxt{font-family:var(--mono);font-size:0.65rem;color:var(--text);opacity:0.75;text-transform:uppercase;letter-spacing:0.1em}
#statusStrip.syncing #statusTxt{color:var(--green);opacity:1}
 
/* ── BOTTOM NAV ── */
#bottomNav{
  height:calc(var(--nav-h) + var(--safe-bot));
  padding-bottom:var(--safe-bot);
  border-top:1px solid var(--line);
  display:flex;align-items:stretch;flex-shrink:0;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  cursor:pointer;border:none;background:none;
  color:var(--text);opacity:0.5;
  font-family:var(--mono);font-size:0.6rem;
  letter-spacing:0.1em;text-transform:uppercase;font-weight:700;
  transition:opacity 0.2s,color 0.2s;
  border-right:1px solid var(--line);padding:0;
}
.nav-item:last-child{border-right:none}
.nav-item svg{width:18px;height:18px;fill:currentColor;transition:transform 0.2s}
.nav-item.active{opacity:1}
.nav-item.active svg{transform:scale(1.05)}
/* Tron green when syncing */
#bottomNav.syncing .nav-item{color:var(--green);opacity:0.5}
#bottomNav.syncing .nav-item.active{opacity:1}
 
/* ── CHAT PANEL ── */
#chatLog{
  flex:1;overflow-y:auto;
  padding:24px 20px 16px;
  display:flex;flex-direction:column;gap:0;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scroll-behavior:smooth;
}
.msg{display:flex;flex-direction:column;margin-bottom:22px;animation:msgIn 0.2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-who{
  font-family:var(--mono);font-size:0.62rem;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--text);opacity:0.6;
  margin-bottom:6px;font-weight:700;
}
.msg.user .msg-who{text-align:right}
.msg-text{font-family:var(--sans);font-size:1.05rem;line-height:1.65;font-weight:500;color:var(--text)}
.msg.user .msg-text{text-align:right;opacity:0.85}
.thinking-dots{display:flex;gap:5px;align-items:center;padding:4px 0}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--text);opacity:0.4;animation:dot 1.2s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,80%,100%{opacity:0.2;transform:scale(0.7)}40%{opacity:0.9;transform:scale(1)}}
 
/* ── CHAT INPUT ── */
#chatInputWrap{
  flex-shrink:0;
  border-top:1px solid var(--line);
  padding:12px 20px;
  display:flex;align-items:flex-end;gap:12px;
}
#chatBox{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--sans);font-size:1rem;
  resize:none;max-height:120px;line-height:1.55;
  padding:0;overflow-y:auto;font-weight:500;
  caret-color:var(--text);
}
#chatBox::placeholder{color:var(--text);opacity:0.45}
#micBtn{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:transparent;border:1px solid var(--line);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text);opacity:0.7;transition:opacity 0.2s,border-color 0.2s,color 0.2s;
  align-self:flex-end;
}
#micBtn:hover{opacity:1}
#micBtn.active{opacity:1;border-color:var(--orb-listen);color:var(--orb-listen)}
#sendBtn{
  width:34px;height:34px;flex-shrink:0;border-radius:50%;
  background:transparent;border:1px solid var(--line);
  color:var(--text);opacity:0.7;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.2s;align-self:flex-end;
}
#sendBtn:hover{opacity:1}
#sendBtn:active{opacity:0.4}
#sendBtn svg{width:14px;height:14px;fill:currentColor;margin-left:2px}
 
/* ── PANEL CONTENT ── */
.panel-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px;overscroll-behavior:contain}
.panel-head{margin-bottom:28px}
.panel-title{font-family:var(--mono);font-weight:700;font-size:1.4rem;letter-spacing:-0.01em;margin-bottom:4px;color:var(--text)}
.panel-sub{font-family:var(--mono);font-size:0.65rem;letter-spacing:0.15em;color:var(--text);opacity:0.65;text-transform:uppercase}
 
.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.pill{
  background:transparent;border:1px solid var(--line-hi);
  color:var(--text);opacity:0.8;
  font-family:var(--mono);font-size:0.72rem;
  font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  padding:10px 18px;cursor:pointer;transition:opacity 0.2s,border-color 0.2s;
  white-space:nowrap;border-radius:0;
}
.pill:hover{opacity:1}
.pill:active{opacity:0.4}
.pill.primary{opacity:1;border-color:var(--text)}
.pill.success{border-color:#00d47e;color:#00d47e;opacity:1}
.pill.danger{border-color:#ff3d5a;color:#ff3d5a;opacity:1}
 
.mem-card,.note-card{border-top:1px solid var(--line);padding:16px 0}
.card-ts{font-family:var(--mono);font-size:0.62rem;color:var(--text);opacity:0.6;margin-bottom:8px;letter-spacing:0.08em}
.card-text{font-size:0.95rem;line-height:1.6;color:var(--text);font-weight:500}
.empty-state{font-family:var(--mono);font-size:0.75rem;color:var(--text);opacity:0.5;padding:32px 0;letter-spacing:0.08em}
 
#noteBox{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid var(--line);
  color:var(--text);font-family:var(--sans);font-size:1rem;
  padding:12px 0;outline:none;resize:none;min-height:100px;
  margin-bottom:18px;line-height:1.6;border-radius:0;font-weight:500;
}
#noteBox::placeholder{color:var(--text);opacity:0.4}
#driveHint{font-family:var(--mono);font-size:0.72rem;color:#ff3d5a;padding:12px 0;margin-bottom:18px;display:none}
 
.now-playing{font-family:var(--mono);font-size:0.78rem;color:var(--text);opacity:0.85;margin-bottom:20px;min-height:20px;letter-spacing:0.06em;font-weight:700}
.station-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;border:1px solid var(--line)}
.station-card{background:var(--bg);padding:16px 14px;cursor:pointer;transition:background 0.15s;border:none}
.station-card:active,.station-card.playing{background:rgba(255,255,255,0.06)}
.st-name{font-family:var(--mono);font-size:0.82rem;font-weight:700;display:block;margin-bottom:3px;color:var(--text)}
.st-loc{font-family:var(--mono);font-size:0.62rem;color:var(--text);opacity:0.6;display:block}
 
/* ── EMAIL OVERLAY ── */
#emailOverlay{
  position:fixed;inset:0;background:var(--bg);
  z-index:200;display:none;flex-direction:column;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bot);
}
#emailOverlay.on{display:flex}
.email-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px 40px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-family:var(--mono);font-size:0.65rem;letter-spacing:0.15em;color:var(--text);opacity:0.75;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.form-group input,.form-group textarea{
  width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);
  color:var(--text);font-family:var(--sans);font-size:1rem;
  padding:12px 0;outline:none;border-radius:0;transition:border-color 0.2s;font-weight:500;
}
.form-group input:focus,.form-group textarea:focus{border-bottom-color:var(--line-hi)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text);opacity:0.4}
#emailHeader{
  height:var(--top-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:1px solid var(--line);flex-shrink:0;
}
.email-title{font-family:var(--mono);font-weight:700;font-size:1rem;letter-spacing:0.05em;color:var(--text)}
#emailBackBtn{
  width:34px;height:34px;border-radius:50%;background:transparent;
  border:1px solid var(--line);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--text);opacity:0.8;
}
.form-group textarea{min-height:160px;resize:none;line-height:1.6}
#emailStatus{font-family:var(--mono);font-size:0.72rem;color:var(--text);opacity:0.75;margin-top:8px;min-height:18px}
 
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line)}
 
@supports (height:100dvh){html,body,#app{height:100dvh}}
</style>
</head>
<body>
 
<div id="setup">
  <div class="setup-inner">
    <div class="setup-name">Sonia</div>
    <div class="setup-sub">Remote Terminal</div>
    <div class="sf"><label>Groq API Key</label><input type="password" id="cfgGroq" placeholder="gsk_…" autocomplete="off"></div>
    <div class="sf"><label>Google OAuth Client ID</label><input type="text" id="cfgClient" placeholder="xxxx.apps.googleusercontent.com" autocomplete="off"></div>
    <div class="sf"><label>Your Name</label><input type="text" id="cfgOwner" placeholder="Mr H" autocomplete="off" value="Mr H"></div>
    <div class="sf"><label>Drive Folder ID (optional)</label><input type="text" id="cfgFolder" placeholder="15_CaTpcDxfu…" autocomplete="off"></div>
    <div class="sf"><label>NASA API Key (optional)</label><input type="text" id="cfgNasa" placeholder="your NASA key…" autocomplete="off"></div>
    <div class="sf"><label>Wolfram App ID (optional)</label><input type="text" id="cfgWolfram" placeholder="XXXX-XXXXXXXXXX" autocomplete="off"></div>
    <button id="setupBtn">Launch</button>
  </div>
</div>
 
<div id="app">
  <header id="topBar">
    <div class="top-left">
      <div id="orb"></div>
      <div class="top-name">Sonia</div>
    </div>
    <div class="top-right">
      <button id="modeBtn" title="Toggle theme">◐</button>
    </div>
  </header>
 
  <div id="panels">
 
    <div class="panel active" id="chatPanel">
      <div id="chatLog"></div>
      <div id="chatInputWrap">
        <textarea id="chatBox" rows="1" placeholder="Message Sonia…"></textarea>
        <button id="micBtn" title="Voice input">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <button id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
 
    <div class="panel" id="memPanel">
      <div class="panel-scroll">
        <div class="panel-head"><div class="panel-title">Mind</div><div class="panel-sub">Shared memory log</div></div>
        <div class="btn-row"><button class="pill" id="memRefresh">↺ Sync</button></div>
        <div id="memList"><div class="empty-state">No memory loaded yet</div></div>
      </div>
    </div>
 
    <div class="panel" id="notesPanel">
      <div class="panel-scroll">
        <div class="panel-head"><div class="panel-title">Notes</div><div class="panel-sub">Synced to Drive</div></div>
        <textarea id="noteBox" placeholder="Write a note…"></textarea>
        <div class="btn-row">
          <button class="pill primary" id="sendNote">Save</button>
          <button class="pill" id="driveBtn">Mount Drive</button>
        </div>
        <div id="driveHint">Client ID not set — Drive sync unavailable.</div>
        <div class="panel-sub" style="margin-bottom:12px">Saved</div>
        <div id="notesList"><div class="empty-state">No notes yet</div></div>
      </div>
    </div>
 
    <div class="panel" id="radioPanel">
      <div class="panel-scroll">
        <div class="panel-head"><div class="panel-title">Radio</div><div class="panel-sub">Live streams</div></div>
        <div class="now-playing" id="nowPlaying"></div>
        <div class="btn-row"><button class="pill danger" id="radioStop" style="display:none">■ Stop</button></div>
        <div class="station-grid" id="stationGrid"></div>
        <audio id="radioPlayer" preload="none"></audio>
      </div>
    </div>
 
    <div id="emailOverlay">
      <div id="emailHeader">
        <button id="emailBackBtn">←</button>
        <div class="email-title">New Email</div>
        <button class="pill primary" id="emailSendBtn" style="padding:8px 16px;font-size:0.68rem">Send</button>
      </div>
      <div class="email-scroll">
        <div class="form-group"><label>To</label><input type="email" id="emailTo" placeholder="recipient@domain.com" autocomplete="off" inputmode="email"></div>
        <div class="form-group"><label>Subject</label><input type="text" id="emailSubject" placeholder="Subject line…"></div>
        <div class="form-group"><label>Message</label><textarea id="emailBody" style="min-height:180px" placeholder="Write your message…"></textarea></div>
        <div id="emailStatus"></div>
      </div>
    </div>
 
  </div>
 
  <div id="statusStrip">
    <div id="presenceDot"></div>
    <span id="statusTxt">idle</span>
  </div>
 
  <nav id="bottomNav">
    <button class="nav-item active" data-panel="chatPanel" data-label="Chat">
      <svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>Chat
    </button>
    <button class="nav-item" data-panel="memPanel" data-label="Mind">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7zm0 2c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5zm-3 13h6v1H9v-1z"/></svg>Mind
    </button>
    <button class="nav-item" data-panel="notesPanel" data-label="Notes">
      <svg viewBox="0 0 24 24"><path d="M14 2H6C4.9 2 4 2.9 4 4v16c0 1.1.89 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>Notes
    </button>
    <button class="nav-item" data-panel="radioPanel" data-label="Radio">
      <svg viewBox="0 0 24 24"><path d="M20 6.54V4c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-9.46c.58-.35 1-.99 1-1.73 0-.74-.42-1.38-1-1.73V8c1.1 0 2-.9 2-2s-.9-2-2-2v.54zm-9 11.96c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zM4 8h14V5H4v3z"/></svg>Radio
    </button>
    <button class="nav-item" id="mailTab" data-label="Mail">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>Mail
    </button>
  </nav>
</div>
 
<script>
const LS={get:k=>localStorage.getItem('s_'+k),set:(k,v)=>localStorage.setItem('s_'+k,v)};
 
let GROQ_KEY='',CLIENT_ID='',OWNER_NAME='Mr H',FOLDER_ID='',NASA_KEY='',WOLFRAM_ID='',driveToken=null;

/* ── MOOD PARSER ── */
function parseMood(raw){
  const m=raw.match(/\[mood\s*:\s*([a-z]+)\s*\]/i);
  let mood='calm';
  if(m){const t=m[1].toLowerCase();mood=VALID_MOODS.includes(t)?t:(MOOD_MAP[t]||'calm');}
  const text=raw.replace(/\[mood\s*:\s*[a-z]*\s*\]/gi,'').replace(/[\r\n]+/g,' ').replace(/\s{2,}/g,' ').trim();
  return{mood,text};
}

}
 
/* ── NASA API ── */
const NASA_INTENTS = /\b(nasa|apod|astronomy picture|picture of the day|asteroid|near earth|iss|international space station|mars rover|space photo|space image|hubble)\b/i;
const ISS_INTENT   = /\b(where is the iss|iss location|space station location|where.{0,10}space station)\b/i;
const NEO_INTENT   = /\b(asteroid|near earth object|space rock|neos?)\b/i;
const ROVER_INTENT = /\b(mars rover|curiosity|perseverance|mars photo|mars image)\b/i;
 
async function fetchAPOD() {
  try {
    const res = await fetch(`https://api.nasa.gov/planetary/apod?api_key=${NASA_KEY}`);
    const d = await res.json();
    return `Today's NASA Astronomy Picture of the Day: "${d.title}". ${d.explanation.split('.').slice(0,2).join('.')}.`;
  } catch(e) { return null; }
}
async function fetchISS() {
  try {
    const res = await fetch('https://api.open-notify.org/iss-now.json');
    const d = await res.json();
    const crew = await fetch('https://api.open-notify.org/astros.json').then(r=>r.json()).catch(()=>null);
    const pos = `The ISS is currently at latitude ${parseFloat(d.iss_position.latitude).toFixed(2)}°, longitude ${parseFloat(d.iss_position.longitude).toFixed(2)}°.`;
    const aboard = crew ? ` There are currently ${crew.number} people aboard.` : '';
    return pos + aboard;
  } catch(e) { return null; }
}
async function fetchNEO() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const res = await fetch(`https://api.nasa.gov/neo/rest/v1/feed?start_date=${today}&end_date=${today}&api_key=${NASA_KEY}`);
    const d = await res.json();
    const neos = d.near_earth_objects[today] || [];
    if (!neos.length) return 'No notable near-Earth asteroids tracked today.';
    const closest = neos.sort((a,b) => parseFloat(a.close_approach_data[0].miss_distance.kilometers) - parseFloat(b.close_approach_data[0].miss_distance.kilometers))[0];
    const dist = Math.round(parseFloat(closest.close_approach_data[0].miss_distance.kilometers)).toLocaleString();
    const size = Math.round(parseFloat(closest.estimated_diameter.meters.estimated_diameter_max));
    const hazard = closest.is_potentially_hazardous_asteroid ? ' It is flagged as potentially hazardous.' : '';
    return `Closest asteroid today: ${closest.name}, passing at ${dist} km, roughly ${size} metres wide.${hazard}`;
  } catch(e) { return null; }
}
async function fetchMarsRover() {
  try {
    const res = await fetch(`https://api.nasa.gov/mars-photos/api/v1/rovers/curiosity/latest_photos?api_key=${NASA_KEY}`);
    const d = await res.json();
    const photos = d.latest_photos || [];
    if (!photos.length) return 'No recent Mars rover photos available.';
    const p = photos[0];
    return `Latest Mars photo from Curiosity rover, taken on Sol ${p.sol} (${p.earth_date}), using the ${p.camera.full_name}. Image: ${p.img_src}`;
  } catch(e) { return null; }
}
 
async function handleNASA(text) {
  let fact = null;
  if (ISS_INTENT.test(text))        fact = await fetchISS();
  else if (NEO_INTENT.test(text))   fact = await fetchNEO();
  else if (ROVER_INTENT.test(text)) fact = await fetchMarsRover();
  else                               fact = await fetchAPOD();
  return fact;
}
 
/* ── WIKIPEDIA API ── */
const WIKI_INTENT = /\b(what is|who is|tell me about|wikipedia|explain|define|what was|who was)\b.{0,60}$/i;
 
async function fetchWikipedia(query) {
  try {
    const clean = query.replace(/\b(what is|who is|tell me about|explain|define|what was|who was|wikipedia)\b/gi,'').trim();
    const search = encodeURIComponent(clean);
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${search}`);
    if (!res.ok) {
      const sr = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${search}&format=json&origin=*&srlimit=1`);
      const sd = await sr.json();
      const title = sd?.query?.search?.[0]?.title;
      if (!title) return null;
      const pr = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
      if (!pr.ok) return null;
      const pd = await pr.json();
      return pd.extract ? pd.extract.split('.').slice(0,2).join('.')+'.': null;
    }
    const d = await res.json();
    return d.extract ? d.extract.split('.').slice(0,2).join('.')+'.': null;
  } catch(e) { return null; }
}
 
/* ── WOLFRAM ALPHA ── */
const WOLFRAM_INTENT = /\b(calculate|compute|convert|how many|how far|how long|distance|temperature|speed|mass|weight|solve|what is \d|maths?|math|formula|equation|calories|nutrition|population|height of|age of|size of|orbital|gravity|light year)\b/i;
const SPACE_WOLFRAM  = /\b(planet|moon|star|galaxy|nebula|comet|orbit|light.?year|parsec|solar|milky way|andromeda|black hole|supernova|exoplanet)\b/i;
 
async function fetchWolfram(query) {
  try {
    const q = encodeURIComponent(query);
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`http://api.wolframalpha.com/v1/result?appid=${WOLFRAM_ID}&i=${q}&units=metric`)}`;
    const res = await fetch(proxyUrl);
    const d = await res.json();
    const answer = d.contents?.trim();
    if (!answer || answer.includes('Wolfram|Alpha did not') || answer.length < 2) return null;
    return answer;
  } catch(e) { return null; }
}
 
/* ── SMART INTENT ROUTER ── */
async function routeToExternalAPI(text) {
  const isSpace   = NASA_INTENTS.test(text) || SPACE_WOLFRAM.test(text);
  const isWolfram = WOLFRAM_INTENT.test(text) && !isSpace;
  const isWiki    = WIKI_INTENT.test(text) && !isSpace && !isWolfram;
 
  if (isSpace && NASA_KEY)          return { source: 'nasa',    data: await handleNASA(text) };
  if (isSpace && WOLFRAM_ID)        return { source: 'wolfram', data: await fetchWolfram(text) };
  if (isWolfram && WOLFRAM_ID)      return { source: 'wolfram', data: await fetchWolfram(text) };
  if (isWiki)                        return { source: 'wiki',    data: await fetchWikipedia(text) };
  return null;
}

function detectEmailIntent(t){return /\b(email|e-mail)\b|\b(send|write|draft|compose)\s+(an?\s+)?(email|message)\b/i.test(t);}
async function extractEmailDraft(userText){
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:400,temperature:0.2,
        messages:[{role:'user',content:`Extract email fields. Respond ONLY raw JSON:\n{"to":"","subject":"","body":""}\n\nRequest: "${userText}"`}]})
    });
    const d=await res.json();
    return JSON.parse((d.choices?.[0]?.message?.content||'{}').replace(/```json|```/g,'').trim());
  }catch(e){return{to:'',subject:'',body:''};}
}

async function sendMessage(){
  const text=chatBox.value.trim();
  if(!text||!GROQ_KEY) return;
  chatBox.value=''; chatBox.style.height='auto';
  playTone(880,0.1);
  addMsg('user',text);
 
  if(detectEmailIntent(text)){
    const t=addThinking(); setPresence('thinking'); setStatus('drafting…');
    const draft=await extractEmailDraft(text);
    t.remove(); setPresence('online');
    const wantsSend=/\b(send|send it|go|do it)\s*[.!]?\s*$/i.test(text);
    if(draft.subject&&draft.body&&draft.to&&wantsSend){
      addMsg('sonia','On it — sending now.','focused');
      await sendEmailNow(draft.to,draft.subject,draft.body,true);
    } else {
      addMsg('sonia','Draft overlay ready.','focused');
      openEmailOverlay(draft.to,draft.subject,draft.body);
    }
    return;
  }
 
  const t=addThinking(); setPresence('thinking'); setStatus('thinking…');
  conversationHistory.push({role:'user',content:text});
 
  let externalContext = '';
  try {
    const ext = await routeToExternalAPI(text);
    if (ext && ext.data) {
      externalContext = `\n\nREAL-TIME DATA (${ext.source.toUpperCase()}) — use this naturally in your reply, don't just recite it:\n${ext.data}`;
    }
  } catch(e) {}
 
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:180,temperature:0.85,
        messages:[{role:'system',content:buildSystemPrompt()+externalContext},...conversationHistory]})
    });
    const data=await res.json();
    t.remove(); setPresence('online');
    if(!res.ok){addMsg('sonia','Error: '+(data.error?.message||'Unknown.'),null);return;}
    const raw=data.choices?.[0]?.message?.content||'';
    const parsed=parseMood(raw);
    conversationHistory.push({role:'assistant',content:parsed.text});
    playTone(600,0.15);
    setPresence('speaking');
    addMsg('sonia',parsed.text,parsed.mood);
    setStatus((MOOD_EMOJI[parsed.mood]||'')+' '+parsed.mood);
    setTimeout(()=>setPresence('online'),1400);
  }catch(err){t.remove();setPresence('online');addMsg('sonia','Connection error.',null);}
}
 
/* ── AUDIO ── */
let audioCtx=null;
function playTone(freq,dur){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.connect(g);g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime(0.04,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    osc.start();osc.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
 
/* ── MIC ── */
let recognition=null,micActive=false;
function initMic(){
  const E=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!E){document.getElementById('micBtn').style.opacity='0.15';return false;}
  recognition=new E();
  recognition.continuous=false;recognition.interimResults=false;recognition.lang='en-GB';
  recognition.onstart=()=>{micActive=true;document.getElementById('micBtn').classList.add('active');setPresence('listening');setStatus('listening…');};
  recognition.onend=()=>{micActive=false;document.getElementById('micBtn').classList.remove('active');setPresence('online');setStatus('online · '+OWNER_NAME.toLowerCase());};
  recognition.onresult=e=>{
    const tr=e.results[0][0].transcript;
    if(tr){chatBox.value=tr;chatBox.style.height='auto';chatBox.style.height=Math.min(chatBox.scrollHeight,120)+'px';sendMessage();}
  };
  recognition.onerror=()=>{micActive=false;document.getElementById('micBtn').classList.remove('active');setPresence('online');};
  return true;
}
document.getElementById('micBtn').addEventListener('click',()=>{
  if(!recognition&&!initMic()) return;
  if(micActive){recognition.stop();}
  else{try{recognition.start();}catch(e){recognition=null;if(initMic())try{recognition.start();}catch(e2){}}}
});

/* ── GMAIL ── */
async function sendEmailNow(to,subj,body,silent=false){
  const statusEl=document.getElementById('emailStatus');
  if(!driveToken){if(!silent){statusEl.textContent='Auth required.';statusEl.style.color='#ff3d5a';}return false;}
  try{
    const footer=`\n\nSent via Sonia on behalf of ${OWNER_NAME}`;
    const raw=[`To: ${to}`,`Subject: ${subj}`,'MIME-Version: 1.0','Content-Type: text/plain; charset=utf-8','',body+footer].join('\r\n');
    const encoded=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const res=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
      method:'POST',headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'},
      body:JSON.stringify({raw:encoded})
    });
    if(res.ok){
      if(!silent){statusEl.textContent='Sent.';statusEl.style.color='#00d47e';setTimeout(closeEmailOverlay,1000);}
      else addMsg('sonia','Email sent to '+to,'calm');
      return true;
    }
  }catch(e){if(!silent)statusEl.textContent='Send failed.';}
  return false;
}
document.getElementById('emailSendBtn').addEventListener('click',()=>{
  sendEmailNow(document.getElementById('emailTo').value,document.getElementById('emailSubject').value,document.getElementById('emailBody').value,false);
});
