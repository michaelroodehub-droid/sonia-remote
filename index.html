<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<title>Sonia — Secure Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- MODERN GOOGLE IDENTITY -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#000;
  --surface:#0a0a0a;
  --border:rgba(255,255,255,0.08);
  --cyan:#00f3ff;
  --purple:#c44dff;
  --green:#00ff99;
  --text:#fff;
  --text-mid:rgba(255,255,255,0.72);
  --text-dim:rgba(255,255,255,0.38);

  --font:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:var(--font);
}

#viewport{
  position:fixed;
  inset:0;

  display:flex;
  flex-direction:column;

  padding:
    env(safe-area-inset-top,14px)
    16px
    env(safe-area-inset-bottom,14px)
    16px;
}

/* HEADER */

#header{
  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:10px 0 14px;
  border-bottom:1px solid var(--border);

  flex-shrink:0;
}

#header h1{
  font-weight:400;
  font-size:1.2rem;
  letter-spacing:.25em;
  text-transform:uppercase;
}

#headerRight{
  display:flex;
  align-items:center;
  gap:10px;
}

#statusLabel{
  font-size:.55rem;
  font-family:var(--mono);
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--text-mid);
}

#statusDot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
}

#statusDot.drive{
  background:var(--green);
  box-shadow:0 0 8px var(--green);
}

#driveBtn{
  background:none;
  border:1px solid var(--border);

  color:var(--text-dim);

  padding:5px 10px;
  border-radius:4px;

  font-size:.52rem;
  font-family:var(--mono);

  text-transform:uppercase;
  letter-spacing:.12em;

  cursor:pointer;
}

#driveBtn.connected{
  border-color:var(--green);
  color:var(--green);
}

/* CHAT */

#chatLog{
  flex:1;
  overflow-y:auto;

  display:flex;
  flex-direction:column;
  gap:20px;

  padding:18px 0;

  scrollbar-width:none;
}

#chatLog::-webkit-scrollbar{
  display:none;
}

.msg{
  display:flex;
  flex-direction:column;
  gap:6px;
  max-width:88%;
}

.msg.user{
  align-self:flex-end;
  align-items:flex-end;
}

.msg.sonia{
  align-self:flex-start;
  align-items:flex-start;
}

.msg-label{
  font-size:.54rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-family:var(--mono);
}

.msg.user .msg-label{
  color:var(--purple);
}

.msg.sonia .msg-label{
  color:var(--cyan);
}

.msg-bubble{
  padding:12px 14px;
  border-radius:12px;

  line-height:1.5;
  font-size:.96rem;
}

.msg.user .msg-bubble{
  background:rgba(196,77,255,.11);
  border:1px solid rgba(196,77,255,.18);
}

.msg.sonia .msg-bubble{
  background:rgba(0,243,255,.05);
  border:1px solid rgba(0,243,255,.12);
}

/* INPUT */

#inputBar{
  display:flex;
  align-items:center;
  gap:10px;

  padding-top:12px;
  border-top:1px solid var(--border);

  flex-shrink:0;
}

#chatBox{
  flex:1;

  background:none;
  border:none;
  outline:none;

  color:#fff;

  font-size:1rem;
  font-family:var(--font);

  padding:10px 0;
}

#chatBox::placeholder{
  color:var(--text-dim);
}

.iBtn{
  background:none;
  border:none;

  color:var(--text-mid);

  cursor:pointer;

  font-size:.62rem;
  font-family:var(--mono);

  text-transform:uppercase;
  letter-spacing:.12em;
}

#sendBtn{
  color:var(--purple);
}

/* OVERLAYS */

.overlay{
  position:fixed;
  inset:0;

  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  background:#000;

  z-index:999;
  padding:30px;
}

.overlay.show{
  display:flex;
}

.overlay h2{
  font-size:1.3rem;
  letter-spacing:.28em;
  text-transform:uppercase;
  font-weight:300;
}

.overlay p{
  margin-top:14px;
  text-align:center;
  color:var(--text-mid);

  max-width:300px;
  line-height:1.6;
  font-size:.84rem;
}

.overlay input{
  width:100%;
  max-width:320px;

  margin-top:24px;

  background:none;
  border:none;
  border-bottom:1px solid rgba(255,255,255,.25);

  color:#fff;

  text-align:center;

  padding:12px 0;

  outline:none;

  font-family:var(--mono);
}

.overlay button{
  margin-top:22px;

  background:none;
  border:1px solid var(--cyan);

  color:var(--cyan);

  padding:13px 24px;
  border-radius:4px;

  font-size:.68rem;
  font-family:var(--mono);

  text-transform:uppercase;
  letter-spacing:.14em;

  cursor:pointer;
}

#skipDriveBtn{
  border:none;
  color:var(--text-dim);
  text-decoration:underline;
}

.sys{
  align-self:center;

  border:1px solid var(--border);

  padding:7px 12px;
  border-radius:20px;

  font-size:.55rem;
  font-family:var(--mono);

  letter-spacing:.12em;
  text-transform:uppercase;

  color:var(--text-dim);
}

</style>
</head>

<body>

<div id="viewport">

  <div id="header">
    <h1>Sonia</h1>

    <div id="headerRight">
      <span id="statusLabel">idle</span>
      <div id="statusDot"></div>
      <button id="driveBtn">Drive</button>
    </div>
  </div>

  <div id="chatLog"></div>

  <div id="inputBar">
    <button class="iBtn" id="micBtn">Mic</button>

    <input
      type="text"
      id="chatBox"
      placeholder="Message Sonia..."
      autocomplete="off"
      spellcheck="false"
    >

    <button class="iBtn" id="sendBtn">Send</button>
  </div>

</div>

<!-- GROQ KEY -->

<div class="overlay" id="keyOverlay">

  <h2>Sonia</h2>

  <p>
    Enter your Groq API key.
    Stored only for this browser session.
  </p>

  <input
    type="password"
    id="groqKeyInput"
    placeholder="gsk_..."
  >

  <button id="saveKeyBtn">
    Save Key
  </button>

</div>

<!-- GOOGLE -->

<div class="overlay" id="oauthOverlay">

  <h2>Sonia</h2>

  <p>
    Connect Google for Drive memory,
    calendar, tasks and Gmail integration.
  </p>

  <button id="connectGoogleBtn">
    Connect Google
  </button>

  <button id="skipDriveBtn">
    Skip For Now
  </button>

</div>

<script>

/* CONFIG */

const OAUTH_CLIENT_ID =
'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

let GROQ_KEY =
sessionStorage.getItem('sonia_groq_key') || '';

let driveAccessToken = null;
let driveConnected = false;
let googleTokenClient = null;

/* UI */

const chatLog = document.getElementById('chatLog');

const statusLabel =
document.getElementById('statusLabel');

const statusDot =
document.getElementById('statusDot');

const driveBtnEl =
document.getElementById('driveBtn');

/* HELPERS */

function setStatus(text,state){

  statusLabel.textContent = text;

  statusDot.className = '';

  if(state){
    statusDot.classList.add(state);
  }
}

function addSystem(text){

  const div = document.createElement('div');

  div.className = 'sys';

  div.textContent = text;

  chatLog.appendChild(div);

  scrollBottom();
}

function addMessage(role,text){

  const wrap = document.createElement('div');

  wrap.className = 'msg ' + role;

  const label = document.createElement('div');

  label.className = 'msg-label';

  label.textContent =
    role === 'user'
    ? 'You'
    : 'Sonia';

  const bubble = document.createElement('div');

  bubble.className = 'msg-bubble';

  bubble.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(bubble);

  chatLog.appendChild(wrap);

  scrollBottom();
}

function scrollBottom(){

  requestAnimationFrame(()=>{
    chatLog.scrollTop =
      chatLog.scrollHeight;
  });

}

/* GOOGLE AUTH */

function initGoogleAuth(){

  googleTokenClient =
    google.accounts.oauth2.initTokenClient({

      client_id: OAUTH_CLIENT_ID,

      scope: [

        'https://www.googleapis.com/auth/drive.file',

        'https://www.googleapis.com/auth/calendar.events',

        'https://www.googleapis.com/auth/gmail.send',

        'https://www.googleapis.com/auth/tasks'

      ].join(' '),

      callback:(response)=>{

        if(response.error){

          console.error(response);

          addSystem('Google connection failed');

          return;
        }

        driveAccessToken =
          response.access_token;

        driveConnected = true;

        driveBtnEl.classList.add('connected');

        setStatus('drive linked','drive');

        addSystem('Google connected');

      }

  });

}

/* GROQ */

async function askGroq(message){

  if(!GROQ_KEY){

    document
      .getElementById('keyOverlay')
      .classList.add('show');

    return;
  }

  setStatus('thinking');

  try{

    const response =
      await fetch(
        'https://api.groq.com/openai/v1/chat/completions',
    {
      method:'POST',

      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer ' + GROQ_KEY
      },

      body:JSON.stringify({

        model:'llama-3.1-8b-instant',

        messages:[
          {
            role:'system',
            content:
              'You are Sonia, a warm witty British AI companion.'
          },
          {
            role:'user',
            content:message
          }
        ],

        temperature:0.9,
        max_tokens:180

      })

    });

    const data =
      await response.json();

    console.log(data);

    const text =
      data.choices?.[0]?.message?.content
      || 'I seem to have lost my train of thought.';

    addMessage('sonia',text);

    setStatus('idle');

  }catch(err){

    console.error(err);

    addMessage(
      'sonia',
      'Connection issue. Something interrupted the request.'
    );

    setStatus('offline');

  }

}

/* SEND */

document
.getElementById('sendBtn')
.addEventListener('click',sendMessage);

document
.getElementById('chatBox')
.addEventListener('keydown',(e)=>{

  if(e.key === 'Enter'){
    sendMessage();
  }

});

function sendMessage(){

  const input =
    document
      .getElementById('chatBox');

  const text = input.value.trim();

  if(!text) return;

  addMessage('user',text);

  input.value = '';

  askGroq(text);

}

/* SAVE GROQ KEY */

document
.getElementById('saveKeyBtn')
.addEventListener('click',()=>{

  const key =
    document
      .getElementById('groqKeyInput')
      .value
      .trim();

  if(!key.startsWith('gsk_')){

    alert('Invalid Groq key');

    return;
  }

  GROQ_KEY = key;

  sessionStorage.setItem(
    'sonia_groq_key',
    key
  );

  document
    .getElementById('keyOverlay')
    .classList.remove('show');

  addSystem('Groq key loaded');

});

/* GOOGLE CONNECT */

document
.getElementById('connectGoogleBtn')
.addEventListener('click',()=>{

  googleTokenClient.requestAccessToken({
    prompt:'consent'
  });

  document
    .getElementById('oauthOverlay')
    .classList.remove('show');

});

/* SKIP GOOGLE */

document
.getElementById('skipDriveBtn')
.addEventListener('click',()=>{

  document
    .getElementById('oauthOverlay')
    .classList.remove('show');

});

/* DRIVE BUTTON */

driveBtnEl.addEventListener('click',()=>{

  document
    .getElementById('oauthOverlay')
    .classList.add('show');

});

/* START */

window.addEventListener('load',()=>{

  initGoogleAuth();

  addMessage(
    'sonia',
    'You brought me online rather elegantly.'
  );

  setStatus('ready');

});

</script>

</body>
</html>
