<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sonia Diary · Mr H</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #000;
    --surface:  #0a0a0a;
    --border:   rgba(160,100,255,0.25);
    --accent:   rgba(160,100,255,0.9);
    --accent2:  rgba(120,180,255,0.85);
    --text:     #ffffff;
    --muted:    rgba(255,255,255,0.6);
    --danger:   rgba(255,80,80,0.9);
    --synced:   rgba(80,255,140,0.9);
    --fs:       1.18rem;
    --fs-mono:  0.72rem;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: var(--fs);
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex; flex-direction: column;
    height: 100%; height: 100dvh;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  /* ── HEADER ── */
  #header {
    flex-shrink: 0;
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }
  #header-top {
    display: flex; align-items: center; justify-content: space-between;
  }
  #title-block h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 1.55rem;
    letter-spacing: 0.35em; color: #fff;
  }
  #title-block .byline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.4em;
    color: var(--muted); margin-top: 2px;
  }
  #header-actions { display: flex; gap: 10px; align-items: center; }

  /* Font sizer */
  #font-sizer {
    display: flex; align-items: center; gap: 6px;
  }
  .fs-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.15em;
    padding: 4px 8px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .fs-btn:hover { color: #fff; border-color: var(--accent); }

  /* Search */
  #search-wrap {
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
  }
  #search {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.18em;
    padding: 4px 0;
  }
  #search::placeholder { color: var(--muted); }
  #search-clear {
    background: none; border: none; color: var(--muted);
    font-family: 'Share Tech Mono', monospace; font-size: 0.55rem;
    cursor: pointer; padding: 2px 4px;
    display: none;
  }
  #search-clear.visible { display: block; }

  /* Stats row */
  #stats-row {
    display: flex; gap: 14px; align-items: center;
  }
  .stat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.3em;
    color: var(--muted);
  }
  .stat span { color: var(--accent2); }

  /* Sync status */
  #sync-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.3em;
    padding: 3px 8px; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }
  #sync-status.syncing { color: var(--accent2); border-color: var(--accent2); animation: pulse 1s ease-in-out infinite; }
  #sync-status.ok     { color: var(--synced);  border-color: var(--synced); }
  #sync-status.err    { color: var(--danger);  border-color: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── ENTRIES LIST ── */
  #entries-wrap {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 0 0 8px;
  }
  #entries-wrap::-webkit-scrollbar { display: none; }

  #empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 10px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.3em;
    text-align: center;
  }
  #empty .orb-hint {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(160,100,255,0.3);
    box-shadow: 0 0 20px rgba(160,100,255,0.12);
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100%{box-shadow:0 0 18px rgba(160,100,255,0.12)}
    50%{box-shadow:0 0 40px rgba(160,100,255,0.28)}
  }

  /* Date group header */
  .date-group { padding: 14px 20px 4px; }
  .date-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.48rem; letter-spacing: 0.45em;
    color: var(--muted); text-transform: uppercase;
  }

  /* Entry card with swipe */
  .entry-outer {
    position: relative; overflow: hidden;
  }
  .entry-delete-bg {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 80px; background: rgba(255,60,60,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.2em; color: var(--danger);
    transition: background 0.2s;
  }
  .entry-delete-bg.active { background: rgba(255,60,60,0.35); }

  .entry-card {
    position: relative;
    margin: 6px 16px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: transform 0.08s, border-color 0.2s;
    touch-action: pan-y;
    will-change: transform;
    user-select: none;
  }
  .entry-card:active { border-color: var(--accent); }
  .entry-card.swiping { transition: none; }

  .entry-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: var(--fs-mono);
    color: var(--muted); margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .sync-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.synced { background: var(--synced); }

  .entry-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs);
    font-weight: 300; line-height: 1.7;
    color: var(--text);
    word-break: break-word;
  }
  .entry-text .highlight {
    background: rgba(160,100,255,0.25);
    border-radius: 2px; padding: 0 2px;
  }

  /* ── COMPOSE AREA ── */
  #compose {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));
    background: var(--bg);
    display: flex; flex-direction: column; gap: 8px;
  }
  #compose-inner {
    display: flex; gap: 10px; align-items: flex-end;
  }
  #entry-input {
    flex: 1;
    background: none; border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs);
    font-weight: 300; line-height: 1.6;
    padding: 6px 0 8px;
    resize: none; outline: none;
    min-height: 36px; max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.3s;
  }
  #entry-input::placeholder { color: var(--muted); font-style: italic; }
  #entry-input:focus { border-color: var(--accent); }

  #save-btn {
    background: none; border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.3em;
    padding: 8px 14px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
    align-self: flex-end;
  }
  #save-btn:hover { background: rgba(160,100,255,0.12); }
  #save-btn:active { background: rgba(160,100,255,0.25); }
  #save-btn.saving { opacity: 0.5; pointer-events: none; }

  #char-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.45rem; letter-spacing: 0.2em;
    color: var(--muted); text-align: right;
    transition: color 0.2s;
  }
  #char-count.warn { color: rgba(255,200,60,0.7); }
  #char-count.over { color: var(--danger); }

  /* ── MODAL (entry detail) ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    width: 100%; max-width: 600px;
    background: #0d0d0d;
    border-top: 1px solid var(--border);
    padding: 24px 20px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom, 0));
    animation: slideUp 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  #modal-ts {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.35em;
    color: var(--muted); margin-bottom: 14px;
  }
  #modal-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: calc(var(--fs) * 1.05);
    font-weight: 300; line-height: 1.8;
    color: var(--text); margin-bottom: 20px;
    max-height: 50vh; overflow-y: auto;
  }
  #modal-text::-webkit-scrollbar { display: none; }
  #modal-actions {
    display: flex; gap: 12px; justify-content: flex-end;
  }
  .modal-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.25em;
    padding: 8px 16px; cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn:hover { border-color: var(--accent); color: var(--accent); }
  .modal-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #111; border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.25em;
    color: var(--text); padding: 8px 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap; z-index: 200;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── DRIVE CONFIG PANEL ── */
  #drive-panel {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 150;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  #drive-panel.open { display: flex; }
  #drive-inner {
    width: 100%; max-width: 400px;
    border: 1px solid var(--border);
    background: #0a0a0a;
    padding: 24px 20px;
  }
  #drive-inner h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 1.2rem;
    letter-spacing: 0.3em; color: #fff;
    margin-bottom: 18px;
  }
  .drive-field {
    margin-bottom: 14px;
  }
  .drive-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.48rem; letter-spacing: 0.35em;
    color: var(--muted); margin-bottom: 6px;
    display: block;
  }
  .drive-input {
    width: 100%; background: none;
    border: none; border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.15em;
    padding: 6px 0; outline: none;
  }
  .drive-input:focus { border-color: var(--accent); }
  .drive-input::placeholder { color: var(--muted); }
  #drive-save {
    margin-top: 20px; width: 100%;
    background: none; border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.3em;
    padding: 10px; cursor: pointer;
    transition: background 0.2s;
  }
  #drive-save:hover { background: rgba(160,100,255,0.1); }
  #drive-cancel {
    margin-top: 10px; width: 100%;
    background: none; border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.25em;
    padding: 8px; cursor: pointer;
  }

</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-top">
      <div id="title-block">
        <h1>Diary</h1>
        <div class="byline">SONIA · MR H</div>
      </div>
      <div id="header-actions">
        <div id="font-sizer">
          <button class="fs-btn" id="fs-down">A−</button>
          <button class="fs-btn" id="fs-up">A+</button>
        </div>
        <div id="sync-status" title="Tap to configure Drive sync">OFFLINE</div>
      </div>
    </div>

    <div id="search-wrap">
      <input id="search" type="search" placeholder="SEARCH ENTRIES..." autocomplete="off" spellcheck="false">
      <button id="search-clear">✕</button>
    </div>

    <div id="stats-row">
      <div class="stat">ENTRIES <span id="stat-count">0</span></div>
      <div class="stat">TODAY <span id="stat-today">0</span></div>
      <div class="stat">UNSYNCED <span id="stat-unsynced">0</span></div>
    </div>
  </div>

  <!-- ENTRIES -->
  <div id="entries-wrap">
    <div id="empty">
      <div class="orb-hint"></div>
      <div>NO ENTRIES YET</div>
      <div style="font-size:0.45rem;margin-top:4px;color:rgba(255,255,255,0.15)">WRITE YOUR FIRST THOUGHT BELOW</div>
    </div>
    <div id="entries-list"></div>
  </div>

  <!-- COMPOSE -->
  <div id="compose">
    <div id="compose-inner">
      <textarea id="entry-input" placeholder="Write something…" rows="1" maxlength="2000"></textarea>
      <button id="save-btn">SAVE</button>
    </div>
    <div id="char-count">0 / 2000</div>
  </div>

</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-ts"></div>
    <div id="modal-text"></div>
    <div id="modal-actions">
      <button class="modal-btn danger" id="modal-delete">DELETE</button>
      <button class="modal-btn" id="modal-copy">COPY</button>
      <button class="modal-btn" id="modal-close">CLOSE</button>
    </div>
  </div>
</div>

<!-- DRIVE CONFIG PANEL -->
<div id="drive-panel">
  <div id="drive-inner">
    <h2>Drive Sync</h2>
    <div class="drive-field">
      <label class="drive-label">GOOGLE OAUTH TOKEN</label>
      <input class="drive-input" id="cfg-token" type="password" placeholder="paste access token…">
    </div>
    <div class="drive-field">
      <label class="drive-label">DIARY FOLDER ID</label>
      <input class="drive-input" id="cfg-folder" placeholder="1Pq-8HJW_IadiYI37MnWiiHuKm5ylr3wY">
    </div>
    <div class="drive-field">
      <label class="drive-label">FILE NAME</label>
      <input class="drive-input" id="cfg-file" placeholder="sonia_diary_mr_h.json">
    </div>
    <button id="drive-save">SAVE &amp; SYNC NOW</button>
    <button id="drive-cancel">CANCEL</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   SONIA MOBILE DIARY  v2.1
   — localStorage key: sonia_diary_v2
   — Drive: writes to diary subfolder
   — Font sizer: A− / A+
   — Swipe left to delete
   — Search / filter
   — Entry modal with copy
   — Auto-sync on save
══════════════════════════════════════════════ */

const STORAGE_KEY   = 'sonia_diary_v2';
const FS_KEY        = 'sonia_diary_fs';
const CFG_KEY       = 'sonia_diary_cfg';
const MAX_CHARS     = 2000;
const FONT_SIZES    = [0.92, 1.02, 1.18, 1.3, 1.42, 1.55];
let   fsSizeIdx     = 2;  // default index (1.18rem)

// ── STATE ──────────────────────────────────────
let entries     = [];
let searchQuery = '';
let openEntry   = null;
let syncTimer   = null;
let cfg         = { token: '', folder: '1Pq-8HJW_IadiYI37MnWiiHuKm5ylr3wY', file: 'sonia_diary_mr_h.json' };

// ── INIT ───────────────────────────────────────
function init() {
  loadCfg();
  loadEntries();
  loadFontSize();
  renderAll();
  bindEvents();
  autoResize(elInput());
}

// ── STORAGE ────────────────────────────────────
function loadEntries() {
  try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { entries = []; }
}
function saveEntries() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}
function loadCfg() {
  try { const c = JSON.parse(localStorage.getItem(CFG_KEY)); if(c) cfg = {...cfg, ...c}; }
  catch(e) {}
}
function saveCfg() { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
function loadFontSize() {
  const saved = localStorage.getItem(FS_KEY);
  if (saved !== null) fsSizeIdx = parseInt(saved);
  applyFontSize();
}
function applyFontSize() {
  const fs = FONT_SIZES[fsSizeIdx];
  document.documentElement.style.setProperty('--fs', fs + 'rem');
  document.documentElement.style.setProperty('--fs-mono', (fs * 0.6) + 'rem');
  localStorage.setItem(FS_KEY, fsSizeIdx);
}

// ── EL HELPERS ─────────────────────────────────
const el  = id => document.getElementById(id);
const elInput = () => el('entry-input');

// ── RENDER ─────────────────────────────────────
function renderAll() {
  updateStats();
  renderEntries();
}

function updateStats() {
  const today = new Date().toDateString();
  const todayCount = entries.filter(e => new Date(e.ts).toDateString() === today).length;
  const unsynced   = entries.filter(e => !e.synced).length;
  el('stat-count').textContent   = entries.length;
  el('stat-today').textContent   = todayCount;
  el('stat-unsynced').textContent = unsynced;
}

function renderEntries() {
  const list  = el('entries-list');
  const empty = el('empty');
  const q     = searchQuery.trim().toLowerCase();
  let   shown = entries;
  if (q) shown = entries.filter(e => e.text.toLowerCase().includes(q));
  shown = [...shown].reverse(); // newest first

  if (!shown.length) {
    list.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  // Group by date
  const groups = {};
  shown.forEach(e => {
    const d = fmtDate(e.ts);
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  let html = '';
  Object.keys(groups).forEach(dateKey => {
    html += `<div class="date-group"><div class="date-label">${dateKey}</div></div>`;
    groups[dateKey].forEach(e => {
      const text = q ? highlightText(e.text, q) : escHtml(e.text);
      html += `
        <div class="entry-outer" data-id="${e.id}">
          <div class="entry-delete-bg">DELETE</div>
          <div class="entry-card" data-id="${e.id}">
            <div class="entry-time">
              <div class="sync-dot ${e.synced ? 'synced' : ''}"></div>
              ${fmtTime(e.ts)}
            </div>
            <div class="entry-text">${text}</div>
          </div>
        </div>`;
    });
  });
  list.innerHTML = html;
  bindSwipe();
  bindEntryTap();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlightText(text, q) {
  const safe = escHtml(text);
  const re   = new RegExp('(' + escRegex(q) + ')', 'gi');
  return safe.replace(re, '<span class="highlight">$1</span>');
}
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function fmtDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yest  = new Date(today); yest.setDate(today.getDate()-1);
  if (d.toDateString() === today.toDateString()) return 'TODAY';
  if (d.toDateString() === yest.toDateString())  return 'YESTERDAY';
  return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function fmtFull(ts) {
  return new Date(ts).toLocaleString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ── SWIPE TO DELETE ────────────────────────────
function bindSwipe() {
  document.querySelectorAll('.entry-card').forEach(card => {
    let startX = 0, curX = 0, swiping = false;
    const bg = card.closest('.entry-outer').querySelector('.entry-delete-bg');

    card.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      swiping = false;
      card.classList.remove('swiping');
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      curX = e.touches[0].clientX;
      const dx = startX - curX;
      if (dx > 8) {
        swiping = true;
        card.classList.add('swiping');
        const clamp = Math.min(dx, 80);
        card.style.transform = `translateX(-${clamp}px)`;
        bg.classList.toggle('active', clamp >= 60);
      }
    }, { passive: true });

    card.addEventListener('touchend', () => {
      if (!swiping) return;
      const dx = startX - curX;
      card.classList.remove('swiping');
      if (dx >= 60) {
        deleteEntry(card.dataset.id);
      } else {
        card.style.transform = 'translateX(0)';
      }
    });
  });
}

function bindEntryTap() {
  document.querySelectorAll('.entry-card').forEach(card => {
    let touchMoved = false;
    card.addEventListener('touchstart', () => { touchMoved = false; }, { passive: true });
    card.addEventListener('touchmove',  () => { touchMoved = true;  }, { passive: true });
    card.addEventListener('touchend', () => {
      if (!touchMoved) openModal(card.dataset.id);
    });
    card.addEventListener('click', () => openModal(card.dataset.id));
  });
}

// ── MODAL ──────────────────────────────────────
function openModal(id) {
  openEntry = entries.find(e => e.id === id);
  if (!openEntry) return;
  el('modal-ts').textContent   = fmtFull(openEntry.ts).toUpperCase();
  el('modal-text').textContent = openEntry.text;
  el('modal-overlay').classList.add('open');
}
function closeModal() {
  el('modal-overlay').classList.remove('open');
  openEntry = null;
}

// ── ENTRY CRUD ─────────────────────────────────
function addEntry(text) {
  const entry = {
    id:     Date.now() + '_' + Math.random().toString(36).slice(2,7),
    ts:     new Date().toISOString(),
    text:   text.trim(),
    synced: false
  };
  entries.push(entry);
  saveEntries();
  renderAll();
  scheduleDriveSync();
  return entry;
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  renderAll();
  showToast('ENTRY DELETED');
}

// ── DRIVE SYNC ─────────────────────────────────
function setSyncStatus(state, label) {
  const s = el('sync-status');
  s.className = '';
  s.classList.add(state);
  s.textContent = label;
}

function scheduleDriveSync() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToDrive, 1800);
}

async function syncToDrive() {
  if (!cfg.token || !cfg.folder || !cfg.file) {
    setSyncStatus('', 'OFFLINE');
    return;
  }
  setSyncStatus('syncing', 'SYNCING…');
  try {
    // Find existing file
    const q    = encodeURIComponent(`name='${cfg.file}' and '${cfg.folder}' in parents and trashed=false`);
    const list = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
      headers: { Authorization: 'Bearer ' + cfg.token }
    });
    if (list.status === 401) { setSyncStatus('err', 'TOKEN EXPIRED'); return; }
    const lj   = await list.json();
    const fid  = lj.files?.[0]?.id;
    const body = JSON.stringify(entries, null, 2);

    let res;
    if (fid) {
      res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + cfg.token, 'Content-Type': 'application/json' },
        body
      });
    } else {
      const boundary = 'sonia314159';
      const meta     = { name: cfg.file, parents: [cfg.folder] };
      const mp = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
      res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + cfg.token,
          'Content-Type': `multipart/related; boundary="${boundary}"`
        },
        body: mp
      });
    }
    if (res.ok) {
      entries = entries.map(e => ({ ...e, synced: true }));
      saveEntries();
      updateStats();
      document.querySelectorAll('.sync-dot').forEach(d => d.classList.add('synced'));
      setSyncStatus('ok', 'SYNCED ✓');
      setTimeout(() => setSyncStatus('', 'DRIVE ON'), 4000);
    } else {
      setSyncStatus('err', 'SYNC ERR ' + res.status);
    }
  } catch(e) {
    setSyncStatus('err', 'NETWORK ERR');
  }
}

async function loadFromDrive() {
  if (!cfg.token || !cfg.folder || !cfg.file) return;
  setSyncStatus('syncing', 'LOADING…');
  try {
    const q    = encodeURIComponent(`name='${cfg.file}' and '${cfg.folder}' in parents and trashed=false`);
    const list = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
      headers: { Authorization: 'Bearer ' + cfg.token }
    });
    const lj  = await list.json();
    const fid = lj.files?.[0]?.id;
    if (!fid) { setSyncStatus('err', 'FILE NOT FOUND'); return; }
    const dl  = await fetch(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`, {
      headers: { Authorization: 'Bearer ' + cfg.token }
    });
    const remote = await dl.json();
    if (Array.isArray(remote)) {
      // Merge: keep local entries not in remote, add remote entries
      const remoteIds = new Set(remote.map(e => e.id));
      const localOnly = entries.filter(e => !remoteIds.has(e.id));
      entries = [...remote, ...localOnly].sort((a,b) => a.ts.localeCompare(b.ts));
      saveEntries();
      renderAll();
      setSyncStatus('ok', 'LOADED ✓');
      setTimeout(() => setSyncStatus('', 'DRIVE ON'), 3000);
      showToast('ENTRIES LOADED FROM DRIVE');
    }
  } catch(e) {
    setSyncStatus('err', 'LOAD ERR');
  }
}

// ── EVENTS ─────────────────────────────────────
function bindEvents() {

  // Save button
  el('save-btn').addEventListener('click', doSave);
  elInput().addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSave(); }
  });

  // Char count
  elInput().addEventListener('input', () => {
    const len = elInput().value.length;
    const cc  = el('char-count');
    cc.textContent = `${len} / ${MAX_CHARS}`;
    cc.className   = len > 1800 ? 'over' : len > 1500 ? 'warn' : '';
    autoResize(elInput());
  });

  // Font sizer
  el('fs-down').addEventListener('click', () => {
    if (fsSizeIdx > 0) { fsSizeIdx--; applyFontSize(); showToast('TEXT SMALLER'); }
  });
  el('fs-up').addEventListener('click', () => {
    if (fsSizeIdx < FONT_SIZES.length - 1) { fsSizeIdx++; applyFontSize(); showToast('TEXT LARGER'); }
  });

  // Search
  el('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    el('search-clear').classList.toggle('visible', !!searchQuery);
    renderEntries();
  });
  el('search-clear').addEventListener('click', () => {
    el('search').value = '';
    searchQuery = '';
    el('search-clear').classList.remove('visible');
    renderEntries();
  });

  // Sync status tap → open config OR load from drive if configured
  el('sync-status').addEventListener('click', () => {
    if (cfg.token) loadFromDrive();
    else openDrivePanel();
  });

  // Modal
  el('modal-overlay').addEventListener('click', e => {
    if (e.target === el('modal-overlay')) closeModal();
  });
  el('modal-close').addEventListener('click', closeModal);
  el('modal-delete').addEventListener('click', () => {
    if (openEntry) { deleteEntry(openEntry.id); closeModal(); }
  });
  el('modal-copy').addEventListener('click', () => {
    if (openEntry) {
      navigator.clipboard.writeText(openEntry.text).then(() => showToast('COPIED'));
    }
  });

  // Drive panel
  el('drive-save').addEventListener('click', () => {
    cfg.token  = el('cfg-token').value.trim();
    cfg.folder = el('cfg-folder').value.trim() || cfg.folder;
    cfg.file   = el('cfg-file').value.trim()   || cfg.file;
    saveCfg();
    closeDrivePanel();
    setSyncStatus('', 'DRIVE ON');
    loadFromDrive();
  });
  el('drive-cancel').addEventListener('click', closeDrivePanel);
}

function doSave() {
  const text = elInput().value.trim();
  if (!text) return;
  el('save-btn').classList.add('saving');
  el('save-btn').textContent = '…';
  addEntry(text);
  elInput().value = '';
  el('char-count').textContent = '0 / 2000';
  el('char-count').className   = '';
  autoResize(elInput());
  setTimeout(() => {
    el('save-btn').classList.remove('saving');
    el('save-btn').textContent = 'SAVE';
  }, 600);
  showToast('ENTRY SAVED');
}

function openDrivePanel() {
  el('cfg-token').value  = cfg.token  || '';
  el('cfg-folder').value = cfg.folder || '';
  el('cfg-file').value   = cfg.file   || '';
  el('drive-panel').classList.add('open');
}
function closeDrivePanel() { el('drive-panel').classList.remove('open'); }

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

let toastTimer;
function showToast(msg) {
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── START ──────────────────────────────────────
init();

// If token exists, show drive as online
if (cfg.token) setSyncStatus('', 'DRIVE ON');
</script>
</body>
