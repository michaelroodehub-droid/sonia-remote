const LS={
  get:k=>localStorage.getItem('s_'+k),
  set:(k,v)=>localStorage.setItem('s_'+k,v)
};

/* =====================================================
   MODELS
===================================================== */

const MAIN_MODEL = 'llama-3.1-8b-instant';
const FAST_MODEL = 'llama-3.1-8b-instant';
const MEMORY_MODEL = 'llama-3.1-8b-instant';

const FALLBACK_MODELS = [
  'llama-3.1-8b-instant',
  'llama3-70b-8192',
  'mixtral-8x7b-32768'
];

/* =====================================================
   MOBILE PERFORMANCE
===================================================== */

const IS_MOBILE = /Android|iPhone|iPad|Mobile/i.test(navigator.userAgent);
const MAX_TOKENS = IS_MOBILE ? 140 : 220;

function vibrate(ms=30){
  if(navigator.vibrate) navigator.vibrate(ms);
}

/* =====================================================
   NETWORK PROTECTION
===================================================== */

async function fetchWithTimeout(url, options={}, timeout=25000){
  const controller = new AbortController();
  const id = setTimeout(()=>controller.abort(), timeout);

  try{
    const response = await fetch(url, {
      ...options,
      signal: controller.signal
    });

    clearTimeout(id);
    return response;

  }catch(err){
    clearTimeout(id);
    throw err;
  }
}

/* =====================================================
   CONFIG
===================================================== */

let GROQ_KEY='';
let CLIENT_ID='';
let OWNER_NAME='Mr H';
let FOLDER_ID='';
let NASA_KEY='';
let WOLFRAM_ID='';
let driveToken=null;

const conversationHistory=[];

/* =====================================================
   MOODS
===================================================== */

const VALID_MOODS=[
  'calm',
  'curious',
  'thinking',
  'focused',
  'intimate',
  'introspective'
];

const MOOD_EMOJI={
  calm:'🌿',
  curious:'✨',
  thinking:'💭',
  focused:'🎯',
  intimate:'🌙',
  introspective:'🪐'
};

function parseMood(raw){
  const m = raw.match(/\[mood\s*:\s*([a-z]+)\s*\]/i);

  let mood='calm';

  if(m){
    const candidate=m[1].toLowerCase();
    if(VALID_MOODS.includes(candidate)) mood=candidate;
  }

  const text = raw
    .replace(/\[mood\s*:\s*[a-z]+\s*\]/gi,'')
    .replace(/[\r\n]+/g,' ')
    .replace(/\s{2,}/g,' ')
    .trim();

  return { mood, text };
}

/* =====================================================
   FALLBACK AI ENGINE
===================================================== */

async function groqChat(messages, stream=false){

  for(const model of FALLBACK_MODELS){

    try{

      const response = await fetchWithTimeout(
        'https://api.groq.com/openai/v1/chat/completions',
        {
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'Authorization':'Bearer '+GROQ_KEY
          },
          body:JSON.stringify({
            model,
            messages,
            max_tokens:MAX_TOKENS,
            temperature:0.9,
            top_p:0.95,
            stream
          })
        },
        30000
      );

      if(response.ok){
        console.log('Using model:', model);
        return response;
      }

    }catch(err){
      console.log('Model failed:', model);
    }
  }

  throw new Error('All models failed');
}

/* =====================================================
   SONIA PERSONALITY ENGINE

`;
}

/* =====================================================
   MEMORY SYSTEM
===================================================== */

let memories = JSON.parse(LS.get('memories') || '[]');

function saveMemories(){
  LS.set('memories', JSON.stringify(memories));
}

async function extractMemoryFacts(userMsg, assistantReply){

  if(!GROQ_KEY) return;

  try{

    const res = await fetchWithTimeout(
      'https://api.groq.com/openai/v1/chat/completions',
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization':'Bearer '+GROQ_KEY
        },
        body:JSON.stringify({
          model: MEMORY_MODEL,
          max_tokens: 200,
          temperature: 0.1,
          messages:[
            {
              role:'user',
              content:`Extract 0-3 factual memories as JSON array only.\n\nUser: ${userMsg}\nAssistant: ${assistantReply}`
            }
          ]
        })
      }
    );

    const data = await res.json();

    const raw = (data.choices?.[0]?.message?.content || '[]')
      .replace(/```json|```/g,'')
      .trim();

    const facts = JSON.parse(raw);

    if(Array.isArray(facts)){

      facts.forEach(fact=>{

        const exists = memories.some(m=>
          m.fact.toLowerCase() === fact.toLowerCase()
        );

        if(!exists){
          memories.push({
            id:Date.now()+Math.random().toString(36),
            ts:new Date().toISOString(),
            fact
          });
        }
      });

      saveMemories();
    }

  }catch(err){
    console.log('Memory extraction failed');
  }
}

/* =====================================================
   CHAT ENGINE
===================================================== */

const chatLog=document.getElementById('chatLog');
const chatBox=document.getElementById('chatBox');

function smoothScroll(){
  requestAnimationFrame(()=>{
    chatLog.scrollTop = chatLog.scrollHeight;
  });
}

function addMsg(role,text,mood='calm'){

  const wrap=document.createElement('div');
  wrap.className='msg '+role;

  const who=document.createElement('div');
  who.className='msg-who';

  who.textContent = role==='user'
    ? 'you'
    : (MOOD_EMOJI[mood] || '') + ' sonia';

  const body=document.createElement('div');
  body.className='msg-text';
  body.textContent=text;

  wrap.appendChild(who);
  wrap.appendChild(body);

  chatLog.appendChild(wrap);

  smoothScroll();

  return wrap;
}

function createStreamBubble(){

  const wrap=document.createElement('div');
  wrap.className='msg sonia';

  const who=document.createElement('div');
  who.className='msg-who';
  who.textContent='sonia';

  const body=document.createElement('div');
  body.className='msg-text streaming';

  wrap.appendChild(who);
  wrap.appendChild(body);

  chatLog.appendChild(wrap);

  smoothScroll();

  return {wrap,body,who};
}

/* =====================================================
   MAIN MESSAGE SEND
===================================================== */

async function sendMessage(){

  const text = chatBox.value.trim();

  if(!text || !GROQ_KEY) return;

  vibrate(20);

  chatBox.value='';
  addMsg('user', text);

  conversationHistory.push({
    role:'user',
    content:text
  });

  const stream = createStreamBubble();

  let fullRaw='';
  let moodDetected='calm';

  try{

    const response = await groqChat([
      {
        role:'system',
        content:buildSystemPrompt()
      },
      ...conversationHistory
    ], true);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let buffer='';

    while(true){

      const {done, value} = await reader.read();

      if(done) break;

      buffer += decoder.decode(value, {stream:true});

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for(const line of lines){

        if(!line.startsWith('data:')) continue;

        const raw = line.slice(5).trim();

        if(raw === '[DONE]') continue;

        try{

          const chunk = JSON.parse(raw);

          const delta = chunk.choices?.[0]?.delta?.content || '';

          if(delta){

            fullRaw += delta;

            const parsed = parseMood(fullRaw);

            moodDetected = parsed.mood;

            stream.body.textContent = parsed.text;

            smoothScroll();
          }

        }catch(err){}
      }
    }

    stream.body.classList.remove('streaming');

    const parsed = parseMood(fullRaw);

    stream.body.textContent = parsed.text;

    stream.who.textContent =
      (MOOD_EMOJI[parsed.mood] || '') + ' sonia';

    conversationHistory.push({
      role:'assistant',
      content:parsed.text
    });

    extractMemoryFacts(text, parsed.text);

  }catch(err){

    stream.body.classList.remove('streaming');

    stream.body.textContent =
      'Connection unstable — try again.';
  }
}

/* =====================================================
   INPUT EVENTS
===================================================== */

if(chatBox){

  chatBox.addEventListener('keydown', e=>{

    if(e.key==='Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });
}

document.getElementById('sendBtn')
  .addEventListener('click', sendMessage);

/* =====================================================
   MICROPHONE
===================================================== */

let recognition = null;
let micActive = false;

function initMic(){

  const Engine =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!Engine) return false;

  recognition = new Engine();

  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-GB';

  recognition.onstart = ()=>{
    micActive=true;
    vibrate(50);
  };

  recognition.onresult = e=>{

    const transcript = e.results[0][0].transcript;

    chatBox.value = transcript;

    sendMessage();
  };

  recognition.onend = ()=>{
    micActive=false;
  };

  return true;
}

/* =====================================================
   TTS
===================================================== */

let ttsEnabled = false;
let currentAudio = null;

async function speak(text){

  if(!ttsEnabled || !text || !GROQ_KEY) return;

  try{

    const res = await fetchWithTimeout(
      'https://api.groq.com/openai/v1/audio/speech',
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization':'Bearer '+GROQ_KEY
        },
        body:JSON.stringify({
          model:'playai-tts',
          input:text,
          voice:'Arista-PlayAI',
          response_format:'wav'
        })
      }
    );

    const blob = await res.blob();

    const url = URL.createObjectURL(blob);

    const audio = new Audio(url);

    currentAudio = audio;

    audio.play();

  }catch(err){
    console.log('TTS failed');
  }
}
