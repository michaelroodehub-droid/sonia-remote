<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sonia · Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000000;--text:#ffffff;--sub:rgba(255,255,255,0.45);--line:rgba(255,255,255,0.12);--line-hi:rgba(255,255,255,0.3);
  --orb-idle:#8844ff;--green:#00cc66;--green-glow:#00ff88;--sync-txt:#00ff88;
  --sans:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
  --nav-h:64px;--top-h:56px;--status-h:32px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
@supports (height:100dvh){html,body,#app{height:100dvh}}

/* ── SETUP ── */
#setup{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:32px 24px;padding-top:calc(var(--safe-top) + 32px);overflow-y:auto;}
.setup-inner{width:100%;max-width:420px}
.setup-name{font-family:var(--mono);font-size:2.8rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:4px;color:var(--text)}
.setup-sub{font-family:var(--mono);font-size:0.72rem;letter-spacing:0.2em;color:var(--text);opacity:0.7;text-transform:uppercase;margin-bottom:40px}
.sf{margin-bottom:18px}
.sf label{display:block;font-family:var(--mono);font-size:0.68rem;letter-spacing:0.18em;color:var(--text);opacity:0.8;text-transform:uppercase;margin-bottom:8px}
.sf input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line-hi);color:var(--text);font-family:var(--mono);font-size:0.95rem;padding:12px 0;outline:none;transition:border-color 0.2s;border-radius:0;}
.sf input:focus{border-bottom-color:var(--text)}
.sf input::placeholder{color:var(--text);opacity:0.4}
.setup-hint{font-family:var(--mono);font-size:0.65rem;color:var(--text);opacity:0.5;margin-top:8px;line-height:1.6;letter-spacing:0.05em;}
#setupBtn{width:100%;margin-top:32px;background:transparent;border:1px solid var(--line-hi);color:var(--text);font-family:var(--mono);font-size:0.85rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:18px;cursor:pointer;transition:border-color 0.2s;border-radius:0;}
#setupBtn:hover{border-color:var(--text)}
#setupBtn:active{opacity:0.7}
.skip-btn{width:100%;margin-top:14px;background:transparent;border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:13px;cursor:pointer;opacity:0.6;transition:opacity 0.2s;border-radius:0;}
.skip-btn:hover{opacity:1}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;position:fixed;inset:0;padding-top:var(--safe-top);background:var(--bg);}
#topBar{height:var(--top-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line);flex-shrink:0;}
.top-left{display:flex;align-items:center;gap:14px}
.top-name{font-family:var(--mono);font-weight:700;font-size:1.05rem;letter-spacing:0.05em;color:var(--text)}
.top-tag{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.18em;color:var(--text);opacity:0.45;text-transform:uppercase;margin-top:2px;}

/* ── ORB ── */
#orb{
  width:30px;height:30px;border-radius:50%;background:var(--orb-idle);border:none;flex-shrink:0;
  transition:background 0.4s ease,box-shadow 0.4s ease;
  box-shadow:0 0 10px 3px rgba(136,68,255,0.55),0 0 22px 6px rgba(136,68,255,0.25);
}
#orb.syncing{
  background:var(--green-glow);
  box-shadow:0 0 14px 5px rgba(0,204,102,0.75),0 0 32px 12px rgba(0,255,136,0.35);
  animation:orbBreathe 1s ease-in-out infinite alternate
}
#orb.online{background:var(--orb-idle);box-shadow:0 0 10px 3px rgba(136,68,255,0.55),0 0 22px 6px rgba(136,68,255,0.25);}
@keyframes orbBreathe{from{transform:scale(0.9);filter:brightness(1)}to{transform:scale(1.1);filter:brightness(1.6)}}

/* ── TOP RIGHT ── */
.top-right{display:flex;align-items:center;gap:8px}
#modeBtn,#syncBtn{width:34px;height:34px;border-radius:50%;background:transparent;border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text);opacity:0.8;transition:opacity 0.2s,border-color 0.2s;}
#modeBtn:hover,#syncBtn:hover{opacity:1}
#syncBtn.syncing{border-color:var(--green-glow);color:var(--green-glow);opacity:1;}
#syncBtn.success{border-color:#00aa55;color:#00aa55;opacity:1;}

/* ── PANELS ── */
#panels{flex:1;overflow:hidden;position:relative;min-height:0}
.panel{position:absolute;inset:0;display:none;flex-direction:column;opacity:0;transition:opacity 0.2s ease}
.panel.active{display:flex;opacity:1}

/* ── STATUS STRIP ── */
#statusStrip{height:var(--status-h);border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 20px;flex-shrink:0;}
#presenceDot{width:6px;height:6px;border-radius:50%;background:var(--text);opacity:0.4;flex-shrink:0;transition:background 0.3s,box-shadow 0.3s}
#presenceDot.online{background:#00d47e;box-shadow:0 0 6px #00d47e;opacity:1}
#presenceDot.syncing{background:var(--green-glow);box-shadow:0 0 8px var(--green-glow);opacity:1}
#presenceDot.offline{background:var(--text);opacity:0.4}
#statusTxt{font-family:var(--mono);font-size:0.65rem;color:var(--text);opacity:0.75;text-transform:uppercase;letter-spacing:0.1em}
#statusStrip.syncing #statusTxt{color:var(--sync-txt,var(--green));opacity:1}

/* ── NAV ── */
#bottomNav{height:calc(var(--nav-h) + var(--safe-bot));padding-bottom:var(--safe-bot);border-top:1px solid var(--line);display:flex;align-items:stretch;flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;border:none;background:none;color:var(--text);opacity:0.5;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;transition:opacity 0.2s,color 0.2s;border-right:1px solid var(--line);padding:0;}
.nav-item:last-child{border-right:none}
.nav-item svg{width:18px;height:18px;fill:currentColor;transition:transform 0.2s}
.nav-item.active{opacity:1}
.nav-item.active svg{transform:scale(1.05)}

/* ── DIARY PANEL ── */
#diaryInputWrap{flex-shrink:0;border-top:1px solid var(--line);padding:12px 20px;display:flex;align-items:flex-end;gap:12px;}
#diaryBox{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:1rem;resize:none;max-height:140px;line-height:1.55;padding:0;overflow-y:auto;font-weight:500;caret-color:var(--text);}
#diaryBox::placeholder{color:var(--text);opacity:0.45}
#saveBtn{width:34px;height:34px;flex-shrink:0;border-radius:50%;background:transparent;border:1px solid var(--line);color:var(--text);opacity:0.7;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s;align-self:flex-end;}
#saveBtn:hover{opacity:1}
#saveBtn:active{opacity:0.4}
#saveBtn svg{width:14px;height:14px;fill:currentColor;margin-left:2px}
#diaryLog{flex:1;overflow-y:auto;padding:24px 20px 16px;display:flex;flex-direction:column;gap:0;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-behavior:smooth;}
.entry{margin-bottom:28px;animation:entryIn 0.2s ease;border-top:1px solid var(--line);padding-top:16px;}
.entry:first-child{border-top:none}
@keyframes entryIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.entry-ts{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.1em;color:var(--text);opacity:0.55;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.entry-text{font-family:var(--sans);font-size:1rem;line-height:1.7;font-weight:500;color:var(--text);white-space:pre-wrap;}
.entry-del{background:transparent;border:none;color:var(--text);opacity:0.25;cursor:pointer;font-size:13px;padding:2px 4px;transition:opacity 0.2s;flex-shrink:0;}
.entry-del:hover{opacity:0.8;color:#ff3d5a}
.empty-state{font-family:var(--mono);font-size:0.75rem;color:var(--text);opacity:0.5;padding:32px 0;letter-spacing:0.08em;}

/* ── LOG PANEL (entries list) ── */
.panel-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px;overscroll-behavior:contain}
.panel-head{margin-bottom:28px}
.panel-title{font-family:var(--mono);font-weight:700;font-size:1.4rem;letter-spacing:-0.01em;margin-bottom:4px;color:var(--text)}
.panel-sub{font-family:var(--mono);font-size:0.65rem;letter-spacing:0.15em;color:var(--text);opacity:0.65;text-transform:uppercase}
.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.pill{background:transparent;border:1px solid var(--line-hi);color:var(--text);opacity:0.8;font-family:var(--mono);font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:10px 18px;cursor:pointer;transition:opacity 0.2s,border-color 0.2s;white-space:nowrap;border-radius:0;}
.pill:hover{opacity:1}
.pill:active{opacity:0.4}
.pill.primary{opacity:1;border-color:var(--text)}
.pill.success{border-color:#00aa55;color:#00aa55;opacity:1}
.pill.danger{border-color:#ff3d5a;color:#ff3d5a;opacity:1}
.log-entry{border-top:1px solid var(--line);padding:16px 0;}
.log-entry:first-child{border-top:none}
.log-ts{font-family:var(--mono);font-size:0.62rem;color:var(--text);opacity:0.55;margin-bottom:8px;letter-spacing:0.08em;}
.log-text{font-size:0.95rem;line-height:1.6;color:var(--text);font-weight:500;white-space:pre-wrap;}
.sync-info{font-family:var(--mono);font-size:0.68rem;color:var(--text);opacity:0.5;margin-top:6px;letter-spacing:0.06em;}
.sync-info.synced{color:#00aa55;opacity:1;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line)}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-inner">
    <div class="setup-name">Sonia</div>
    <div class="setup-sub">Diary · Mobile</div>
    <div class="sf">
      <label>Your Name</label>
      <input type="text" id="cfgOwner" placeholder="Mr H" autocomplete="off" value="Mr H">
    </div>
    <div class="sf">
      <label>Google OAuth Client ID</label>
      <input type="text" id="cfgClient" placeholder="xxxx.apps.googleusercontent.com" autocomplete="off">
      <div class="setup-hint">Required for Drive sync. Leave blank for offline-only mode.</div>
    </div>
    <div class="sf">
      <label>Drive Folder ID (optional)</label>
      <input type="text" id="cfgFolder" placeholder="Leave blank to use Drive root" autocomplete="off">
    </div>
    <button id="setupBtn">Start Writing</button>
    <button class="skip-btn" id="skipBtn">Skip — offline only</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header id="topBar">
    <div class="top-left">
      <div id="orb"></div>
      <div>
        <div class="top-name">Sonia</div>
        <div class="top-tag">Diary</div>
      </div>
    </div>
    <div class="top-right">
      <button id="syncBtn" title="Sync to Drive">☁</button>
      <button id="modeBtn" title="Toggle theme">◐</button>
    </div>
  </header>

  <div id="panels">

    <!-- WRITE panel -->
    <div class="panel active" id="writePanel">
      <div id="diaryLog"></div>
      <div id="diaryInputWrap">
        <textarea id="diaryBox" rows="1" placeholder="Write today's entry…"></textarea>
        <button id="saveBtn" title="Save entry">
          <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
        </button>
      </div>
    </div>

    <!-- LOG panel -->
    <div class="panel" id="logPanel">
      <div class="panel-scroll">
        <div class="panel-head">
          <div class="panel-title">Log</div>
          <div class="panel-sub">All diary entries</div>
        </div>
        <div class="btn-row">
          <button class="pill primary" id="syncAllBtn">☁ Sync All</button>
          <button class="pill danger" id="clearAllBtn">✕ Clear All</button>
        </div>
        <div id="syncStatusMsg" style="font-family:var(--mono);font-size:0.68rem;color:var(--text);opacity:0.6;margin-bottom:18px;min-height:16px;letter-spacing:0.06em;"></div>
        <div id="logList"></div>
      </div>
    </div>

  </div>

  <div id="statusStrip">
    <div id="presenceDot"></div>
    <span id="statusTxt">offline</span>
  </div>

  <nav id="bottomNav">
    <button class="nav-item active" data-panel="writePanel">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.21c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      Write
    </button>
    <button class="nav-item" data-panel="logPanel">
      <svg viewBox="0 0 24 24"><path d="M14 2H6C4.9 2 4 2.9 4 4v16c0 1.1.89 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      Log
    </button>
  </nav>
</div>

<script>
/* ══ BOOT ERROR CATCHER ══ */
window.onerror = function(msg, src, line, col, err) {
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#000;color:#ff2266;font-family:monospace;font-size:13px;padding:24px;overflow:auto;white-space:pre-wrap;';
  box.textContent = '⚠ SONIA BOOT ERROR\n\n' + msg + '\n\nFile: ' + src + '\nLine: ' + line + ':' + col + '\n\n' + (err?.stack || '');
  document.body.appendChild(box);
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#000;color:#ff2266;font-family:monospace;font-size:13px;padding:24px;overflow:auto;white-space:pre-wrap;';
  box.textContent = '⚠ SONIA ASYNC ERROR\n\n' + (e.reason?.stack || e.reason || 'Unknown promise rejection');
  document.body.appendChild(box);
});

/* ══ STORAGE ══ */
const LS = { get: k => localStorage.getItem('sd_' + k), set: (k, v) => localStorage.setItem('sd_' + k, v) };

/* ══ STATE ══ */
let OWNER_NAME = 'Mr H', CLIENT_ID = '', FOLDER_ID = '';
let driveToken = null;
let gapiReady = false, gisReady = false, tokenClient = null;

/* ══ ENTRIES ══
   Each entry: { id, ts, text, synced: bool }
*/
let entries = JSON.parse(LS.get('entries') || '[]');
function saveEntries() { LS.set('entries', JSON.stringify(entries)); }

/* ══ VISUAL LOCK (keyboard shield) ══ */
(function() {
  const app = document.getElementById('app');
  if (!app) return;
  function setH() {
    const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--vl-locked-h', h + 'px');
  }
  setH();
  window.addEventListener('resize', setH, { passive: true });
  if (window.visualViewport) {
    const onVP = () => {
      const vv = window.visualViewport;
      app.style.height = vv.height + 'px';
      app.style.top = vv.offsetTop + 'px';
      const dl = document.getElementById('diaryLog');
      if (dl && (window.innerHeight - vv.height) > 100) setTimeout(() => { dl.scrollTop = dl.scrollHeight; }, 80);
    };
    window.visualViewport.addEventListener('resize', onVP, { passive: true });
    window.visualViewport.addEventListener('scroll', onVP, { passive: true });
    onVP();
  }
})();

/* ══ THEME ══ */
let theme = LS.get('theme') || 'dark';
function applyTheme(t) {
  const r = document.documentElement.style;
  if (t === 'light') {
    r.setProperty('--bg', '#f0f0f0'); r.setProperty('--text', '#080808');
    r.setProperty('--sub', 'rgba(0,0,0,0.5)'); r.setProperty('--line', 'rgba(0,0,0,0.12)');
    r.setProperty('--line-hi', 'rgba(0,0,0,0.3)'); r.setProperty('--green', '#008844');
    r.setProperty('--green-glow', '#00aa55'); r.setProperty('--sync-txt', '#006633');
  } else {
    r.setProperty('--bg', '#000000'); r.setProperty('--text', '#ffffff');
    r.setProperty('--sub', 'rgba(255,255,255,0.45)'); r.setProperty('--line', 'rgba(255,255,255,0.12)');
    r.setProperty('--line-hi', 'rgba(255,255,255,0.3)'); r.setProperty('--green', '#00cc66');
    r.setProperty('--green-glow', '#00ff88'); r.setProperty('--sync-txt', '#00ff88');
  }
}
applyTheme(theme);
document.getElementById('modeBtn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark'; LS.set('theme', theme); applyTheme(theme);
});

/* ══ PRESENCE / STATUS ══ */
function setPresence(state) {
  const dot = document.getElementById('presenceDot');
  const orb = document.getElementById('orb');
  const strip = document.getElementById('statusStrip');
  if (dot) dot.className = state;
  if (orb) orb.className = state;
  if (strip) strip.classList.toggle('syncing', state === 'syncing');
}
function setStatus(msg) { const el = document.getElementById('statusTxt'); if (el) el.textContent = msg; }

/* ══ PANELS ══ */
const panels = document.querySelectorAll('.panel');
const navItems = document.querySelectorAll('.nav-item');
function activatePanel(id) {
  panels.forEach(p => p.classList.remove('active'));
  navItems.forEach(n => n.classList.remove('active'));
  const p = document.getElementById(id); if (p) p.classList.add('active');
  if (id === 'logPanel') renderLog();
}
navItems.forEach(btn => {
  btn.addEventListener('click', () => {
    navItems.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activatePanel(btn.dataset.panel);
  });
});

/* ══ RENDER DIARY LOG (write panel — today's entries) ══ */
function renderDiaryLog() {
  const container = document.getElementById('diaryLog');
  container.innerHTML = '';
  if (!entries.length) {
    container.innerHTML = '<div class="empty-state">No entries yet — start writing</div>';
    return;
  }
  // Show today's entries in write panel, newest first
  const today = new Date().toDateString();
  const todayEntries = entries.filter(e => new Date(e.ts).toDateString() === today);
  if (!todayEntries.length) {
    container.innerHTML = '<div class="empty-state">Nothing written today yet</div>';
    return;
  }
  [...todayEntries].reverse().forEach(e => {
    const el = document.createElement('div');
    el.className = 'entry';
    const time = new Date(e.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    el.innerHTML = `
      <div class="entry-ts">
        <span>${time}${e.synced ? ' · ☁' : ''}</span>
        <button class="entry-del" onclick="deleteEntry('${e.id}')">✕</button>
      </div>
      <div class="entry-text">${escHtml(e.text)}</div>`;
    container.appendChild(el);
  });
  container.scrollTop = container.scrollHeight;
}

/* ══ RENDER ALL LOG (log panel) ══ */
function renderLog() {
  const container = document.getElementById('logList');
  container.innerHTML = '';
  if (!entries.length) {
    container.innerHTML = '<div class="empty-state">No entries yet</div>';
    return;
  }
  const unsynced = entries.filter(e => !e.synced).length;
  const msg = document.getElementById('syncStatusMsg');
  if (msg) msg.textContent = unsynced > 0 ? `${unsynced} entry${unsynced > 1 ? 's' : ''} pending sync` : (entries.length ? 'All entries synced ✓' : '');

  [...entries].reverse().forEach(e => {
    const el = document.createElement('div');
    el.className = 'log-entry';
    const d = new Date(e.ts);
    const dateStr = d.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    el.innerHTML = `
      <div class="log-ts">${dateStr} · ${timeStr}</div>
      <div class="log-text">${escHtml(e.text)}</div>
      <div class="sync-info ${e.synced ? 'synced' : ''}">${e.synced ? '☁ synced to Drive' : '○ not yet synced'}</div>`;
    container.appendChild(el);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══ SAVE ENTRY ══ */
function saveEntry() {
  const box = document.getElementById('diaryBox');
  const text = box.value.trim();
  if (!text) return;
  const entry = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    ts: new Date().toISOString(),
    text,
    synced: false
  };
  entries.push(entry);
  saveEntries();
  box.value = '';
  box.style.height = 'auto';
  renderDiaryLog();
  setStatus('saved · ' + OWNER_NAME.toLowerCase());
  setTimeout(() => setStatus(driveToken ? 'online · ' + OWNER_NAME.toLowerCase() : 'offline'), 1800);
}

const diaryBox = document.getElementById('diaryBox');
diaryBox.addEventListener('input', () => { diaryBox.style.height = 'auto'; diaryBox.style.height = Math.min(diaryBox.scrollHeight, 140) + 'px'; });
diaryBox.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); saveEntry(); } });
document.getElementById('saveBtn').addEventListener('click', saveEntry);

/* ══ DELETE ENTRY ══ */
window.deleteEntry = id => {
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  renderDiaryLog();
};

/* ══ CLEAR ALL ══ */
document.getElementById('clearAllBtn').addEventListener('click', () => {
  if (!entries.length) return;
  if (!confirm('Delete all diary entries? This cannot be undone.')) return;
  entries = [];
  saveEntries();
  renderLog();
  renderDiaryLog();
});

/* ══ DRIVE SETUP ══ */
function loadDriveLibs() {
  if (!CLIENT_ID) return;
  if (!window.gapi) {
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = () => { gapi.load('client', () => { gapi.client.init({}).then(() => { gapiReady = true; }); }); };
    document.head.appendChild(s);
  }
  if (!window.google?.accounts) {
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => { gisReady = true; };
    document.head.appendChild(s);
  }
}

function authDrive(callback) {
  if (!CLIENT_ID) { setStatus('no client id — Drive unavailable'); return; }
  if (location.protocol !== 'https:' && location.protocol !== 'http:') {
    setStatus('needs https for Drive');
    return;
  }
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: (r) => {
        if (r.error) { setPresence('offline'); setStatus('auth failed'); return; }
        driveToken = r.access_token;
        gapi.client.setToken({ access_token: driveToken });
        setPresence('online');
        setStatus('drive connected · ' + OWNER_NAME.toLowerCase());
        document.getElementById('syncBtn').classList.add('success');
        if (callback) callback();
      }
    });
  }
  tokenClient.requestAccessToken({ prompt: '' });
}

/* ══ SYNC TO DRIVE ══ */
async function syncToDrive() {
  const unsynced = entries.filter(e => !e.synced);
  if (!unsynced.length) { setStatus('nothing to sync'); setTimeout(() => setStatus('online · ' + OWNER_NAME.toLowerCase()), 1600); return; }

  setPresence('syncing');
  setStatus('syncing ' + unsynced.length + ' entr' + (unsynced.length > 1 ? 'ies' : 'y') + '…');
  document.getElementById('syncBtn').classList.add('syncing');
  document.getElementById('statusStrip').classList.add('syncing');

  // Build diary content — append to existing file or create new
  const filename = 'sonia_diary_' + OWNER_NAME.toLowerCase().replace(/\s+/g, '_') + '.json';

  try {
    // Check if file already exists
    const searchRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${filename}'${FOLDER_ID ? "+and+'"+FOLDER_ID+"'+in+parents" : ''}&fields=files(id)`,
      { headers: { 'Authorization': 'Bearer ' + driveToken } }
    );
    const searchData = await searchRes.json();
    const existingId = searchData.files?.[0]?.id || null;

    let existingEntries = [];
    if (existingId) {
      // Download existing to merge
      const dlRes = await fetch(`https://www.googleapis.com/drive/v3/files/${existingId}?alt=media`, {
        headers: { 'Authorization': 'Bearer ' + driveToken }
      });
      try { existingEntries = await dlRes.json(); } catch (e) { existingEntries = []; }
    }

    // Merge: existing + new unsynced (avoid duplicates by id)
    const existingIds = new Set(existingEntries.map(e => e.id));
    const merged = [...existingEntries, ...unsynced.filter(e => !existingIds.has(e.id))];
    merged.sort((a, b) => new Date(a.ts) - new Date(b.ts));

    const body = JSON.stringify(merged, null, 2);
    const blob = new Blob([body], { type: 'application/json' });

    let uploadRes;
    if (existingId) {
      // Update existing file
      uploadRes = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + driveToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      // Create new file
      const meta = { name: filename, mimeType: 'application/json' };
      if (FOLDER_ID) meta.parents = [FOLDER_ID];
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
      form.append('file', blob);
      uploadRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + driveToken },
        body: form
      });
    }

    if (uploadRes.ok) {
      // Mark all as synced
      const syncedIds = new Set(unsynced.map(e => e.id));
      entries = entries.map(e => syncedIds.has(e.id) ? { ...e, synced: true } : e);
      saveEntries();
      setPresence('online');
      setStatus('synced ' + unsynced.length + ' entr' + (unsynced.length > 1 ? 'ies' : 'y') + ' ✓');
      document.getElementById('syncBtn').classList.remove('syncing');
      document.getElementById('syncBtn').classList.add('success');
      document.getElementById('statusStrip').classList.remove('syncing');
      renderDiaryLog();
      renderLog();
      setTimeout(() => setStatus('online · ' + OWNER_NAME.toLowerCase()), 2500);
    } else {
      throw new Error('Upload failed: ' + uploadRes.status);
    }
  } catch (err) {
    setPresence('offline');
    setStatus('sync failed — try again');
    document.getElementById('syncBtn').classList.remove('syncing');
    document.getElementById('statusStrip').classList.remove('syncing');
    console.error('Sync error:', err);
  }
}

function triggerSync() {
  if (!CLIENT_ID) { setStatus('no Drive configured'); setTimeout(() => setStatus('offline'), 2000); return; }
  if (!driveToken) {
    authDrive(() => syncToDrive());
  } else {
    syncToDrive();
  }
}

document.getElementById('syncBtn').addEventListener('click', triggerSync);
document.getElementById('syncAllBtn').addEventListener('click', triggerSync);

/* ══ SETUP / CONFIG ══ */
function applyConfig(skipDrive) {
  OWNER_NAME = document.getElementById('cfgOwner').value.trim() || 'Mr H';
  CLIENT_ID = document.getElementById('cfgClient').value.trim();
  FOLDER_ID = document.getElementById('cfgFolder').value.trim();
  LS.set('owner', OWNER_NAME);
  LS.set('client', CLIENT_ID);
  LS.set('folder', FOLDER_ID);
  document.getElementById('setup').style.display = 'none';
  if (CLIENT_ID && !skipDrive) loadDriveLibs();
  setStatus(CLIENT_ID ? 'ready · ' + OWNER_NAME.toLowerCase() : 'offline · ' + OWNER_NAME.toLowerCase());
  setPresence(CLIENT_ID ? 'online' : 'offline');
  renderDiaryLog();
  renderLog();
}

function loadConfig() {
  const o = LS.get('owner'), c = LS.get('client'), f = LS.get('folder');
  if (o) document.getElementById('cfgOwner').value = o;
  if (c) document.getElementById('cfgClient').value = c;
  if (f) document.getElementById('cfgFolder').value = f;
  // Auto-launch if name is set (previous session)
  if (o) {
    applyConfig(false);
  }
}

document.getElementById('setupBtn').addEventListener('click', () => applyConfig(false));
document.getElementById('skipBtn').addEventListener('click', () => applyConfig(true));
document.getElementById('cfgOwner').addEventListener('keydown', e => { if (e.key === 'Enter') applyConfig(false); });

window.addEventListener('DOMContentLoaded', loadConfig);

/* ══ ONLINE INDICATOR ══ */
window.addEventListener('online', () => {
  setStatus(driveToken ? 'online · ' + OWNER_NAME.toLowerCase() : 'connection available');
  if (CLIENT_ID && !driveToken) document.getElementById('syncBtn').title = 'Tap to connect Drive';
});
window.addEventListener('offline', () => {
  setStatus('offline · entries saved locally');
  setPresence('offline');
});
</script>
