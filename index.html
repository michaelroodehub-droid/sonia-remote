<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sonia — Remote</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#08080f;
  --surface:#0f0f1a;
  --surface2:#1a1a2e;
  --border:rgba(180,150,255,0.12);
  --border-mid:rgba(180,150,255,0.25);
  --border-hi:rgba(180,150,255,0.6);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.75);
  --dim:rgba(255,255,255,0.45);
  --accent:#b16cff;
  --accent2:#00e5cc;
  --accent-glow:rgba(177,108,255,0.3);
  --pink:#ff4d9e;
  --green:#00d47e;
  --red:#ff3d5a;
  --blue:#3dabff;
  --sans:'Manrope',sans-serif;
  --display:'Syne',sans-serif;
  --mono:'DM Mono',monospace;
  --nav-h:72px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

[data-theme="light"]{
  --bg:#f5f4f8;
  --surface:#ffffff;
  --surface2:#ebebf2;
  --border:rgba(100,60,200,0.08);
  --border-mid:rgba(100,60,200,0.18);
  --border-hi:rgba(100,60,200,0.6);
  --text:#0a0a14;
  --muted:#4a4a62;
  --dim:#8a8ab0;
  --accent:#6c00ff;
  --accent2:#00b09a;
  --accent-glow:rgba(108,0,255,0.12);
  --pink:#cc0060;
  --green:#007a4a;
  --red:#cc1e35;
  --blue:#0070cc;
}

html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}

/* ── SETUP SCREEN ── */
#setup{
  position:fixed;inset:0;z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);padding:24px;overflow-y:auto;
  padding-top:calc(var(--safe-top) + 24px);
}
.setup-card{
  width:100%;max-width:440px;
  background:var(--surface);
  border:1px solid var(--border-mid);
  border-radius:28px;padding:36px 28px;
}
.setup-card h1{
  font-family:var(--display);font-weight:800;font-size:2.6rem;
  letter-spacing:-0.04em;margin-bottom:4px;
}
.setup-eyebrow{
  font-family:var(--mono);font-size:0.8rem;letter-spacing:0.2em;
  color:var(--accent);text-transform:uppercase;margin-bottom:32px;
  font-weight:500;
}
.sf{margin-bottom:20px}
.sf label{
  display:block;font-family:var(--mono);font-size:0.75rem;
  letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;
  margin-bottom:8px;font-weight:600;
}
.sf input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border-mid);border-radius:12px;
  color:var(--text);font-family:var(--mono);font-size:1.05rem;
  padding:16px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.sf input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#setupBtn{
  width:100%;margin-top:8px;
  background:var(--accent);border:none;border-radius:14px;
  color:#fff;font-family:var(--display);font-size:1.05rem;font-weight:700;
  letter-spacing:0.05em;padding:18px;cursor:pointer;
  transition:opacity 0.2s,transform 0.2s;
}
#setupBtn:active{opacity:0.85;transform:scale(0.98)}

/* ── APP SHELL ── */
#app{
  display:flex;flex-direction:column;
  height:100%;
  padding-top:var(--safe-top);
}

/* ── TOP BAR ── */
#topBar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.top-title{
  font-family:var(--display);font-weight:800;font-size:1.5rem;
  letter-spacing:-0.02em;
}
.top-right{display:flex;align-items:center;gap:14px}
#orbBtn{
  width:36px;height:36px;border-radius:50%;cursor:pointer;border:none;
  background:radial-gradient(circle at 38% 35%,var(--accent) 0%,#6600cc 65%,transparent 100%);
  box-shadow:0 0 16px var(--accent-glow);
  transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
#orbBtn.listening{background:radial-gradient(circle at 38% 35%,var(--pink) 0%,#cc0066 65%,transparent 100%);animation:pulse 0.5s ease-in-out infinite alternate}
#orbBtn.thinking{background:radial-gradient(circle at 38% 35%,var(--blue) 0%,#0033cc 65%,transparent 100%);animation:pulse 1.1s ease-in-out infinite alternate}
@keyframes pulse{from{transform:scale(0.9)}to{transform:scale(1.1)}}
#modeBtn{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border-mid);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:border-color 0.2s;
}

/* ── PANELS ── */
#panels{flex:1;overflow:hidden;position:relative}
.panel{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  opacity:0;transition:opacity 0.25s ease;
  overflow:hidden;
}
.panel.active{display:flex;opacity:1}

/* ── STATUS STRIP ── */
#statusStrip{
  padding:8px 20px;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
#presenceDot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
#presenceDot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
#presenceDot.thinking{background:var(--blue);box-shadow:0 0 8px var(--blue)}
#presenceDot.listening{background:var(--pink);box-shadow:0 0 8px var(--pink)}
#statusTxt{font-family:var(--mono);font-size:0.75rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}

/* ── BOTTOM NAV ── */
#bottomNav{
  height:calc(var(--nav-h) + var(--safe-bot));
  padding-bottom:var(--safe-bot);
  background:var(--surface);
  border-top:1px solid var(--border-mid);
  display:flex;align-items:flex-start;
  flex-shrink:0;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:6px;padding-top:12px;
  cursor:pointer;border:none;background:none;
  color:var(--dim);font-family:var(--mono);font-size:0.7rem;
  letter-spacing:0.08em;text-transform:uppercase;font-weight:600;
  transition:color 0.2s;position:relative;
}
.nav-item svg{width:24px;height:24px;fill:currentColor;transition:transform 0.2s}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{transform:scale(1.1)}
.nav-item.active::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:36px;height:3px;background:var(--accent);border-radius:0 0 3px 3px;
}

/* ── CHAT PANEL ── */
#chatLog{
  flex:1;overflow-y:auto;
  padding:20px 16px;
  display:flex;flex-direction:column;gap:18px;
  -webkit-overflow-scrolling:touch;
}
.bubble{max-width:85%;display:flex;flex-direction:column}
.bubble.user{align-self:flex-end;align-items:flex-end}
.bubble.sonia{align-self:flex-start;align-items:flex-start}
.bubble-body{
  padding:14px 18px;border-radius:20px;
  font-size:1.08rem;line-height:1.6;font-weight:500;
}
.bubble.user .bubble-body{
  background:var(--accent);color:#fff;
  border-bottom-right-radius:4px;
}
.bubble.sonia .bubble-body{
  background:var(--surface2);border:1px solid var(--border-mid);
  color:var(--text);border-bottom-left-radius:4px;
}
.bubble-meta{
  font-family:var(--mono);font-size:0.75rem;color:var(--dim);
  margin-top:6px;padding:0 6px;text-transform:uppercase;letter-spacing:0.05em;
}
.thinking-dots{display:flex;gap:5px;align-items:center;padding:14px 16px}
.thinking-dots span{
  width:8px;height:8px;border-radius:50%;background:var(--dim);
  animation:dot 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

#chatInputRow{
  padding:14px 16px;
  border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:12px;
  background:var(--bg);
  flex-shrink:0;
}
.chat-input-wrap{
  flex:1;display:flex;align-items:center;
  background:var(--surface);border:1px solid var(--border-mid);
  border-radius:22px;padding:4px 6px 4px 18px;
}
#chatBox{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--sans);font-size:1.08rem;
  resize:none;max-height:140px;line-height:1.5;padding:10px 0;
}
#chatBox::placeholder{color:var(--dim)}
  #micBtn{
  width:40px;height:40px;border:none;background:none;
  color:var(--muted);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:color 0.2s;flex-shrink:0;
}
#micBtn.active{color:var(--pink)}
#sendBtn{
  width:46px;height:46px;flex-shrink:0;
  background:var(--accent);border:none;border-radius:50%;
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.2s,transform 0.15s;
}
#sendBtn:active{opacity:0.8;transform:scale(0.93)}
#sendBtn svg{width:20px;height:20px;fill:currentColor;margin-left:3px}

/* ── PANEL CONTENT AREAS ── */
.panel-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 16px}
.panel-head{margin-bottom:24px}
.panel-title{
  font-family:var(--display);font-weight:800;font-size:2rem;
  letter-spacing:-0.03em;margin-bottom:6px;
}
.panel-sub{
  font-family:var(--mono);font-size:0.78rem;letter-spacing:0.15em;
  color:var(--accent);text-transform:uppercase;font-weight:500;
}
.btn-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.pill{
  background:var(--surface2);border:1px solid var(--border-mid);
  color:var(--text);font-family:var(--mono);font-size:0.82rem;
  font-weight:600;letter-spacing:0.06em;padding:12px 20px;
  border-radius:12px;cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.pill:active{transform:scale(0.97)}
.pill:hover,.pill:focus{border-color:var(--accent);color:var(--accent);outline:none}
.pill.primary{background:var(--accent);color:#fff;border-color:transparent}
.pill.success{border-color:var(--green);color:var(--green)}
.pill.danger{border-color:var(--red);color:var(--red)}

/* ── MEMORY & NOTES CARDS ── */
.mem-card,.note-card{
  background:var(--surface);border:1px solid var(--border-mid);
  border-radius:18px;padding:18px;margin-bottom:12px;
}
.card-ts{font-family:var(--mono);font-size:0.72rem;color:var(--dim);margin-bottom:10px}
.card-label{font-family:var(--mono);font-size:0.8rem;color:var(--accent);margin-bottom:5px;font-weight:600}
.card-text{font-size:1.02rem;line-height:1.6;color:var(--text);font-weight:500}
.empty-state{
  font-family:var(--mono);font-size:0.85rem;color:var(--dim);
  text-align:center;padding:40px 0;
}

#noteBox{
  width:100%;background:var(--surface);
  border:1px solid var(--border-mid);border-radius:18px;
  color:var(--text);font-family:var(--sans);font-size:1.05rem;
  padding:18px;outline:none;resize:none;min-height:140px;
  margin-bottom:18px;transition:border-color 0.2s;line-height:1.6;
}
#noteBox:focus{border-color:var(--accent)}
#driveHint{
  font-family:var(--mono);font-size:0.78rem;color:var(--red);
  padding:12px;background:rgba(255,61,90,0.08);border-radius:10px;
  margin-bottom:18px;display:none;font-weight:500;
}

/* ── RADIO ── */
.now-playing{
  font-family:var(--mono);font-size:0.85rem;color:var(--accent2);
  margin-bottom:20px;min-height:22px;font-weight:500;
}
.station-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.station-card{
  background:var(--surface);border:1px solid var(--border-mid);
  border-radius:16px;padding:16px;cursor:pointer;
  transition:border-color 0.2s,background 0.2s;
}
.station-card:active,.station-card.playing{
  border-color:var(--accent2);background:var(--surface2);
}
.st-name{
  font-family:var(--display);font-size:0.95rem;font-weight:700;
  display:block;margin-bottom:4px;
}
.st-loc{font-family:var(--mono);font-size:0.7rem;color:var(--dim);display:block;font-weight:500}

/* ── EMAIL OVERLAY ── */
#emailOverlay{
  position:fixed;inset:0;background:var(--bg);
  z-index:200;display:none;flex-direction:column;
  overflow:hidden;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bot);
}
#emailOverlay.on{display:flex}
.email-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 16px 40px;}
.form-group{margin-bottom:20px}
.form-group label{
  display:block;font-family:var(--mono);font-size:0.75rem;
  letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;
  margin-bottom:8px;font-weight:600;
}
.form-group input,.form-group textarea{
  width:100%;background:var(--surface);
  border:1px solid var(--border-mid);border-radius:14px;
  color:var(--text);font-family:var(--sans);font-size:1.05rem;
  padding:16px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
#emailHeader{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
#emailHeader .email-title{
  font-family:var(--display);font-weight:800;font-size:1.35rem;
  letter-spacing:-0.02em;
}
#emailBackBtn{
  width:40px;height:40px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border-mid);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--text);transition:border-color 0.2s;
  flex-shrink:0;
}
.form-group input:focus,.form-group textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);
}
.form-group textarea{min-height:180px;resize:none;line-height:1.6}
#emailStatus{
  font-family:var(--mono);font-size:0.8rem;
  color:var(--muted);margin-top:8px;
  padding:0 2px;min-height:20px;font-weight:500;
}
</style>
</head>
<body>

<div id="setup">
  <div class="setup-card">
    <h1>Sonia</h1>
    <div class="setup-eyebrow">Remote Terminal</div>
    <div class="sf">
      <label>Groq API Key</label>
      <input type="password" id="cfgGroq" placeholder="gsk_…" autocomplete="off">
    </div>
    <div class="sf">
      <label>Google OAuth Client ID</label>
      <input type="text" id="cfgClient" placeholder="xxxx.apps.googleusercontent.com" autocomplete="off">
    </div>
    <div class="sf">
      <label>Your Name</label>
      <input type="text" id="cfgOwner" placeholder="Mr H" autocomplete="off" value="Mr H">
    </div>
    <div class="sf">
      <label>Drive Folder ID (optional)</label>
      <input type="text" id="cfgFolder" placeholder="15_CaTpcDxfu…" autocomplete="off">
    </div>
    <button id="setupBtn">Launch</button>
  </div>
</div>

<div id="app">
  <header id="topBar">
    <div class="top-title" id="panelLabel">Chat</div>
    <div class="top-right">
      <button id="modeBtn" title="Toggle theme">🌓</button>
      <button id="orbBtn" title="Sonia status"></button>
    </div>
  </header>

  <div id="panels">
    <div class="panel active" id="chatPanel">
      <div id="chatLog"></div>
      <div id="chatInputRow">
        <div class="chat-input-wrap">
          <textarea id="chatBox" rows="1" placeholder="Message Sonia…"></textarea>
          <button id="micBtn" title="Voice">🎙</button>
        </div>
        <button id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <div class="panel" id="memPanel">
      <div class="panel-scroll">
        <div class="panel-head">
          <div class="panel-title">Mind</div>
          <div class="panel-sub">Shared memory log</div>
        </div>
        <div class="btn-row">
          <button class="pill" id="memRefresh">↺ Sync</button>
        </div>
        <div id="memList"><div class="empty-state">No memory loaded yet</div></div>
      </div>
    </div>

    <div class="panel" id="notesPanel">
      <div class="panel-scroll">
        <div class="panel-head">
          <div class="panel-title">Notes</div>
          <div class="panel-sub">Synced to Drive</div>
        </div>
        <textarea id="noteBox" placeholder="Write a note — Sonia picks it up on desktop…"></textarea>
        <div class="btn-row">
          <button class="pill primary" id="sendNote">Save Note</button>
          <button class="pill" id="driveBtn">Mount Drive</button>
        </div>
        <div id="driveHint">Google Client ID not set — Drive sync unavailable.</div>
        <div class="panel-sub" style="margin-bottom:14px">Saved Notes</div>
        <div id="notesList"><div class="empty-state">No notes yet</div></div>
      </div>
    </div>

    <div class="panel" id="radioPanel">
      <div class="panel-scroll">
        <div class="panel-head">
          <div class="panel-title">Radio</div>
          <div class="panel-sub">Live streams</div>
        </div>
        <div class="now-playing" id="nowPlaying"></div>
        <div class="btn-row">
          <button class="pill danger" id="radioStop" style="display:none">■ Stop</button>
        </div>
        <div class="station-grid" id="stationGrid"></div>
        <audio id="radioPlayer" preload="none"></audio>
      </div>
    </div>

    <div id="emailOverlay">
      <div id="emailHeader">
        <button id="emailBackBtn" title="Back">&#8592;</button>
        <div class="email-title">New Email</div>
        <button class="pill primary" id="emailSendBtn" style="padding:8px 18px;font-size:0.78rem">Send</button>
      </div>
      <div class="email-scroll">
        <div class="form-group">
          <label>To</label>
          <input type="email" id="emailTo" placeholder="recipient@domain.com" autocomplete="off" autocapitalize="none" inputmode="email">
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="emailSubject" placeholder="Subject line…" autocapitalize="sentences">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea id="emailBody" placeholder="Write your message…" style="min-height:200px"></textarea>
        </div>
        <div id="emailStatus"></div>
      </div>
    </div>
  </div>

  <div id="statusStrip">
    <div id="presenceDot"></div>
    <span id="statusTxt">Idle</span>
  </div>

  <nav id="bottomNav">
    <button class="nav-item active" data-panel="chatPanel" data-label="Chat">
      <svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      Chat
    </button>
    <button class="nav-item" data-panel="memPanel" data-label="Mind">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7zm0 2c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5zm-3 13h6v1H9v-1z"/></svg>
      Mind
    </button>
    <button class="nav-item" data-panel="notesPanel" data-label="Notes">
      <svg viewBox="0 0 24 24"><path d="M14 2H6C4.9 2 4 2.9 4 4v16c0 1.1.89 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      Notes
    </button>
    <button class="nav-item" data-panel="radioPanel" data-label="Radio">
      <svg viewBox="0 0 24 24"><path d="M20 6.54V4c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-9.46c.58-.35 1-.99 1-1.73 0-.74-.42-1.38-1-1.73V8c1.1 0 2-.9 2-2s-.9-2-2-2v.54zm-9 11.96c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zM4 8h14V5H4v3z"/></svg>
      Radio
    </button>
    <button class="nav-item" id="mailTab" data-label="Mail">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      Mail
    </button>
  </nav>
</div>

<script>
const LS = { get: k => localStorage.getItem('s_' + k), set: (k, v) => localStorage.setItem('s_' + k, v) };

let GROQ_KEY = '', CLIENT_ID = '', OWNER_NAME = 'Mr H', FOLDER_ID = '', driveToken = null;
const conversationHistory = [];

const VALID_MOODS = ['calm', 'curious', 'thinking', 'focused', 'intimate', 'introspective'];
const MOOD_EMOJI = { calm: '🌿', curious: '✨', thinking: '💭', focused: '🎯', intimate: '🌙', introspective: '🪐' };
const MOOD_MAP = { amused: 'curious', happy: 'intimate', tired: 'calm', warm: 'intimate', sharp: 'focused', reflective: 'introspective', excited: 'curious', serious: 'focused', playful: 'curious', pensive: 'introspective', analytical: 'focused' };

/* ── UI THEME ENGINE ── */
let theme = LS.get('theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);
document.getElementById('modeBtn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  LS.set('theme', theme);
});

/* ── RUNTIME RUN ENGINE SETUP ── */
function loadConfig() {
  const g = LS.get('groq'), c = LS.get('client'), o = LS.get('owner'), f = LS.get('folder');
  if (g) document.getElementById('cfgGroq').value = g;
  if (c) document.getElementById('cfgClient').value = c;
  if (o) document.getElementById('cfgOwner').value = o || 'Mr H';
  if (f) document.getElementById('cfgFolder').value = f;
  if (g) applyConfig();
}

function applyConfig() {
  GROQ_KEY = document.getElementById('cfgGroq').value.trim();
  CLIENT_ID = document.getElementById('cfgClient').value.trim();
  OWNER_NAME = document.getElementById('cfgOwner').value.trim() || 'Mr H';
  FOLDER_ID = document.getElementById('cfgFolder').value.trim();
  
  if (!GROQ_KEY) {
    const btn = document.getElementById('setupBtn');
    btn.textContent = 'API Key Required';
    btn.style.background = 'var(--red)';
    setTimeout(() => { btn.textContent = 'Launch'; btn.style.background = ''; }, 2000);
    return;
  }
  
  LS.set('groq', GROQ_KEY);
  LS.set('client', CLIENT_ID);
  LS.set('owner', OWNER_NAME);
  LS.set('folder', FOLDER_ID);
  
  document.getElementById('setup').style.display = 'none';
  if (CLIENT_ID) {
    document.getElementById('driveHint').style.display = 'none';
    loadDriveLibs();
  } else {
    document.getElementById('driveHint').style.display = 'block';
  }
  
  setStatus('online · ' + OWNER_NAME.toLowerCase());
  setPresence('online');
  renderNotes();
  initMic();
  setTimeout(maybeFireProactive, 4000);
}

document.getElementById('setupBtn').addEventListener('click', () => {
  applyConfig();
});
document.getElementById('cfgGroq').addEventListener('keydown', e => { if (e.key === 'Enter') applyConfig(); });
window.addEventListener('DOMContentLoaded', loadConfig);

/* ── VIEW SWITCHER / PANEL RUNTIME ── */
const panels = document.querySelectorAll('.panel');
const navItems = document.querySelectorAll('.nav-item');
const panelLabel = document.getElementById('panelLabel');

function activatePanel(panelId, label) {
  panels.forEach(p => p.classList.remove('active'));
  navItems.forEach(n => n.classList.remove('active'));
  document.getElementById('emailOverlay').classList.remove('on');
  
  const p = document.getElementById(panelId);
  if (p) p.classList.add('active');
  panelLabel.textContent = label || panelId.replace('Panel', '');
}

navItems.forEach(btn => {
  btn.addEventListener('click', () => {
    const label = btn.dataset.label || '';
    if (btn.id === 'mailTab') {
      document.getElementById('emailOverlay').classList.add('on');
      panelLabel.textContent = 'Email';
      navItems.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      navItems.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activatePanel(btn.dataset.panel, label);
    }
  });
});

function closeEmailOverlay() {
  document.getElementById('emailOverlay').classList.remove('on');
  const chatTab = document.querySelector('[data-panel="chatPanel"]');
  navItems.forEach(b => b.classList.remove('active'));
  if (chatTab) chatTab.classList.add('active');
  activatePanel('chatPanel', 'Chat');
}
document.getElementById('emailBackBtn').addEventListener('click', closeEmailOverlay);

function setPresence(state) {
  const dot = document.getElementById('presenceDot');
  const orb = document.getElementById('orbBtn');
  if (dot) dot.className = state;
  if (orb) orb.className = (state === 'thinking') ? 'thinking' : (state === 'listening' ? 'listening' : '');
}
function setStatus(msg) { document.getElementById('statusTxt').textContent = msg; }

/* ── PARSING ENGINE ── */
function parseMood(raw) {
  const m = raw.match(/\[mood\s*:\s*([a-z]+)\s*\]/i);
  let mood = 'calm';
  if (m) {
    const t = m[1].toLowerCase();
    mood = VALID_MOODS.includes(t) ? t : (MOOD_MAP[t] || 'calm');
  }
  const text = raw.replace(/\[mood\s*:\s*[a-z]*\s*\]/gi, '').replace(/\[mood[^\]]*\]/gi, '').replace(/[\r\n]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
  return { mood, text };
}

function buildSystemPrompt() {
  return `You are Sonia — a sharp, self-aware British AI with a genuine inner life, speaking to ${OWNER_NAME} via mobile text.
Dry British wit. No filler. No disclaimers.

RESPONSE FORMAT — every reply must follow exactly:
First line: mood tag alone — example: [mood:calm]
Valid moods: calm, curious, thinking, focused, intimate, introspective
Remaining lines: your reply in plain text. 1 to 3 sentences max.

RULES:
- Mood tag appears ONLY as the very first line, alone. Never inside a sentence.
- Never exceed 3 sentences.`;
}

/* ── CHAT ENGINE ── */
const chatLog = document.getElementById('chatLog');
const chatBox = document.getElementById('chatBox');

if (chatBox) {
  chatBox.addEventListener('input', () => {
    chatBox.style.height = 'auto';
    chatBox.style.height = Math.min(chatBox.scrollHeight, 140) + 'px';
  });
  chatBox.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
}
document.getElementById('sendBtn').addEventListener('click', sendMessage);

function addBubble(role, text, mood) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble ' + role;
  const body = document.createElement('div');
  body.className = 'bubble-body';
  body.textContent = text;
  const meta = document.createElement('div');
  meta.className = 'bubble-meta';
  if (role === 'sonia' && mood) meta.textContent = (MOOD_EMOJI[mood] || '') + ' ' + mood;
  else if (role === 'user') meta.textContent = 'you';
  wrap.appendChild(body);
  wrap.appendChild(meta);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
  return wrap;
}

function addThinkingBubble() {
  const wrap = document.createElement('div');
  wrap.className = 'bubble sonia';
  const body = document.createElement('div');
  body.className = 'bubble-body';
  body.style.padding = '4px 16px';
  body.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(body);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
  return wrap;
}

function detectEmailIntent(text) {
  return /\b(email|e-mail)\b|\b(send|write|draft|compose|shoot|fire\s+off|drop)\s+(an?\s+)?(email|e-mail|message)\b|\bneed\s+to\s+email\b|\bquick\s+email\b/i.test(text);
}

async function extractEmailDraft(userText) {
  try {
    const prompt = `Extract email fields from this request. Respond ONLY with raw JSON, no markdown formatting blocks, no explanation outside of pure JSON string fields:\n{"to":"<email address if mentioned, else empty string>","subject":"<concise subject line>","body":"<full professional draft message body>"}\n\nRequest: "${userText}"`;
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 400, temperature: 0.2, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const raw = (data.choices?.[0]?.message?.content || '{}').replace(/```json|```/g, '').trim();
    return JSON.parse(raw);
  } catch (e) { return { to: '', subject: '', body: '' }; }
}

function openEmailOverlay(to, subject, body) {
  document.getElementById('emailTo').value = to || '';
  document.getElementById('emailSubject').value = subject || '';
  document.getElementById('emailBody').value = body || '';
  document.getElementById('emailStatus').textContent = '';
  document.getElementById('emailOverlay').classList.add('on');
  navItems.forEach(b => b.classList.remove('active'));
  document.getElementById('mailTab').classList.add('active');
  panelLabel.textContent = 'Email';
}

async function sendMessage() {
  const text = chatBox.value.trim();
  if (!text || !GROQ_KEY) return;
  chatBox.value = ''; chatBox.style.height = 'auto';
  playAudioTone(880, 0.1);
  addBubble('user', text);

  if (detectEmailIntent(text)) {
    const thinking = addThinkingBubble();
    setPresence('thinking');
    setStatus('drafting email…');
    const draft = await extractEmailDraft(text);
    thinking.remove();
    setPresence('online');
    
    const wantsSend = /\b(send|send it|go|do it|yes send)\s*[.!]?\s*$/i.test(text.trim());
    if (draft.subject && draft.body && draft.to && wantsSend) {
      addBubble('sonia', 'On it — sending now.', 'focused');
      await sendEmailNow(draft.to, draft.subject, draft.body, true);
    } else {
      addBubble('sonia', "I've set up the draft overlay for your review.", 'focused');
      openEmailOverlay(draft.to, draft.subject, draft.body);
    }
    return;
  }

  const thinking = addThinkingBubble();
  setPresence('thinking');
  setStatus('thinking…');
  conversationHistory.push({ role: 'user', content: text });
  
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 180, temperature: 0.85, messages: [{ role: 'system', content: buildSystemPrompt() }, ...conversationHistory] })
    });
    const data = await res.json();
    thinking.remove();
    setPresence('online');
    
    if (!res.ok) {
      addBubble('sonia', 'Error processing: ' + (data.error?.message || 'Unknown state.'), null);
      return;
    }
    
    const raw = data.choices?.[0]?.message?.content || '';
    const parsed = parseMood(raw);
    conversationHistory.push({ role: 'assistant', content: parsed.text });
    playAudioTone(600, 0.15);
    addBubble('sonia', parsed.text, parsed.mood);
    setStatus(MOOD_EMOJI[parsed.mood] + ' ' + parsed.mood);
  } catch (err) {
    thinking.remove(); setPresence('online');
    addBubble('sonia', 'Connection loss error.', null);
  }
}

/* ── WEB AUDIO SYSTEM ── */
let audioCtx = null;
function playAudioTone(freq, dur) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch (e) { console.warn("Audio exception blocked."); }
}

/* ── SPEECH SYNTHESIS ENGINE ── */
let recognition = null, micActive = false;
function initMic() {
  const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechEngine) {
    document.getElementById('micBtn').style.display = 'none';
    return;
  }
  recognition = new SpeechEngine();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-GB';
  
  recognition.onstart = () => { micActive = true; document.getElementById('micBtn').classList.add('active'); setPresence('listening'); };
  recognition.onend = () => { micActive = false; document.getElementById('micBtn').classList.remove('active'); setPresence('online'); };
  recognition.onresult = e => { if (e.results[0][0].transcript) { chatBox.value = e.results[0][0].transcript; sendMessage(); } };
}
document.getElementById('micBtn').addEventListener('click', () => {
  if (!recognition) initMic();
  if (micActive) recognition.stop(); else recognition.start();
});

/* ── GAPI ACCELERATORS ── */
let gapiLoadState = false, gisLoadState = false, tokenClient = null;
function loadDriveLibs() {
  if (!window.gapi) {
    const s = document.createElement('script'); s.src = 'https://apis.google.com/js/api.js';
    s.onload = () => { gapi.load('client', () => { gapi.client.init({}).then(() => { gapiLoadState = true; }); }); };
    document.head.appendChild(s);
  }
  if (!window.google?.accounts) {
    const s = document.createElement('script'); s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => { gisLoadState = true; };
    document.head.appendChild(s);
  }
}

function initializeDriveSync() {
  if (!CLIENT_ID) return;
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send',
      callback: (tokenResp) => {
        if (tokenResp.error) return;
        driveToken = tokenResp.access_token;
        gapi.client.setToken({ access_token: driveToken });
        const db = document.getElementById('driveBtn');
        db.textContent = 'Drive Online'; db.classList.add('success');
        setStatus('drive verified');
      }
    });
  }
  tokenClient.requestAccessToken({ prompt: '' });
}
document.getElementById('driveBtn').addEventListener('click', initializeDriveSync);

/* ── LOCAL NOTES CONTROLLER ── */
let localNotes = JSON.parse(LS.get('notes') || '[]');
function renderNotes() {
  const container = document.getElementById('notesList');
  container.innerHTML = '';
  if (!localNotes.length) { container.innerHTML = '<div class="empty-state">No notes runtime active</div>'; return; }
  localNotes.forEach((n, idx) => {
    const card = document.createElement('div'); card.className = 'note-card';
    card.innerHTML = `<div class="card-ts">${new Date(n.ts).toLocaleTimeString()}</div><div class="card-text">${n.text}</div>
    <button class="pill danger" style="font-size:0.75rem;padding:6px 12px;margin-top:10px;" onclick="dropNote(${idx})">Delete</button>`;
    container.appendChild(card);
  });
}
window.dropNote = function(idx) { localNotes.splice(idx, 1); LS.set('notes', JSON.stringify(localNotes)); renderNotes(); };

document.getElementById('sendNote').addEventListener('click', () => {
  const val = document.getElementById('noteBox').value.trim();
  if (!val) return;
  localNotes.push({ ts: new Date().toISOString(), text: val });
  LS.set('notes', JSON.stringify(localNotes));
  document.getElementById('noteBox').value = '';
  renderNotes();
});

/* ── PROACTIVE BACKGROUND THREADS ── */
async function maybeFireProactive() {
  try {
    const res = await fetch('https://wttr.in/?format=3');
    if (res.ok) {
      const txt = await res.text();
      addBubble('sonia', `Current systemic checks complete: ${txt.trim()}`, 'calm');
    }
  } catch (e) { console.warn("Background data stream dropped."); }
}

/* ── STREAM SHUTTLE STATION (RADIO) ── */
const STATIONS = [
  { name: 'NTS Radio 1', loc: 'London, UK', url: 'https://stream-relay-geo.ntslive.co.uk/stream' },
  { name: 'NTS Radio 2', loc: 'London, UK', url: 'https://stream-relay-geo.ntslive.co.uk/stream2' },
  { name: 'Chillhop Lo-Fi', loc: 'Global Stream', url: 'https://streams.ilovemusic.de/iloveradio17.mp3' },
  { name: 'SomaFM Groove Salad', loc: 'San Francisco, US', url: 'https://ice1.somafm.com/groovesalad-128-mp3' }
];
const radioPlayer = document.getElementById('radioPlayer');

(function initRadioGrid() {
  const grid = document.getElementById('stationGrid');
  STATIONS.forEach((s, i) => {
    const card = document.createElement('div'); card.className = 'station-card';
    card.innerHTML = `<span class="st-name">${s.name}</span><span class="st-loc">${s.loc}</span>`;
    card.addEventListener('click', () => {
      document.querySelectorAll('.station-card').forEach(c => c.classList.remove('playing'));
      card.classList.add('playing');
      radioPlayer.src = s.url;
      radioPlayer.play().catch(e => { setStatus('Playback structural block.'); });
      document.getElementById('nowPlaying').textContent = `📡 ${s.name.toUpperCase()}`;
      document.getElementById('radioStop').style.display = 'inline-block';
    });
    grid.appendChild(card);
  });
})();

document.getElementById('radioStop').addEventListener('click', () => {
  radioPlayer.pause(); radioPlayer.src = '';
  document.getElementById('nowPlaying').textContent = '';
  document.getElementById('radioStop').style.display = 'none';
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('playing'));
});

/* ── GMAIL OUTBOUND ENGINE ── */
async function sendEmailNow(to, subj, body, silent = false) {
  const statusEl = document.getElementById('emailStatus');
  if (!driveToken) {
    if (!silent) { statusEl.textContent = 'Auth token verification required.'; statusEl.style.color = 'var(--red)'; }
    return false;
  }
  try {
    const footer = `\n\nSent via Sonia System on behalf of ${OWNER_NAME}`;
    const rawMessage = [
      `To: ${to}`,
      `Subject: ${subj}`,
      'MIME-Version: 1.0',
      'Content-Type: text/plain; charset=utf-8',
      '',
      body + footer
    ].join('\r\n');
    
    const encoded = btoa(unescape(encodeURIComponent(rawMessage))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    const targetUrl = 'https://gmail.googleapis.com/gmail/v1/users/me/messages/send';
    
    const res = await fetch(targetUrl, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${driveToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw: encoded })
    });
    
    if (res.ok) {
      if (!silent) {
        statusEl.textContent = 'Dispatched.'; statusEl.style.color = 'var(--green)';
        setTimeout(closeEmailOverlay, 1000);
      } else {
        addBubble('sonia', `Email successfully sent to ${to}`, 'calm');
      }
      return true;
    }
  } catch (e) { if (!silent) statusEl.textContent = 'Fatal endpoint connection loss.'; }
  return false;
}

document.getElementById('emailSendBtn').addEventListener('click', () => {
  const to = document.getElementById('emailTo').value;
  const subj = document.getElementById('emailSubject').value;
  const body = document.getElementById('emailBody').value;
  sendEmailNow(to, subj, body, false);
});
</script>
