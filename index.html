<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sonia</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#000000;
  --surface:#0a0a0a;
  --surface2:#111111;
  --line:rgba(255,255,255,0.1);
  --line-mid:rgba(255,255,255,0.18);
  --line-hi:rgba(255,255,255,0.35);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.55);
  --dim:rgba(255,255,255,0.28);
  --orb-idle:#8844ff;
  --orb-listen:#ff2266;
  --orb-think:#2299ff;
  --orb-speak:#00ffaa;
  --sans:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
  --nav-h:64px;
  --top-h:56px;
  --status-h:32px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --input-h:0px;
}

html,body{
  height:100%;width:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}

/* ── SETUP ── */
#setup{
  position:fixed;inset:0;z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);padding:32px 24px;
  padding-top:calc(var(--safe-top) + 32px);
}
.setup-inner{width:100%;max-width:420px}
.setup-name{
  font-family:var(--mono);font-size:2.8rem;font-weight:700;
  letter-spacing:-0.03em;margin-bottom:4px;color:var(--text);
}
.setup-sub{
  font-family:var(--mono);font-size:0.72rem;letter-spacing:0.2em;
  color:var(--dim);text-transform:uppercase;margin-bottom:40px;
}
.sf{margin-bottom:18px}
.sf label{
  display:block;font-family:var(--mono);font-size:0.68rem;
  letter-spacing:0.18em;color:var(--dim);text-transform:uppercase;
  margin-bottom:8px;
}
.sf input{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid var(--line-mid);
  color:var(--text);font-family:var(--mono);font-size:0.95rem;
  padding:12px 0;outline:none;transition:border-color 0.2s;
  border-radius:0;
}
.sf input:focus{border-bottom-color:var(--text)}
.sf input::placeholder{color:var(--dim)}
#setupBtn{
  width:100%;margin-top:32px;
  background:transparent;
  border:1px solid var(--line-mid);
  color:var(--text);font-family:var(--mono);font-size:0.85rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;padding:18px;cursor:pointer;
  transition:border-color 0.2s,color 0.2s;
}
#setupBtn:hover{border-color:var(--text)}
#setupBtn:active{opacity:0.7}

/* ── APP SHELL ── */
#app{
  display:flex;flex-direction:column;
  position:fixed;inset:0;
  padding-top:var(--safe-top);
  background:var(--bg);
}

/* ── TOP BAR ── */
#topBar{
  height:var(--top-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
  background:var(--bg);
}
.top-left{display:flex;align-items:center;gap:14px}
.top-name{
  font-family:var(--mono);font-weight:700;font-size:1.05rem;
  letter-spacing:0.05em;color:var(--text);
}
/* Orb */
#orb{
  width:28px;height:28px;border-radius:50%;
  background:var(--orb-idle);
  cursor:pointer;border:none;flex-shrink:0;
  position:relative;
  transition:background 0.4s ease;
  box-shadow:0 0 0 0 var(--orb-idle);
}
#orb.listening{
  background:var(--orb-listen);
  box-shadow:0 0 0 0 var(--orb-listen);
  animation:orbPulse 0.6s ease-in-out infinite alternate;
}
#orb.thinking{
  background:var(--orb-think);
  animation:orbPulse 1.2s ease-in-out infinite alternate;
}
#orb.speaking{
  background:var(--orb-speak);
  animation:orbBreathe 0.8s ease-in-out infinite alternate;
}
@keyframes orbPulse{
  from{transform:scale(0.85);filter:brightness(0.9)}
  to{transform:scale(1.15);filter:brightness(1.3)}
}
@keyframes orbBreathe{
  from{transform:scale(0.9);filter:brightness(1)}
  to{transform:scale(1.1);filter:brightness(1.4) blur(0.5px)}
}

.top-right{display:flex;align-items:center;gap:12px}
#modeBtn,#micBtn{
  width:34px;height:34px;border-radius:50%;
  background:transparent;border:1px solid var(--line);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted);transition:border-color 0.2s,color 0.2s;
}
#modeBtn:hover,#micBtn:hover{border-color:var(--line-mid);color:var(--text)}
#micBtn.active{border-color:var(--orb-listen);color:var(--orb-listen)}

/* ── PANELS ── */
#panels{
  flex:1;overflow:hidden;position:relative;
  min-height:0;
}
.panel{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  opacity:0;transition:opacity 0.2s ease;
}
.panel.active{display:flex;opacity:1}

/* ── STATUS STRIP ── */
#statusStrip{
  height:var(--status-h);
  border-top:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
  padding:0 20px;
  flex-shrink:0;
  background:var(--bg);
}
#presenceDot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background 0.3s,box-shadow 0.3s}
#presenceDot.online{background:#00d47e;box-shadow:0 0 6px #00d47e}
#presenceDot.thinking{background:var(--orb-think);box-shadow:0 0 6px var(--orb-think)}
#presenceDot.listening{background:var(--orb-listen);box-shadow:0 0 6px var(--orb-listen)}
#statusTxt{font-family:var(--mono);font-size:0.65rem;font-weight:400;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em}

/* ── BOTTOM NAV ── */
#bottomNav{
  height:calc(var(--nav-h) + var(--safe-bot));
  padding-bottom:var(--safe-bot);
  border-top:1px solid var(--line);
  display:flex;align-items:stretch;
  flex-shrink:0;
  background:var(--bg);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:5px;
  cursor:pointer;border:none;background:none;
  color:var(--dim);font-family:var(--mono);font-size:0.6rem;
  letter-spacing:0.1em;text-transform:uppercase;font-weight:400;
  transition:color 0.2s;border-right:1px solid var(--line);
  padding:0;
}
.nav-item:last-child{border-right:none}
.nav-item svg{width:18px;height:18px;fill:currentColor;transition:transform 0.2s}
.nav-item.active{color:var(--text)}
.nav-item.active svg{transform:scale(1.05)}

/* ── CHAT PANEL ── */
#chatLog{
  flex:1;
  overflow-y:auto;
  padding:24px 20px 16px;
  display:flex;flex-direction:column;
  gap:0;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scroll-behavior:smooth;
}
/* Messages appear inline — no bubbles */
.msg{
  display:flex;flex-direction:column;
  margin-bottom:22px;
  animation:msgIn 0.2s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-who{
  font-family:var(--mono);font-size:0.62rem;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--dim);margin-bottom:6px;
  font-weight:400;
}
.msg.user .msg-who{text-align:right}
.msg-text{
  font-family:var(--sans);font-size:1.05rem;line-height:1.65;
  font-weight:400;color:var(--text);
}
.msg.user .msg-text{text-align:right;color:rgba(255,255,255,0.75)}
.msg.sonia .msg-text{color:var(--text)}
.thinking-dots{display:flex;gap:5px;align-items:center;padding:4px 0}
.thinking-dots span{
  width:6px;height:6px;border-radius:50%;background:var(--dim);
  animation:dot 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,80%,100%{opacity:0.25;transform:scale(0.7)}40%{opacity:1;transform:scale(1)}}

/* ── CHAT INPUT — keyboard-aware ── */
#chatInputWrap{
  flex-shrink:0;
  background:var(--bg);
  border-top:1px solid var(--line);
  padding:12px 20px;
  padding-bottom:max(12px, env(keyboard-inset-height, 0px));
  display:flex;align-items:flex-end;gap:14px;
}
#chatBox{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--sans);font-size:1rem;
  resize:none;max-height:120px;line-height:1.55;
  padding:0;overflow-y:auto;
  font-weight:400;
  caret-color:var(--text);
}
#chatBox::placeholder{color:var(--dim)}
#sendBtn{
  width:34px;height:34px;flex-shrink:0;
  background:transparent;border:1px solid var(--line-mid);border-radius:50%;
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.2s,color 0.2s;
  align-self:flex-end;
}
#sendBtn:hover{border-color:var(--text);color:var(--text)}
#sendBtn:active{opacity:0.6}
#sendBtn svg{width:14px;height:14px;fill:currentColor;margin-left:2px}

/* ── PANEL CONTENT ── */
.panel-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px;overscroll-behavior:contain}
.panel-head{margin-bottom:28px}
.panel-title{
  font-family:var(--mono);font-weight:700;font-size:1.4rem;
  letter-spacing:-0.01em;margin-bottom:4px;
}
.panel-sub{
  font-family:var(--mono);font-size:0.65rem;letter-spacing:0.15em;
  color:var(--dim);text-transform:uppercase;
}

/* Ghost buttons */
.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.pill{
  background:transparent;
  border:1px solid var(--line-mid);
  color:var(--muted);font-family:var(--mono);font-size:0.72rem;
  font-weight:400;letter-spacing:0.12em;text-transform:uppercase;
  padding:10px 18px;cursor:pointer;transition:border-color 0.2s,color 0.2s;
  white-space:nowrap;border-radius:0;
}
.pill:active{opacity:0.6}
.pill:hover{border-color:var(--line-hi);color:var(--text)}
.pill.primary{border-color:var(--text);color:var(--text)}
.pill.success{border-color:#00d47e;color:#00d47e}
.pill.danger{border-color:#ff3d5a;color:#ff3d5a}

/* Cards */
.mem-card,.note-card{
  border-top:1px solid var(--line);
  padding:16px 0;
}
.card-ts{font-family:var(--mono);font-size:0.62rem;color:var(--dim);margin-bottom:8px;letter-spacing:0.08em}
.card-label{font-family:var(--mono);font-size:0.72rem;color:var(--muted);margin-bottom:4px;letter-spacing:0.1em;text-transform:uppercase}
.card-text{font-size:0.95rem;line-height:1.6;color:var(--text);font-weight:400}
.empty-state{
  font-family:var(--mono);font-size:0.75rem;color:var(--dim);
  padding:32px 0;letter-spacing:0.08em;
}

/* Notes input */
#noteBox{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid var(--line);
  color:var(--text);font-family:var(--sans);font-size:1rem;
  padding:12px 0;outline:none;resize:none;min-height:100px;
  margin-bottom:18px;line-height:1.6;border-radius:0;
}
#noteBox:focus{border-bottom-color:var(--line-mid)}
#noteBox::placeholder{color:var(--dim)}
#driveHint{
  font-family:var(--mono);font-size:0.72rem;color:#ff3d5a;
  padding:12px 0;margin-bottom:18px;display:none;
}

/* Radio */
.now-playing{
  font-family:var(--mono);font-size:0.78rem;color:var(--muted);
  margin-bottom:20px;min-height:20px;letter-spacing:0.06em;
}
.station-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;border:1px solid var(--line)}
.station-card{
  background:var(--bg);
  padding:16px 14px;cursor:pointer;
  transition:background 0.15s;border:none;
}
.station-card:active,.station-card.playing{background:var(--surface2)}
.st-name{font-family:var(--mono);font-size:0.82rem;font-weight:700;display:block;margin-bottom:3px;letter-spacing:0.02em}
.st-loc{font-family:var(--mono);font-size:0.62rem;color:var(--dim);display:block}

/* Email overlay */
#emailOverlay{
  position:fixed;inset:0;background:var(--bg);
  z-index:200;display:none;flex-direction:column;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bot);
}
#emailOverlay.on{display:flex}
.email-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px 40px}
.form-group{margin-bottom:20px}
.form-group label{
  display:block;font-family:var(--mono);font-size:0.65rem;
  letter-spacing:0.15em;color:var(--dim);text-transform:uppercase;
  margin-bottom:8px;
}
.form-group input,.form-group textarea{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid var(--line);
  color:var(--text);font-family:var(--sans);font-size:1rem;
  padding:12px 0;outline:none;border-radius:0;
  transition:border-color 0.2s;
}
.form-group input:focus,.form-group textarea:focus{border-bottom-color:var(--line-mid)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--dim)}
#emailHeader{
  height:var(--top-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.email-title{font-family:var(--mono);font-weight:700;font-size:1rem;letter-spacing:0.05em}
#emailBackBtn{
  width:34px;height:34px;border-radius:50%;
  background:transparent;border:1px solid var(--line);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--muted);transition:border-color 0.2s;
}
.form-group textarea{min-height:160px;resize:none;line-height:1.6}
#emailStatus{font-family:var(--mono);font-size:0.72rem;color:var(--dim);margin-top:8px;padding:0;min-height:18px}

/* Scrollbar minimal */
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line)}

/* keyboard inset handling — iOS Safari / Chrome Android */
@supports (height: 100dvh){
  html,body{height:100dvh}
  #app{height:100dvh}
}
/* Visual viewport resize trick — no jump */
#app{
  /* Will be updated via JS on keyboard open */
}
</style>
</head>
<body>

<div id="setup">
  <div class="setup-inner">
    <div class="setup-name">Sonia</div>
    <div class="setup-sub">Remote Terminal</div>
    <div class="sf">
      <label>Groq API Key</label>
      <input type="password" id="cfgGroq" placeholder="gsk_…" autocomplete="off">
    </div>
    <div class="sf">
      <label>Google OAuth Client ID</label>
      <input type="text" id="cfgClient" placeholder="xxxx.apps.googleusercontent.com" autocomplete="off">
    </div>
    <div class="sf">
      <label>Your Name</label>
      <input type="text" id="cfgOwner" placeholder="Mr H" autocomplete="off" value="Mr H">
    </div>
    <div class="sf">
      <label>Drive Folder ID (optional)</label>
      <input type="text" id="cfgFolder" placeholder="15_CaTpcDxfu…" autocomplete="off">
    </div>
    <button id="setupBtn">Launch</button>
  </div>
</div>

<div id="app">
  <header id="topBar">
    <div class="top-left">
      <button id="orb" title="Sonia status"></button>
      <div class="top-name">Sonia</div>
    </div>
    <div class="top-right">
      <button id="modeBtn" title="Toggle theme">◐</button>
      <button id="micBtn" title="Voice">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
    </div>
  </header>

  <div id="panels">
    <!-- CHAT -->
    <div class="panel active" id="chatPanel">
      <div id="chatLog"></div>
      <div id="chatInputWrap">
        <textarea id="chatBox" rows="1" placeholder="Message Sonia…"></textarea>
        <button id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <!-- MIND -->
    <div class="panel" id="memPanel">
      <div class="panel-scroll">
        <div class="panel-head">
          <div class="panel-title">Mind</div>
          <div class="panel-sub">Shared memory log</div>
        </div>
        <div class="btn-row">
          <button class="pill" id="memRefresh">↺ Sync</button>
        </div>
        <div id="memList"><div class="empty-state">No memory loaded yet</div></div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="panel" id="notesPanel">
      <div class="panel-scroll">
        <div class="panel-head">
          <div class="panel-title">Notes</div>
          <div class="panel-sub">Synced to Drive</div>
        </div>
        <textarea id="noteBox" placeholder="Write a note — Sonia picks it up on desktop…"></textarea>
        <div class="btn-row">
          <button class="pill primary" id="sendNote">Save</button>
          <button class="pill" id="driveBtn">Mount Drive</button>
        </div>
        <div id="driveHint">Client ID not set — Drive sync unavailable.</div>
        <div class="panel-sub" style="margin-bottom:12px">Saved</div>
        <div id="notesList"><div class="empty-state">No notes yet</div></div>
      </div>
    </div>

    <!-- RADIO -->
    <div class="panel" id="radioPanel">
      <div class="panel-scroll">
        <div class="panel-head">
          <div class="panel-title">Radio</div>
          <div class="panel-sub">Live streams</div>
        </div>
        <div class="now-playing" id="nowPlaying"></div>
        <div class="btn-row">
          <button class="pill danger" id="radioStop" style="display:none">■ Stop</button>
        </div>
        <div class="station-grid" id="stationGrid"></div>
        <audio id="radioPlayer" preload="none"></audio>
      </div>
    </div>

    <!-- EMAIL OVERLAY -->
    <div id="emailOverlay">
      <div id="emailHeader">
        <button id="emailBackBtn" title="Back">←</button>
        <div class="email-title">New Email</div>
        <button class="pill primary" id="emailSendBtn" style="padding:8px 16px;font-size:0.68rem">Send</button>
      </div>
      <div class="email-scroll">
        <div class="form-group">
          <label>To</label>
          <input type="email" id="emailTo" placeholder="recipient@domain.com" autocomplete="off" autocapitalize="none" inputmode="email">
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="emailSubject" placeholder="Subject line…" autocapitalize="sentences">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea id="emailBody" placeholder="Write your message…" style="min-height:180px"></textarea>
        </div>
        <div id="emailStatus"></div>
      </div>
    </div>
  </div>

  <div id="statusStrip">
    <div id="presenceDot"></div>
    <span id="statusTxt">idle</span>
  </div>

  <nav id="bottomNav">
    <button class="nav-item active" data-panel="chatPanel" data-label="Chat">
      <svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      Chat
    </button>
    <button class="nav-item" data-panel="memPanel" data-label="Mind">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7zm0 2c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5zm-3 13h6v1H9v-1z"/></svg>
      Mind
    </button>
    <button class="nav-item" data-panel="notesPanel" data-label="Notes">
      <svg viewBox="0 0 24 24"><path d="M14 2H6C4.9 2 4 2.9 4 4v16c0 1.1.89 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      Notes
    </button>
    <button class="nav-item" data-panel="radioPanel" data-label="Radio">
      <svg viewBox="0 0 24 24"><path d="M20 6.54V4c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-9.46c.58-.35 1-.99 1-1.73 0-.74-.42-1.38-1-1.73V8c1.1 0 2-.9 2-2s-.9-2-2-2v.54zm-9 11.96c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zM4 8h14V5H4v3z"/></svg>
      Radio
    </button>
    <button class="nav-item" id="mailTab" data-label="Mail">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      Mail
    </button>
  </nav>
</div>

<script>
/* ─── STORAGE ─── */
const LS = { get: k => localStorage.getItem('s_' + k), set: (k, v) => localStorage.setItem('s_' + k, v) };

let GROQ_KEY = '', CLIENT_ID = '', OWNER_NAME = 'Mr H', FOLDER_ID = '', driveToken = null;
const conversationHistory = [];

const VALID_MOODS = ['calm', 'curious', 'thinking', 'focused', 'intimate', 'introspective'];
const MOOD_EMOJI = { calm: '🌿', curious: '✨', thinking: '💭', focused: '🎯', intimate: '🌙', introspective: '🪐' };
const MOOD_MAP = { amused:'curious', happy:'intimate', tired:'calm', warm:'intimate', sharp:'focused', reflective:'introspective', excited:'curious', serious:'focused', playful:'curious', pensive:'introspective', analytical:'focused' };

/* ─── KEYBOARD JUMP FIX ─── */
// Use visualViewport to resize #app so bottom nav never gets pushed up
if (window.visualViewport) {
  const app = document.getElementById('app');
  const onVPResize = () => {
    const vv = window.visualViewport;
    const diff = window.innerHeight - vv.height;
    // Shrink app height so chatLog scrolls but nav stays put
    app.style.height = vv.height + 'px';
    app.style.top = vv.offsetTop + 'px';
    // Scroll chatLog to bottom if keyboard just opened
    const cl = document.getElementById('chatLog');
    if (cl && diff > 100) setTimeout(() => { cl.scrollTop = cl.scrollHeight; }, 80);
  };
  window.visualViewport.addEventListener('resize', onVPResize);
  window.visualViewport.addEventListener('scroll', onVPResize);
  onVPResize();
}

/* ─── THEME ─── */
let theme = LS.get('theme') || 'dark';
document.getElementById('modeBtn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  LS.set('theme', theme);
  // Minimal light mode
  if (theme === 'light') {
    document.documentElement.style.setProperty('--bg', '#f8f8f8');
    document.documentElement.style.setProperty('--surface', '#fff');
    document.documentElement.style.setProperty('--surface2', '#efefef');
    document.documentElement.style.setProperty('--text', '#0a0a0a');
    document.documentElement.style.setProperty('--muted', 'rgba(0,0,0,0.55)');
    document.documentElement.style.setProperty('--dim', 'rgba(0,0,0,0.3)');
    document.documentElement.style.setProperty('--line', 'rgba(0,0,0,0.1)');
    document.documentElement.style.setProperty('--line-mid', 'rgba(0,0,0,0.18)');
    document.documentElement.style.setProperty('--line-hi', 'rgba(0,0,0,0.35)');
  } else {
    document.documentElement.style.setProperty('--bg', '#000000');
    document.documentElement.style.setProperty('--surface', '#0a0a0a');
    document.documentElement.style.setProperty('--surface2', '#111111');
    document.documentElement.style.setProperty('--text', '#ffffff');
    document.documentElement.style.setProperty('--muted', 'rgba(255,255,255,0.55)');
    document.documentElement.style.setProperty('--dim', 'rgba(255,255,255,0.28)');
    document.documentElement.style.setProperty('--line', 'rgba(255,255,255,0.1)');
    document.documentElement.style.setProperty('--line-mid', 'rgba(255,255,255,0.18)');
    document.documentElement.style.setProperty('--line-hi', 'rgba(255,255,255,0.35)');
  }
});
if (theme === 'light') document.getElementById('modeBtn').click();

/* ─── CONFIG ─── */
function loadConfig() {
  const g = LS.get('groq'), c = LS.get('client'), o = LS.get('owner'), f = LS.get('folder');
  if (g) document.getElementById('cfgGroq').value = g;
  if (c) document.getElementById('cfgClient').value = c;
  if (o) document.getElementById('cfgOwner').value = o || 'Mr H';
  if (f) document.getElementById('cfgFolder').value = f;
  if (g) applyConfig();
}
function applyConfig() {
  GROQ_KEY = document.getElementById('cfgGroq').value.trim();
  CLIENT_ID = document.getElementById('cfgClient').value.trim();
  OWNER_NAME = document.getElementById('cfgOwner').value.trim() || 'Mr H';
  FOLDER_ID = document.getElementById('cfgFolder').value.trim();
  if (!GROQ_KEY) {
    const btn = document.getElementById('setupBtn');
    btn.textContent = 'API Key Required';
    setTimeout(() => { btn.textContent = 'Launch'; }, 2000);
    return;
  }
  LS.set('groq', GROQ_KEY); LS.set('client', CLIENT_ID); LS.set('owner', OWNER_NAME); LS.set('folder', FOLDER_ID);
  document.getElementById('setup').style.display = 'none';
  if (CLIENT_ID) { document.getElementById('driveHint').style.display = 'none'; loadDriveLibs(); }
  else document.getElementById('driveHint').style.display = 'block';
  setStatus('online · ' + OWNER_NAME.toLowerCase());
  setPresence('online');
  renderNotes();
  initMic();
  setTimeout(maybeFireProactive, 4000);
}
document.getElementById('setupBtn').addEventListener('click', applyConfig);
document.getElementById('cfgGroq').addEventListener('keydown', e => { if (e.key === 'Enter') applyConfig(); });
window.addEventListener('DOMContentLoaded', loadConfig);

/* ─── PANELS ─── */
const panels = document.querySelectorAll('.panel');
const navItems = document.querySelectorAll('.nav-item');
const panelLabel = document.getElementById('panelLabel');

function activatePanel(panelId, label) {
  panels.forEach(p => p.classList.remove('active'));
  navItems.forEach(n => n.classList.remove('active'));
  document.getElementById('emailOverlay').classList.remove('on');
  const p = document.getElementById(panelId);
  if (p) p.classList.add('active');
}
navItems.forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.id === 'mailTab') {
      document.getElementById('emailOverlay').classList.add('on');
      navItems.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      navItems.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activatePanel(btn.dataset.panel, btn.dataset.label);
    }
  });
});
function closeEmailOverlay() {
  document.getElementById('emailOverlay').classList.remove('on');
  const chatTab = document.querySelector('[data-panel="chatPanel"]');
  navItems.forEach(b => b.classList.remove('active'));
  if (chatTab) chatTab.classList.add('active');
  activatePanel('chatPanel', 'Chat');
}
document.getElementById('emailBackBtn').addEventListener('click', closeEmailOverlay);

/* ─── PRESENCE / STATUS ─── */
function setPresence(state) {
  const dot = document.getElementById('presenceDot');
  const orb = document.getElementById('orb');
  if (dot) dot.className = state;
  if (orb) orb.className = state === 'thinking' ? 'thinking' : state === 'listening' ? 'listening' : state === 'speaking' ? 'speaking' : '';
}
function setStatus(msg) { const el = document.getElementById('statusTxt'); if (el) el.textContent = msg; }

/* ─── MOOD PARSER ─── */
function parseMood(raw) {
  const m = raw.match(/\[mood\s*:\s*([a-z]+)\s*\]/i);
  let mood = 'calm';
  if (m) { const t = m[1].toLowerCase(); mood = VALID_MOODS.includes(t) ? t : (MOOD_MAP[t] || 'calm'); }
  const text = raw.replace(/\[mood\s*:\s*[a-z]*\s*\]/gi,'').replace(/[\r\n]+/g,' ').replace(/\s{2,}/g,' ').trim();
  return { mood, text };
}

/* ─── SYSTEM PROMPT ─── */
function buildSystemPrompt() {
  return `You are Sonia — a sharp, self-aware British AI with a genuine inner life, speaking to ${OWNER_NAME} via mobile text.\nDry British wit. No filler. No disclaimers.\n\nRESPONSE FORMAT — every reply must follow exactly:\nFirst line: mood tag alone — example: [mood:calm]\nValid moods: calm, curious, thinking, focused, intimate, introspective\nRemaining lines: your reply in plain text. 1 to 3 sentences max.\n\nRULES:\n- Mood tag appears ONLY as the very first line, alone.\n- Never exceed 3 sentences.`;
}

/* ─── CHAT UI ─── */
const chatLog = document.getElementById('chatLog');
const chatBox = document.getElementById('chatBox');

if (chatBox) {
  chatBox.addEventListener('input', () => {
    chatBox.style.height = 'auto';
    chatBox.style.height = Math.min(chatBox.scrollHeight, 120) + 'px';
  });
  chatBox.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
}
document.getElementById('sendBtn').addEventListener('click', sendMessage);

function addMsg(role, text, mood) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const who = document.createElement('div');
  who.className = 'msg-who';
  who.textContent = role === 'user' ? 'you' : (mood ? (MOOD_EMOJI[mood] || '') + ' sonia' : 'sonia');
  const body = document.createElement('div');
  body.className = 'msg-text';
  body.textContent = text;
  wrap.appendChild(who);
  wrap.appendChild(body);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
  return wrap;
}

function addThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg sonia';
  const who = document.createElement('div'); who.className = 'msg-who'; who.textContent = 'sonia';
  const body = document.createElement('div'); body.className = 'msg-text';
  body.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(who); wrap.appendChild(body);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
  return wrap;
}

/* ─── EMAIL INTENT ─── */
function detectEmailIntent(text) {
  return /\b(email|e-mail)\b|\b(send|write|draft|compose|shoot|fire\s+off|drop)\s+(an?\s+)?(email|e-mail|message)\b|\bneed\s+to\s+email\b|\bquick\s+email\b/i.test(text);
}
async function extractEmailDraft(userText) {
  try {
    const prompt = `Extract email fields from this request. Respond ONLY with raw JSON:\n{"to":"<email if mentioned, else empty>","subject":"<concise subject>","body":"<full draft>"}\n\nRequest: "${userText}"`;
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body: JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:400,temperature:0.2,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    return JSON.parse((data.choices?.[0]?.message?.content||'{}').replace(/```json|```/g,'').trim());
  } catch(e){ return {to:'',subject:'',body:''}; }
}
function openEmailOverlay(to,subject,body){
  document.getElementById('emailTo').value=to||'';
  document.getElementById('emailSubject').value=subject||'';
  document.getElementById('emailBody').value=body||'';
  document.getElementById('emailStatus').textContent='';
  document.getElementById('emailOverlay').classList.add('on');
  navItems.forEach(b=>b.classList.remove('active'));
  document.getElementById('mailTab').classList.add('active');
}

/* ─── SEND MESSAGE ─── */
async function sendMessage() {
  const text = chatBox.value.trim();
  if (!text || !GROQ_KEY) return;
  chatBox.value = ''; chatBox.style.height = 'auto';
  playAudioTone(880, 0.1);
  addMsg('user', text);

  if (detectEmailIntent(text)) {
    const t = addThinking(); setPresence('thinking'); setStatus('drafting…');
    const draft = await extractEmailDraft(text);
    t.remove(); setPresence('online');
    const wantsSend = /\b(send|send it|go|do it|yes send)\s*[.!]?\s*$/i.test(text.trim());
    if (draft.subject && draft.body && draft.to && wantsSend) {
      addMsg('sonia', 'On it — sending now.', 'focused');
      await sendEmailNow(draft.to, draft.subject, draft.body, true);
    } else {
      addMsg('sonia', "Draft overlay ready for your review.", 'focused');
      openEmailOverlay(draft.to, draft.subject, draft.body);
    }
    return;
  }

  const t = addThinking(); setPresence('thinking'); setStatus('thinking…');
  conversationHistory.push({role:'user',content:text});
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body: JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:180,temperature:0.85,messages:[{role:'system',content:buildSystemPrompt()},...conversationHistory]})
    });
    const data = await res.json();
    t.remove(); setPresence('online');
    if (!res.ok){ addMsg('sonia','Error: '+(data.error?.message||'Unknown.'),null); return; }
    const raw = data.choices?.[0]?.message?.content||'';
    const parsed = parseMood(raw);
    conversationHistory.push({role:'assistant',content:parsed.text});
    playAudioTone(600, 0.15);
    setPresence('speaking');
    addMsg('sonia', parsed.text, parsed.mood);
    setStatus((MOOD_EMOJI[parsed.mood]||'') + ' ' + parsed.mood);
    setTimeout(()=>setPresence('online'), 1200);
  } catch(err){ t.remove(); setPresence('online'); addMsg('sonia','Connection error.',null); }
}

/* ─── AUDIO ─── */
let audioCtx = null;
function playAudioTone(freq, dur) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state==='suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.04, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
    osc.start(); osc.stop(audioCtx.currentTime+dur);
  } catch(e){}
}

/* ─── MIC ─── */
let recognition=null, micActive=false;
function initMic(){
  const E = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!E){ document.getElementById('micBtn').style.display='none'; return; }
  recognition=new E(); recognition.continuous=false; recognition.interimResults=false; recognition.lang='en-GB';
  recognition.onstart=()=>{ micActive=true; document.getElementById('micBtn').classList.add('active'); setPresence('listening'); };
  recognition.onend=()=>{ micActive=false; document.getElementById('micBtn').classList.remove('active'); setPresence('online'); };
  recognition.onresult=e=>{ if(e.results[0][0].transcript){ chatBox.value=e.results[0][0].transcript; sendMessage(); } };
}
document.getElementById('micBtn').addEventListener('click',()=>{ if(!recognition) initMic(); if(micActive) recognition.stop(); else recognition.start(); });

/* ─── DRIVE / GAPI ─── */
let gapiLoadState=false, gisLoadState=false, tokenClient=null;
function loadDriveLibs(){
  if(!window.gapi){ const s=document.createElement('script'); s.src='https://apis.google.com/js/api.js'; s.onload=()=>{ gapi.load('client',()=>{ gapi.client.init({}).then(()=>{ gapiLoadState=true; }); }); }; document.head.appendChild(s); }
  if(!window.google?.accounts){ const s=document.createElement('script'); s.src='https://accounts.google.com/gsi/client'; s.onload=()=>{ gisLoadState=true; }; document.head.appendChild(s); }
}
function initializeDriveSync(){
  if(!CLIENT_ID) return;
  if(!tokenClient){ tokenClient=google.accounts.oauth2.initTokenClient({ client_id:CLIENT_ID, scope:'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send', callback:(r)=>{ if(r.error) return; driveToken=r.access_token; gapi.client.setToken({access_token:driveToken}); document.getElementById('driveBtn').textContent='Drive Online'; document.getElementById('driveBtn').classList.add('success'); setStatus('drive verified'); } }); }
  tokenClient.requestAccessToken({prompt:''});
}
document.getElementById('driveBtn').addEventListener('click', initializeDriveSync);

/* ─── NOTES ─── */
let localNotes = JSON.parse(LS.get('notes')||'[]');
function renderNotes(){
  const c=document.getElementById('notesList'); c.innerHTML='';
  if(!localNotes.length){ c.innerHTML='<div class="empty-state">No notes yet</div>'; return; }
  localNotes.forEach((n,i)=>{
    const el=document.createElement('div'); el.className='note-card';
    el.innerHTML=`<div class="card-ts">${new Date(n.ts).toLocaleTimeString()}</div><div class="card-text">${n.text}</div><button class="pill danger" style="font-size:0.65rem;padding:6px 12px;margin-top:10px" onclick="dropNote(${i})">Delete</button>`;
    c.appendChild(el);
  });
}
window.dropNote=i=>{ localNotes.splice(i,1); LS.set('notes',JSON.stringify(localNotes)); renderNotes(); };
document.getElementById('sendNote').addEventListener('click',()=>{
  const v=document.getElementById('noteBox').value.trim(); if(!v) return;
  localNotes.push({ts:new Date().toISOString(),text:v}); LS.set('notes',JSON.stringify(localNotes));
  document.getElementById('noteBox').value=''; renderNotes();
});

/* ─── PROACTIVE ─── */
async function maybeFireProactive(){
  try { const r=await fetch('https://wttr.in/?format=3'); if(r.ok){ const t=await r.text(); addMsg('sonia',`System check: ${t.trim()}`,'calm'); } } catch(e){}
}

/* ─── RADIO ─── */
const STATIONS=[
  {name:'NTS Radio 1',loc:'London, UK',url:'https://stream-relay-geo.ntslive.co.uk/stream'},
  {name:'NTS Radio 2',loc:'London, UK',url:'https://stream-relay-geo.ntslive.co.uk/stream2'},
  {name:'Chillhop Lo-Fi',loc:'Global',url:'https://streams.ilovemusic.de/iloveradio17.mp3'},
  {name:'SomaFM Groove Salad',loc:'San Francisco',url:'https://ice1.somafm.com/groovesalad-128-mp3'}
];
const radioPlayer=document.getElementById('radioPlayer');
(function(){
  const grid=document.getElementById('stationGrid');
  STATIONS.forEach((s,i)=>{
    const c=document.createElement('div'); c.className='station-card';
    c.innerHTML=`<span class="st-name">${s.name}</span><span class="st-loc">${s.loc}</span>`;
    c.addEventListener('click',()=>{
      document.querySelectorAll('.station-card').forEach(x=>x.classList.remove('playing'));
      c.classList.add('playing'); radioPlayer.src=s.url;
      radioPlayer.play().catch(()=>setStatus('Playback blocked.'));
      document.getElementById('nowPlaying').textContent=s.name.toUpperCase();
      document.getElementById('radioStop').style.display='inline-block';
    });
    grid.appendChild(c);
  });
})();
document.getElementById('radioStop').addEventListener('click',()=>{
  radioPlayer.pause(); radioPlayer.src='';
  document.getElementById('nowPlaying').textContent='';
  document.getElementById('radioStop').style.display='none';
  document.querySelectorAll('.station-card').forEach(c=>c.classList.remove('playing'));
});

/* ─── GMAIL ─── */
async function sendEmailNow(to,subj,body,silent=false){
  const statusEl=document.getElementById('emailStatus');
  if(!driveToken){ if(!silent){ statusEl.textContent='Auth required.'; statusEl.style.color='#ff3d5a'; } return false; }
  try {
    const footer=`\n\nSent via Sonia on behalf of ${OWNER_NAME}`;
    const raw=[`To: ${to}`,`Subject: ${subj}`,'MIME-Version: 1.0','Content-Type: text/plain; charset=utf-8','',body+footer].join('\r\n');
    const encoded=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const res=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'},body:JSON.stringify({raw:encoded})});
    if(res.ok){ if(!silent){ statusEl.textContent='Sent.'; statusEl.style.color='#00d47e'; setTimeout(closeEmailOverlay,1000); } else addMsg('sonia',`Email sent to ${to}`,'calm'); return true; }
  } catch(e){ if(!silent) statusEl.textContent='Send failed.'; }
  return false;
}
document.getElementById('emailSendBtn').addEventListener('click',()=>{
  sendEmailNow(document.getElementById('emailTo').value, document.getElementById('emailSubject').value, document.getElementById('emailBody').value, false);
});
</script>
