<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sonia Remote</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"><style>
*, *::before, *::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#000;
  --surface:#050505;
  --border:rgba(255,255,255,0.1);
  --border-hover:rgba(255,255,255,0.3);
  --text:rgba(255,255,255,0.95);
  --muted:rgba(255,255,255,0.6);
  --dim:rgba(255,255,255,0.35);
  --accent:rgba(255,255,255,0.8);

  --font-mono:'Share Tech Mono', monospace;
  --font-main:'Century Gothic', sans-serif;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

html{
  height:100%;
  overflow:hidden;
}

body{
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:var(--font-main);
}

#app{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px;
  border-bottom:1px solid var(--border);
  min-width:0;
}

#leftHdr{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

#hdr-title{
  font-size:1rem;
  letter-spacing:0.15em;
  white-space:nowrap;
}

#presence{
  width:6px;
  height:6px;
  border-radius:50%;
  background:#00ff88;
  box-shadow:0 0 8px #00ff88;
}

#hdr-mode{
  display:flex;
  gap:4px;
  overflow-x:auto;
  scrollbar-width:none;
}

#hdr-mode::-webkit-scrollbar{
  display:none;
}

.mode-btn{
  background:none;
  border:none;
  color:var(--muted);
  font-family:var(--font-mono);
  font-size:0.65rem;
  letter-spacing:0.08em;
  padding:7px 8px;
  white-space:nowrap;
  border-bottom:1px solid transparent;
}

.mode-btn.active{
  color:#fff;
  border-color:#fff;
}

#panels{
  flex:1;
  position:relative;
  overflow:hidden;
}

.panel{
  position:absolute;
  inset:0;
  display:none;
  flex-direction:column;
}

.panel.active{
  display:flex;
}

#chatLog{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.bubble{
  max-width:90%;
}

.bubble.user{
  align-self:flex-end;
}

.bubble.sonia{
  align-self:flex-start;
}

.bubble-text{
  line-height:1.6;
}

#chatInput{
  display:flex;
  align-items:flex-end;
  gap:10px;
  padding:12px;
  border-top:1px solid var(--border);
}

#chatBox{
  flex:1;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border);
  color:#fff;
  font-family:var(--font-mono);
  padding:8px 0;
  resize:none;
  outline:none;
  max-height:90px;
}

#sendChat,
#micBtn{
  background:none;
  border:none;
  color:var(--muted);
  font-family:var(--font-mono);
}

#radioPanel{
  padding:16px;
  overflow:hidden;
}

.radio-hdr{
  font-family:var(--font-mono);
  margin-bottom:12px;
  color:var(--muted);
}

#radioSearch{
  width:100%;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border);
  color:#fff;
  padding:10px 0;
  margin-bottom:14px;
  font-family:var(--font-mono);
  outline:none;
}

.station-grid{
  flex:1;
  overflow-y:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.station-btn{
  background:#050505;
  border:1px solid var(--border);
  color:#fff;
  padding:12px;
  text-align:left;
  font-family:var(--font-mono);
  font-size:0.7rem;
}

.station-btn.playing{
  border-color:#fff;
  background:rgba(255,255,255,0.06);
}

.st-name{
  display:block;
  margin-bottom:4px;
}

.st-loc{
  display:block;
  color:var(--dim);
  font-size:0.6rem;
}

#radioNowPlaying{
  margin-bottom:12px;
  font-family:var(--font-mono);
  color:var(--muted);
  font-size:0.7rem;
}

#radioStop{
  display:none;
  margin-bottom:14px;
  background:none;
  border:1px solid rgba(255,80,80,0.4);
  color:rgba(255,100,100,0.9);
  padding:8px 12px;
  font-family:var(--font-mono);
}

#radioStop.visible{
  display:inline-block;
}

#statusBar{
  height:30px;
  display:flex;
  align-items:center;
  padding:0 12px;
  border-top:1px solid var(--border);
}

#statusText{
  font-family:var(--font-mono);
  font-size:0.65rem;
  color:var(--dim);
}

@media(max-width:420px){

  .station-grid{
    grid-template-columns:1fr;
  }

  .mode-btn{
    font-size:0.58rem;
    padding:6px;
  }

}
</style></head>
<body><div id="app"><div id="hdr"><div id="leftHdr">
<span id="hdr-title">Sonia</span>
<span id="presence"></span>
</div><div id="hdr-mode">
<button class="mode-btn active" data-panel="chatPanel">CHAT</button>
<button class="mode-btn" data-panel="radioPanel">RADIO</button>
</div></div><div id="panels"><div class="panel active" id="chatPanel"><div id="chatLog"></div><div id="chatInput">
<textarea id="chatBox" placeholder="transmission input"></textarea>
<button id="micBtn">🎙</button>
<button id="sendChat">SEND</button>
</div></div><div class="panel" id="radioPanel"><div class="radio-hdr">BROADCAST INTERFACE</div><div id="radioNowPlaying"></div><button id="radioStop">STOP STREAM</button>

<input type="text" id="radioSearch" placeholder="search stations..."><div class="station-grid" id="stationGrid"></div><audio id="radioPlayer" preload="none"></audio>

</div></div><div id="statusBar">
<span id="statusText">online</span>
</div></div><script>
/* Enhanced Sonia Core with restored functionality + radio favourites */

const LS = {
  get: k => localStorage.getItem('sonia_' + k),
  set: (k,v) => localStorage.setItem('sonia_' + k, v),
  del: k => localStorage.removeItem('sonia_' + k)
};

let favourites = JSON.parse(LS.get('radio_favs') || '[]');

function saveFavs(){
  LS.set('radio_favs', JSON.stringify(favourites));
}

function toggleFavourite(index){
  if(favourites.includes(index)){
    favourites = favourites.filter(i => i !== index);
  } else {
    favourites.push(index);
  }
  saveFavs();
  buildStationGrid();
}

const STATIONS = [
  { name:'Lofi Girl', loc:'France', url:'https://play.streamafrica.net/lofiradio' },
  { name:'Groove Salad', loc:'SomaFM', url:'https://ice2.somafm.com/groovesalad-128-mp3' },
  { name:'Drone Zone', loc:'Ambient', url:'https://ice2.somafm.com/dronezone-128-mp3' },
  { name:'Radio Paradise', loc:'Global', url:'https://stream.radioparadise.com/mp3-128' },
  { name:'Secret Agent', loc:'SomaFM', url:'https://ice2.somafm.com/secretagent-128-mp3' },
  { name:'Deep Space One', loc:'Ambient', url:'https://ice2.somafm.com/deepspaceone-128-mp3' }
];

let currentStation = null;
const radioPlayer = document.getElementById('radioPlayer');
const stationGrid = document.getElementById('stationGrid');
const radioNowPlaying = document.getElementById('radioNowPlaying');

function buildStationGrid(){
  stationGrid.innerHTML = '';

  const ordered = [
    ...favourites.map(i => ({...STATIONS[i], originalIndex:i, fav:true})),
    ...STATIONS.map((s,i)=>({...s, originalIndex:i, fav:false}))
      .filter(s => !favourites.includes(s.originalIndex))
  ];

  ordered.forEach(st => {
    const btn = document.createElement('div');
    btn.className = 'station-btn';

    if(currentStation === st.originalIndex){
      btn.classList.add('playing');
    }

    btn.innerHTML = `
      <div class="station-top">
        <div>
          <span class="st-name">${st.name}</span>
          <span class="st-loc">${st.loc}</span>
        </div>
        <button class="fav-btn">${favourites.includes(st.originalIndex) ? '★' : '☆'}</button>
      </div>
    `;

    btn.addEventListener('click', () => playStation(st.originalIndex));

    btn.querySelector('.fav-btn').addEventListener('click', e => {
      e.stopPropagation();
      toggleFavourite(st.originalIndex);
    });

    stationGrid.appendChild(btn);
  });
}

function playStation(index){
  currentStation = index;
  radioPlayer.src = STATIONS[index].url;
  radioPlayer.play().catch(()=>{});

  radioNowPlaying.textContent = 'NOW PLAYING · ' + STATIONS[index].name;

  buildStationGrid();
}

function stopRadio(){
  radioPlayer.pause();
  radioPlayer.src = '';
  currentStation = null;
  radioNowPlaying.textContent = '';
  buildStationGrid();
}

/* Sonia chat restored */
const chatBox = document.getElementById('chatBox');
const chatLog = document.getElementById('chatLog');

function addBubble(role,text){
  const wrap = document.createElement('div');
  wrap.className = 'bubble ' + role;

  wrap.innerHTML = `
    <div class="bubble-text">${text}</div>
  `;

  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
}

async function askSonia(message){
  addBubble('user', message);

  const thinking = document.createElement('div');
  thinking.className = 'bubble sonia';
  thinking.innerHTML = '<div class="bubble-text">...</div>';
  chatLog.appendChild(thinking);

  try{
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer ' + localStorage.getItem('sonia_groq')
      },
      body: JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages:[
          {
            role:'system',
            content:'You are Sonia, elegant, intelligent, emotionally aware and natural.'
          },
          {
            role:'user',
            content:message
          }
        ],
        temperature:0.9,
        max_tokens:180
      })
    });

    const data = await res.json();
    thinking.remove();

    const reply = data.choices?.[0]?.message?.content || 'Signal interrupted.';

    addBubble('sonia', reply);
  }
  catch(err){
    thinking.remove();
    addBubble('sonia','Connection issue detected.');
  }
}

document.getElementById('sendChat').addEventListener('click', () => {
  const msg = chatBox.value.trim();
  if(!msg) return;

  chatBox.value = '';
  askSonia(msg);
});

chatBox.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    document.getElementById('sendChat').click();
  }
});

buildStationGrid();
</script></body>
</html>
