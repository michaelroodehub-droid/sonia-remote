<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Sonia</title>

<!-- Minimalist Variable Font Setup -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

/* System-Driven Light/Dark Adaptive Theme */
:root {
  --bg: #ffffff;
  --surface: #f8f9fa;
  --border: #eaeaea;
  --text: #111111;
  --text-muted: #767676;
  --bubble-user: #f0f0f0;
  --bubble-sonia: transparent;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b0b0b;
    --surface: #121212;
    --border: #1f1f1f;
    --text: #eeeeee;
    --text-muted: #888888;
    --bubble-user: #222222;
  }
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
}

#viewport {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 20px) 24px;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#header h1 {
  font-weight: 400;
  font-size: 1.15rem;
  letter-spacing: -0.02em;
}

#statusLabel {
  font-size: 0.7rem;
  font-family: var(--mono);
  color: var(--text-muted);
  text-transform: lowercase;
}

/* MEMORY LOG */
#chatLog {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
  padding: 24px 0;
  scrollbar-width: none;
}

#chatLog::-webkit-scrollbar {
  display: none;
}

.msg {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 85%;
  animation: fadeIn 0.2s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user {
  align-self: flex-end;
  align-items: flex-end;
}

.msg.sonia {
  align-self: flex-start;
  align-items: flex-start;
}

.msg-label {
  font-size: 0.65rem;
  font-family: var(--mono);
  color: var(--text-muted);
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  line-height: 1.55;
  font-size: 0.95rem;
  font-weight: 400;
  word-break: break-word;
}

.msg.user .msg-bubble {
  background: var(--bubble-user);
  color: var(--text);
  border-bottom-right-radius: 4px;
}

.msg.sonia .msg-bubble {
  background: var(--bubble-sonia);
  color: var(--text);
  padding-left: 0;
}

/* INPUT COMPONENT */
#inputBar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#chatBox {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 1rem;
  font-family: var(--font);
}

#chatBox::placeholder {
  color: var(--text-muted);
  opacity: 0.6;
}

.actionBtn {
  background: none;
  border: none;
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 8px;
}

.actionBtn:disabled {
  opacity: 0.25;
}

.sys-tag {
  align-self: center;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.02em;
}
</style>
</head>
<body>

<div id="viewport">
  <div id="header">
    <h1>sonia</h1>
    <span id="statusLabel">synced</span>
  </div>

  <div id="chatLog"></div>

  <div id="inputBar">
    <input 
      type="text" 
      id="chatBox" 
      placeholder="write into memory..." 
      autocomplete="off" 
      spellcheck="false"
    >
    <button class="actionBtn" id="sendBtn" disabled>save</button>
  </div>
</div>

<script>
/**
 * OBFUSCATION CONFIGURATION
 * To hide your key, run this in your browser console:
 *   btoa('your_gsk_key_here').split('').reverse().join('')
 * Paste the resulting value into the placeholder below.
 */
const _OBFUSCATED_ = '=YOUR_REVERSED_BASE64_KEY_HERE';

function _RECOVER_() {
  try {
    return atob(_OBFUSCATED_.split('').reverse().join(''));
  } catch(e) {
    return '';
  }
}

const GROQ_KEY = _RECOVER_();

// Memory Local Backup Array for offline/online sync continuity
let localMemory = JSON.parse(localStorage.getItem('sonia_memory')) || [];

const chatLog = document.getElementById('chatLog');
const chatBox = document.getElementById('chatBox');
const sendBtn = document.getElementById('sendBtn');
const statusLabel = document.getElementById('statusLabel');

// Dynamic button state
chatBox.addEventListener('input', () => {
  sendBtn.disabled = !chatBox.value.trim();
});

chatBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && chatBox.value.trim()) {
    commitMemory();
  }
});

sendBtn.addEventListener('click', commitMemory);

function setStatus(text) {
  statusLabel.textContent = text;
}

function renderMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'input' : 'sonia';
  
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chatLog.appendChild(wrap);
  
  requestAnimationFrame(() => {
    chatLog.scrollTop = chatLog.scrollHeight;
  });
}

function renderSystem(text) {
  const div = document.createElement('div');
  div.className = 'sys-tag';
  div.textContent = text;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

// Loads active cloud elements combined with structural local backup
function initMemory() {
  if (localMemory.length === 0) {
    renderMessage('sonia', 'Online. Memory canvas ready.');
  } else {
    localMemory.forEach(item => renderMessage(item.role, item.text));
    renderSystem('local logs parsed');
  }
}

function saveToLocalStorage(role, text) {
  localMemory.push({ role, text });
  localStorage.setItem('sonia_memory', JSON.stringify(localMemory));
}

async function commitMemory() {
  const text = chatBox.value.trim();
  if (!text) return;

  renderMessage('user', text);
  saveToLocalStorage('user', text);
  chatBox.value = '';
  sendBtn.disabled = true;

  if (!GROQ_KEY || GROQ_KEY.includes('YOUR_REVERSED')) {
    setStatus('offline backup');
    renderMessage('sonia', '[Local Save Only] Setup your obfuscated key string to enable Cloud Sync processing.');
    return;
  }

  setStatus('syncing...');

  // Build context payload from latest memory traces
  const contextHistory = localMemory.slice(-6).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.text
  }));

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        messages: [
          { role: 'system', content: 'You are Sonia, a completely minimalistic, elegant text companion.' },
          ...contextHistory
        ],
        temperature: 0.7,
        max_tokens: 150
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || 'Cloud sync skipped.';
    
    renderMessage('sonia', reply);
    saveToLocalStorage('sonia', reply);
    setStatus('synced');
  } catch (err) {
    console.error(err);
    setStatus('cached offline');
    renderMessage('sonia', 'Connection interrupted. Saved safely to internal terminal space.');
  }
}

// Boot Environment
window.addEventListener('load', initMemory);
</script>
</body>
</html>
