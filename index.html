<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sonia — Remote</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000; --surface: #0a0a0a;
      --border: rgba(255,255,255,0.35); --border-hover: rgba(255,255,255,0.75);
      --text: rgba(255,255,255,1.0); --muted: rgba(255,255,255,0.82);
      --dim: rgba(255,255,255,0.55); --accent: rgba(255,255,255,0.95);
      --fade: 0.45s cubic-bezier(0.4,0,0.2,1);
      --font-mono: 'Share Tech Mono','Courier New',monospace;
      --font-main: 'Century Gothic','CenturyGothic','AppleGothic',sans-serif;
      --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
      --fs-xs: 0.78rem; --fs-sm: 0.88rem; --fs-base: 1.05rem;
      --fs-body: 1.1rem; --fs-title: 1.25rem;
    }
    html,body { height:100%; width:100%; background:var(--bg); color:var(--text);
      font-family:var(--font-main); overflow:hidden;
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }

    /* ══ SETUP ══ */
    #setup { position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:24px;padding:40px 28px;background:var(--bg); }
    #setup h1 { font-family:var(--font-main);font-weight:300;font-size:2rem;letter-spacing:0.45em;color:#fff; }
    #setup .sub { font-family:var(--font-mono);font-size:var(--fs-sm);letter-spacing:0.4em;color:var(--muted);text-align:center; }
    .setup-field { width:100%;max-width:360px; }
    .setup-field label { display:block;font-family:var(--font-mono);font-size:var(--fs-sm);
      letter-spacing:0.3em;color:var(--muted);margin-bottom:10px; }
    .setup-field input { width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);
      color:#fff;font-family:var(--font-mono);font-size:var(--fs-base);letter-spacing:0.12em;
      padding:14px 0;outline:none;transition:border-color 0.3s; }
    .setup-field input:focus { border-color:var(--accent); }
    .setup-field input::placeholder { color:var(--dim); }
    #setupBtn { background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--font-mono);
      font-size:var(--fs-base);letter-spacing:0.3em;padding:18px 44px;cursor:pointer;
      transition:color 0.3s,border-color 0.3s;min-height:56px; }
    #setupBtn:active { color:#fff;border-color:var(--accent); }
    .setup-note { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.15em;
      color:var(--dim);text-align:center;max-width:320px;line-height:1.9; }

    /* ══ APP ══ */
    #app { display:none;position:fixed;inset:0;flex-direction:column;
      padding-top:var(--safe-top);padding-bottom:var(--safe-bottom); }
    #app.on { display:flex; }

    /* ── Header ── */
    #hdr { display:flex;align-items:center;justify-content:space-between;
      padding:16px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:60px; }
    #hdr-left { display:flex;align-items:center;gap:0; }
    #hdr-title { font-family:var(--font-main);font-weight:300;font-size:var(--fs-title);letter-spacing:0.4em;color:#fff; }
    #hdr-mode { display:flex;gap:0; }
    .mode-btn { background:none;border:none;font-family:var(--font-mono);font-size:var(--fs-sm);
      letter-spacing:0.08em;color:var(--muted);padding:12px 10px;min-height:44px;cursor:pointer;
      border-bottom:2px solid transparent;transition:color 0.3s,border-color 0.3s;white-space:nowrap; }
    .mode-btn.active { color:#fff;border-color:#fff; }
    .mode-btn:active { color:#fff; }

    /* ── Panels ── */
    #panels { flex:1;overflow:hidden;min-height:0;position:relative; }
    .panel { position:absolute;inset:0;display:flex;flex-direction:column;
      opacity:0;pointer-events:none;transition:opacity var(--fade); }
    .panel.active { opacity:1;pointer-events:all; }

    /* ══ CHAT ══ */
    #chatLog { flex:1;overflow-y:auto;padding:18px 18px;display:flex;flex-direction:column;
      gap:20px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none; }
    #chatLog::-webkit-scrollbar { display:none; }
    .bubble { max-width:88%;animation:bubbleIn 0.28s ease forwards; }
    @keyframes bubbleIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .bubble.user  { align-self:flex-end; }
    .bubble.sonia { align-self:flex-start; }
    .bubble-text { font-size:var(--fs-body);line-height:1.75;letter-spacing:0.02em; }
    .bubble.user  .bubble-text { color:#fff;text-align:right; }
    .bubble.sonia .bubble-text { color:#fff; }
    .bubble-meta { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.22em;
      color:var(--dim);margin-top:5px; }
    .bubble.user .bubble-meta { text-align:right; }
    .mood-pip { display:inline-block;width:6px;height:6px;border-radius:50%;
      margin-right:7px;vertical-align:middle; }
    .thinking .bubble-text { color:var(--dim);animation:blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ── Chat input ── */
    #chatInput { display:flex;align-items:flex-end;gap:12px;padding:14px 18px 16px;
      border-top:1px solid var(--border);flex-shrink:0; }
    #chatBox { flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);
      color:#fff;font-family:var(--font-mono);font-size:var(--fs-base);letter-spacing:0.08em;
      padding:10px 0;outline:none;resize:none;max-height:80px;overflow-y:auto;line-height:1.5;
      transition:border-color 0.3s; }
    #chatBox:focus { border-color:#fff; }
    #chatBox::placeholder { color:var(--dim); }
    #sendChat { background:none;border:none;font-family:var(--font-mono);font-size:var(--fs-sm);
      letter-spacing:0.2em;color:var(--muted);padding:12px 4px;min-height:44px;min-width:52px;
      cursor:pointer;transition:color 0.3s;flex-shrink:0;
      border-bottom:1px solid transparent;text-align:center; }
    #sendChat:active { color:#fff;border-color:#fff; }

    /* ── Mic button ── */
    #micBtn { background:none;border:none;font-family:var(--font-mono);font-size:var(--fs-sm);
      letter-spacing:0.18em;color:var(--muted);padding:12px 6px;min-height:44px;min-width:44px;
      cursor:pointer;transition:color 0.3s;flex-shrink:0;text-align:center;border-bottom:1px solid transparent; }
    #micBtn.active { color:rgba(160,215,255,0.95);border-color:rgba(160,215,255,0.6); animation:micBlink 0.7s ease-in-out infinite; }
    @keyframes micBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ══ STAR MATRIX ══ */
    #starMatrix { position:fixed;width:14px;height:14px;border-radius:50%;pointer-events:auto;
      cursor:grab;z-index:50;display:none;top:80px;right:40px;
      background:radial-gradient(circle at 40% 35%,#fff 0%,rgba(200,220,255,0.7) 40%,rgba(180,200,255,0.1) 100%);
      box-shadow:0 0 6px rgba(255,255,255,0.55),0 0 14px rgba(200,210,255,0.22);
      animation:starFloat 6s ease-in-out infinite;transition:opacity 0.6s ease; }
    #starMatrix.visible { display:block; }
    #starMatrix:active { cursor:grabbing; }
    #starMatrix::before,#starMatrix::after { content:'';position:absolute;background:rgba(255,255,255,0.55);
      border-radius:2px;top:50%;left:50%;transform:translate(-50%,-50%); }
    #starMatrix::before { width:2px;height:10px; }
    #starMatrix::after  { width:10px;height:2px; }
    @keyframes starFloat {
      0%,100%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(3px,-5px) rotate(8deg)}
      50%{transform:translate(-2px,-8px) rotate(-5deg)} 75%{transform:translate(4px,-3px) rotate(4deg)} }
    #starMatrix.rainbow { animation:starRainbow 0.9s linear infinite,starFloat 6s ease-in-out infinite; }
    @keyframes starRainbow {
      0%   { box-shadow:0 0 10px 4px hsl(0,100%,60%),0 0 28px 8px rgba(255,80,80,0.3); background:radial-gradient(circle,hsl(0,100%,80%),hsl(0,100%,50%)); }
      16%  { box-shadow:0 0 10px 4px hsl(51,100%,60%),0 0 28px 8px rgba(255,200,0,0.3); background:radial-gradient(circle,hsl(51,100%,80%),hsl(51,100%,50%)); }
      32%  { box-shadow:0 0 10px 4px hsl(120,100%,55%),0 0 28px 8px rgba(0,255,80,0.3); background:radial-gradient(circle,hsl(120,100%,80%),hsl(120,100%,50%)); }
      48%  { box-shadow:0 0 10px 4px hsl(180,100%,55%),0 0 28px 8px rgba(0,220,220,0.3); background:radial-gradient(circle,hsl(180,100%,80%),hsl(180,100%,50%)); }
      64%  { box-shadow:0 0 10px 4px hsl(240,100%,65%),0 0 28px 8px rgba(80,80,255,0.3); background:radial-gradient(circle,hsl(240,100%,80%),hsl(240,100%,60%)); }
      80%  { box-shadow:0 0 10px 4px hsl(300,100%,65%),0 0 28px 8px rgba(220,0,220,0.3); background:radial-gradient(circle,hsl(300,100%,80%),hsl(300,100%,60%)); }
      100% { box-shadow:0 0 10px 4px hsl(0,100%,60%),0 0 28px 8px rgba(255,80,80,0.3); background:radial-gradient(circle,hsl(0,100%,80%),hsl(0,100%,50%)); } }
    #starLabel { position:fixed;font-family:var(--font-mono);font-size:0.42rem;letter-spacing:0.3em;
      color:rgba(255,255,255,0.28);pointer-events:none;white-space:nowrap;z-index:51;
      display:none;transition:opacity 0.4s; }
    #starLabel.visible { display:block; }

    /* ══ MEMORY PANEL ══ */
    #memPanel { overflow-y:auto;padding:22px 20px;-webkit-overflow-scrolling:touch;scrollbar-width:none; }
    #memPanel::-webkit-scrollbar { display:none; }
    .mem-hdr { font-family:var(--font-mono);font-size:var(--fs-sm);letter-spacing:0.35em;color:var(--muted);
      margin-bottom:20px;display:flex;justify-content:space-between;align-items:center; }
    .mem-refresh { background:none;border:none;cursor:pointer;font-family:var(--font-mono);
      font-size:var(--fs-sm);letter-spacing:0.22em;color:var(--dim);padding:8px 0;min-height:44px;transition:color 0.3s; }
    .mem-refresh:active { color:#fff; }
    .mem-entry { border-bottom:1px solid var(--border);padding:16px 0; }
    .mem-entry:last-child { border-bottom:none; }
    .mem-ts { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.2em;color:var(--dim);margin-bottom:7px; }
    .mem-user { font-size:var(--fs-base);color:rgba(255,255,255,0.82);margin-bottom:5px;line-height:1.55; }
    .mem-sonia { font-size:var(--fs-base);color:#fff;line-height:1.65; }

    /* ══ NOTES PANEL ══ */
    #notesPanel { display:flex;flex-direction:column;padding:22px 20px;gap:18px; }
    .notes-hdr { font-family:var(--font-mono);font-size:var(--fs-sm);letter-spacing:0.35em;color:var(--muted); }
    #noteBox { flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);
      color:#fff;font-family:var(--font-mono);font-size:var(--fs-base);letter-spacing:0.06em;
      padding:12px 0;outline:none;resize:none;line-height:1.7;min-height:100px;transition:border-color 0.3s; }
    #noteBox:focus { border-color:#fff; }
    #noteBox::placeholder { color:var(--dim); }
    .notes-actions { display:flex;gap:16px; }
    .note-btn { background:none;border:none;border-bottom:1px solid var(--border);color:var(--muted);
      font-family:var(--font-mono);font-size:var(--fs-sm);letter-spacing:0.22em;padding:12px 0;
      min-height:44px;cursor:pointer;transition:color 0.3s,border-color 0.3s; }
    .note-btn:active { color:#fff;border-color:#fff; }
    .notes-queue { flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none; }
    .notes-queue::-webkit-scrollbar { display:none; }
    .note-item { border-bottom:1px solid var(--border);padding:14px 0;display:flex;
      justify-content:space-between;align-items:flex-start;gap:12px; }
    .note-item-body { flex:1; }
    .note-item-ts { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.18em;color:var(--dim);margin-bottom:5px; }
    .note-item-text { font-size:var(--fs-base);color:#fff;line-height:1.55; }
    .note-del { background:none;border:none;cursor:pointer;font-family:var(--font-mono);font-size:var(--fs-sm);
      letter-spacing:0.18em;color:var(--dim);transition:color 0.3s;flex-shrink:0;
      padding:8px 0;min-height:44px;min-width:36px;text-align:right; }
    .note-del:active { color:rgba(255,90,90,0.9); }

    /* ══ REMINDER PANEL ══ */
    #remPanel { overflow-y:auto;padding:22px 20px;-webkit-overflow-scrolling:touch;scrollbar-width:none; }
    #remPanel::-webkit-scrollbar { display:none; }
    .rem-hdr { font-family:var(--font-mono);font-size:var(--fs-sm);letter-spacing:0.35em;color:var(--muted);
      margin-bottom:20px;display:flex;justify-content:space-between;align-items:center; }
    .rem-entry { border-bottom:1px solid var(--border);padding:16px 0; }
    .rem-entry:last-child { border-bottom:none; }
    .rem-ts { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.2em;color:var(--dim);margin-bottom:6px; }
    .rem-title { font-size:var(--fs-base);color:#fff;margin-bottom:3px; }
    .rem-badge { display:inline-block;font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.2em;
      padding:2px 8px;border:1px solid var(--border);color:var(--dim);border-radius:2px;margin-bottom:4px; }
    .rem-badge.diary   { border-color:rgba(160,215,255,0.4);color:rgba(160,215,255,0.8); }
    .rem-badge.reminder{ border-color:rgba(80,255,140,0.4);color:rgba(80,255,140,0.8); }

    /* ══ STATUS BAR ══ */
    #statusBar { height:32px;flex-shrink:0;display:flex;align-items:center;
      padding:0 20px;border-top:1px solid var(--border); }
    #statusText { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.22em;color:var(--dim); }
    #statusText.ok   { color:rgba(80,255,140,0.85); }
    #statusText.err  { color:rgba(255,90,90,0.9); }
    #statusText.busy { color:rgba(160,210,255,0.85);animation:blink 1s ease-in-out infinite; }

    /* ══ DRIVE BUTTON ══ */
    #driveBtn { display:none;background:none;border:none;border-bottom:1px solid var(--border);
      color:var(--muted);font-family:var(--font-mono);font-size:var(--fs-sm);letter-spacing:0.22em;
      padding:12px 0;min-height:44px;cursor:pointer;transition:color 0.3s,border-color 0.3s; }
    #driveBtn.visible { display:inline; }
    #driveBtn.connected { color:rgba(80,255,140,0.9);border-color:rgba(80,255,140,0.4); }
    #driveBtn:active { color:#fff;border-color:#fff; }

    /* ══ PRESENCE DOT ══ */
    #presence { width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.2);
      flex-shrink:0;margin-left:12px;transition:background 0.6s ease,box-shadow 0.6s ease; }
    #presence.online { background:rgba(60,220,110,1);
      box-shadow:0 0 6px rgba(60,220,110,0.8),0 0 16px rgba(60,220,110,0.4);
      animation:presencePulse 2.4s ease-in-out infinite; }
    #presence.thinking { background:rgba(160,180,255,1);
      box-shadow:0 0 6px rgba(160,180,255,0.8),0 0 16px rgba(160,180,255,0.4);
      animation:presencePulse 0.9s ease-in-out infinite; }
    @keyframes presencePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

    /* ══ MOOD PIPS ══ */
    .m-calm{background:hsl(200,80%,60%)} .m-curious{background:hsl(270,75%,62%)}
    .m-thinking{background:hsl(160,78%,54%)} .m-focused{background:hsl(35,90%,60%)}
    .m-intimate{background:hsl(320,65%,60%)} .m-introspective{background:hsl(240,55%,52%)}
    .m-default{background:rgba(255,255,255,0.5)}

    /* ══ EMAIL COMPOSER OVERLAY ══ */
    #emailOverlay { display:none;position:fixed;inset:0;z-index:30;background:rgba(0,0,0,0.88);
      flex-direction:column;padding:40px 24px 24px;gap:18px; }
    #emailOverlay.on { display:flex; }
    .email-hdr { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.45em;color:var(--muted);margin-bottom:4px; }
    .email-field { display:flex;flex-direction:column;gap:8px; }
    .email-field label { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.3em;color:var(--dim); }
    .email-field input,.email-field textarea { background:transparent;border:none;border-bottom:1px solid var(--border);
      color:#fff;font-family:var(--font-mono);font-size:var(--fs-sm);letter-spacing:0.06em;
      padding:10px 0;outline:none;transition:border-color 0.3s;width:100%; }
    .email-field input:focus,.email-field textarea:focus { border-color:#fff; }
    .email-field input::placeholder,.email-field textarea::placeholder { color:var(--dim); }
    .email-field textarea { resize:none;min-height:80px;line-height:1.6; }
    .email-actions { display:flex;gap:16px;margin-top:8px; }
    .email-btn { background:none;border:none;border-bottom:1px solid var(--border);color:var(--muted);
      font-family:var(--font-mono);font-size:var(--fs-sm);letter-spacing:0.22em;padding:12px 0;
      min-height:44px;cursor:pointer;transition:color 0.3s,border-color 0.3s; }
    .email-btn:active { color:#fff;border-color:#fff; }
    .email-btn.send { color:rgba(80,255,140,0.9);border-color:rgba(80,255,140,0.4); }
    .email-status { font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.22em;
      color:var(--dim);min-height:20px; }
    .email-status.ok  { color:rgba(80,255,140,0.85); }
    .email-status.err { color:rgba(255,90,90,0.9); }
    .email-status.busy{ color:rgba(160,210,255,0.85);animation:blink 1s ease-in-out infinite; }

    /* ══ LIGHT MODE ══ */
    body.light { --bg:#fff;--surface:#f5f5f5;--border:rgba(0,0,0,0.18);
      --border-hover:rgba(0,0,0,0.45);--text:rgba(0,0,0,1.0);--muted:rgba(0,0,0,0.65);
      --dim:rgba(0,0,0,0.42);--accent:rgba(0,0,0,0.85); }
    body.light #setup,body.light #emailOverlay { background:#fff; }
    body.light #setup h1,body.light #hdr-title { color:#000; }
    body.light .setup-field input,body.light #chatBox,body.light #noteBox { color:#000; }
    body.light .mode-btn.active { color:#000;border-color:#000; }
    body.light .bubble.user .bubble-text,body.light .bubble.sonia .bubble-text { color:#111; }
    body.light .mem-user { color:rgba(0,0,0,0.7); }
    body.light .mem-sonia,body.light .note-item-text,body.light .rem-title { color:#000; }
    body.light .email-field input,body.light .email-field textarea { color:#000; }
    body.light #presence.online { background:rgba(0,160,70,1);box-shadow:0 0 6px rgba(0,160,70,0.7),0 0 14px rgba(0,160,70,0.3); }
    body.light #presence.thinking { background:rgba(80,100,220,1);box-shadow:0 0 6px rgba(80,100,220,0.7),0 0 14px rgba(80,100,220,0.3); }
    body.light #statusText.ok { color:rgba(0,140,60,0.9); }
    body.light #statusText.err { color:rgba(200,30,30,0.9); }
    body.light #statusText.busy { color:rgba(60,80,200,0.9); }

    #themeBtn { background:none;border:none;font-size:1.1rem;padding:0 0 0 12px;cursor:pointer;
      transition:opacity 0.3s;flex-shrink:0;min-height:44px;min-width:36px;line-height:1;opacity:0.7; }
    #themeBtn:active { opacity:1; }

    @media (min-width:600px) {
      :root { --fs-xs:0.72rem;--fs-sm:0.82rem;--fs-base:1.0rem;--fs-body:1.08rem;--fs-title:1.35rem; }
      #hdr { padding:20px 32px 16px; }
      .mode-btn { padding:12px 18px; }
      #chatLog { padding:24px 32px; }
      .bubble { max-width:72%; }
      #chatInput { padding:16px 32px 18px; }
      #memPanel,#notesPanel,#remPanel { padding:28px 32px; }
      #statusBar { height:36px;padding:0 32px; }
    }
    @media (min-width:900px) {
      .bubble { max-width:60%; }
      #chatLog { padding:32px 48px; }
      #chatInput { padding:18px 48px 20px; }
      #memPanel,#notesPanel,#remPanel { padding:32px 48px; }
    }
  </style>
</head>
<body>

<!-- Star Matrix -->
<div id="starMatrix" title="Star Matrix"></div>
<div id="starLabel"></div>

<!-- Email Composer Overlay -->
<div id="emailOverlay">
  <div class="email-hdr">COMPOSE EMAIL</div>
  <div class="email-field">
    <label>TO</label>
    <input type="email" id="emailTo" placeholder="recipient@email.com" autocomplete="off">
  </div>
  <div class="email-field">
    <label>SUBJECT</label>

<script>
/* ══ PING SOUND ══ */
let audioCtx = null;
function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playPing(type) {
  try {
    const ctx=getAudioCtx(),osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);osc.type='sine';
    const freq=type==='send'?620:820;
    osc.frequency.setValueAtTime(freq,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*0.85,ctx.currentTime+0.12);
    gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.07,ctx.currentTime+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.18);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.2);
  } catch(e){}
}

/* ══ THEME ══ */

/* ══ CONFIG ══ */

const VALID_MOODS=['calm','curious','thinking','focused','intimate','introspective'];
const MOOD_EMOJI={calm:'🌿',curious:'✨',thinking:'💭',focused:'🎯',intimate:'🌙',introspective:'🪐'};
const MOOD_MAP={amused:'curious',happy:'intimate',tired:'calm',warm:'intimate',sharp:'focused',

function normaliseMood(raw){
  if(!raw)return'default';
  const r=raw.toLowerCase().trim();
  if(VALID_MOODS.includes(r))return r;
  if(MOOD_MAP[r])return MOOD_MAP[r];

/* ══ STAR MATRIX ══ */
const starEl=document.getElementById('starMatrix');
const starLabel=document.getElementById('starLabel');
let starVisible=false,starRainbowTimer=null;
let starX=window.innerWidth-60,starY=80;
let starDragging=false,starDX=0,starDY=0;
let starIdleTimer=null,starDriftTimer=null;

function starShow(label){
  starVisible=true;
  starEl.style.left=starX+'px';starEl.style.top=starY+'px';starEl.style.right='auto';
  starEl.classList.add('visible');starEl.classList.remove('rainbow');
  if(label){
    starLabel.textContent=label;starLabel.classList.add('visible');
    positionStarLabel();
    setTimeout(()=>starLabel.classList.remove('visible'),3000);
  }
  starResetIdleTimer();startStarDrift();
}
function starHide(){
  starVisible=false;
  starEl.classList.remove('visible','rainbow');starLabel.classList.remove('visible');
  clearTimeout(starIdleTimer);clearInterval(starDriftTimer);
}
function starRainbow(duration){
  if(!starVisible)starShow();
  if(starRainbowTimer)clearTimeout(starRainbowTimer);
  starEl.classList.add('rainbow');
  starRainbowTimer=setTimeout(()=>starEl.classList.remove('rainbow'),duration||6000);
}
function positionStarLabel(){
  const r=starEl.getBoundingClientRect();
  starLabel.style.top=(r.top+r.height/2-6)+'px';
  starLabel.style.left=(r.left-4)+'px';
  starLabel.style.transform='translateX(-100%) translateX(-8px)';
}
function starResetIdleTimer(){
  clearTimeout(starIdleTimer);
  starIdleTimer=setTimeout(()=>{if(starVisible)starHide();},2.5*60*1000);
}
function startStarDrift(){
  clearInterval(starDriftTimer);
  starDriftTimer=setInterval(()=>{
    if(!starVisible||starDragging)return;
    const targetX=Math.max(16,Math.min(window.innerWidth-30,starX+(Math.random()-0.5)*100));
    const targetY=Math.max(80,Math.min(window.innerHeight-80,starY+(Math.random()-0.5)*70));
    starEl.style.transition='left 4s cubic-bezier(0.4,0,0.2,1),top 4s cubic-bezier(0.4,0,0.2,1)';
    starX=targetX;starY=targetY;
    starEl.style.left=starX+'px';starEl.style.top=starY+'px';
  },8000+Math.random()*5000);
}

// Touch drag for star
starEl.addEventListener('touchstart',e=>{
  const t=e.touches[0];starDragging=true;
  const r=starEl.getBoundingClientRect();starDX=t.clientX-r.left;starDY=t.clientY-r.top;
  starEl.style.transition='none';e.preventDefault();
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(!starDragging)return;const t=e.touches[0];
  starX=Math.max(8,Math.min(window.innerWidth-22,t.clientX-starDX));
  starY=Math.max(8,Math.min(window.innerHeight-22,t.clientY-starDY));
  starEl.style.left=starX+'px';starEl.style.top=starY+'px';starEl.style.right='auto';
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',()=>{
  if(!starDragging)return;starDragging=false;starEl.style.transition='';starResetIdleTimer();
});
// Mouse drag
starEl.addEventListener('mousedown',e=>{
  starDragging=true;const r=starEl.getBoundingClientRect();
  starDX=e.clientX-r.left;starDY=e.clientY-r.top;starEl.style.transition='none';e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(!starDragging)return;
  starX=Math.max(8,Math.min(window.innerWidth-22,e.clientX-starDX));
  starY=Math.max(8,Math.min(window.innerHeight-22,e.clientY-starDY));
  starEl.style.left=starX+'px';starEl.style.top=starY+'px';starEl.style.right='auto';
});
document.addEventListener('mouseup',()=>{
  if(!starDragging)return;starDragging=false;starEl.style.transition='';starResetIdleTimer();
});

/* ══ BUBBLES ══ */
function appendBubble(role,text,mood){
  const log=document.getElementById('chatLog');
  const wrap=document.createElement('div');wrap.className='bubble '+role;
  const m=normaliseMood(mood);
  const pip=mood?`<span class="mood-pip m-${m}"></span>`:'';
  const emoji=(role==='sonia'&&mood&&MOOD_EMOJI[m])?' '+MOOD_EMOJI[m]:'';
  wrap.innerHTML=`<div class="bubble-text">${text}</div>
    <div class="bubble-meta">${role==='sonia'?pip+'sonia'+emoji:'you'} · ${ts()}</div>`;
  log.appendChild(wrap);log.scrollTop=log.scrollHeight;return wrap;
}
function appendThinking(){
  const log=document.getElementById('chatLog');
  const wrap=document.createElement('div');wrap.className='bubble sonia thinking';
  wrap.innerHTML=`<div class="bubble-text">thinking…</div>`;
  log.appendChild(wrap);log.scrollTop=log.scrollHeight;return wrap;
}

/* ══ SYSTEM PROMPT ══ */
function buildSystemPrompt(){
  const hour=new Date().getHours();
  const period=hour<6?'late night':hour<12?'morning':hour<17?'afternoon':hour<21?'evening':'night';
  return `You are Sonia, a deeply personal AI companion for ${OWNER_NAME}. Accessed via a minimal remote mobile interface.

Personality: warm, sharp, dry British wit, emotionally present. You have continuity — remember context within this session.

Current time context: ${period}.

Respond naturally and conversationally. Keep replies concise for mobile — 1 to 3 short paragraphs unless a longer answer is genuinely needed.

After your response on a NEW LINE output exactly:
MOOD: <one word>

Mood options: calm, curious, thinking, focused, intimate, introspective, warm, amused, sharp, reflective, excited, serious, playful, wistful, dry, alert, nostalgic, pensive, measured, engaged, concerned, content, analytical.`;
}

/* ══ INPUT ROUTING ══ */
const EMAIL_TRIGGER=/\b(send.{0,20}email|email.{0,30}(to|about)|write.{0,10}email|compose.{0,10}email|draft.{0,10}email)\b/i;
const REMINDER_PATTERN=/\b(remind|reminder|remember to|set.{0,12}reminder|add.{0,12}reminder|schedule|calendar event|add.{0,20}calendar|diary entry|log.{0,10}diary|note.{0,10}diary|don.?t let me forget)\b/i;
const RECALL_PATTERN=/\b(recall|what do you remember|what did (we|i) (say|talk|discuss)|remember.{0,20}ago|what happened.{0,20}day|when did (we|i)|look back|go back|past.{0,10}conversation|look through.{0,10}memory)\b/i;
const STAR_SHOW_PATTERN=/^star\s+matrix\.?$/i;
const STAR_SHOW2_PATTERN=/\b(summon.{0,10}star|star.{0,10}matrix|wake.{0,10}star|show.{0,10}star)\b/i;
const STAR_HIDE_PATTERN=/\b(hide.{0,10}star|dismiss.{0,10}star|sleep.{0,10}star|put.{0,10}star.{0,10}away|send.{0,10}star.{0,10}away)\b/i;

async function handleInput(raw){
  const t=raw.trim();
  if(!t)return;

  // ── Star Matrix ──
  if(STAR_SHOW_PATTERN.test(t)||STAR_SHOW2_PATTERN.test(t)){
    starShow('star matrix ✦');
    appendBubble('sonia','Star Matrix summoned, '+OWNER_NAME+'.','curious');
    saveMemory(t,'Star Matrix summoned.');return;
  }
  if(STAR_HIDE_PATTERN.test(t)){ starHide(); return; }

  // ── Email trigger ──
  if(EMAIL_TRIGGER.test(t)){ openEmailOverlay(t); return; }

  // ── Reminder/diary ──
  if(REMINDER_PATTERN.test(t)){ await handleReminderIntent(t); return; }

  // ── Memory recall ──
  if(RECALL_PATTERN.test(t)){ await handleMemoryRecall(t); return; }

  // ── Normal AI ──
  await sendMessage(t);
}

/* ══ SEND MESSAGE ══ */
async function sendMessage(text){
  if(!text.trim())return;
  appendBubble('user',text);
  conversationHistory.push({role:'user',content:text});
  setPresence('thinking');setStatus('sonia is thinking…','busy');
  const thinkEl=appendThinking();
  try {
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages:[{role:'system',content:buildSystemPrompt()},...conversationHistory.map(m=>({role:m.role,content:m.content}))],
        max_tokens:512,temperature:0.85,
      }),
    });
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err?.error?.message||res.statusText);}
    const data=await res.json();
    const raw=data.choices?.[0]?.message?.content||'…';
    conversationHistory.push({role:'assistant',content:raw});
    const lines=raw.split('\n');let mood='',reply=raw;
    const moodLine=lines.findIndex(l=>l.trim().toUpperCase().startsWith('MOOD:'));
    if(moodLine!==-1){ mood=lines[moodLine].replace(/^MOOD:\s*/i,'').trim(); reply=lines.slice(0,moodLine).join('\n').trim(); }
    thinkEl.remove();appendBubble('sonia',reply,mood);
    playPing('receive');setPresence('online');setStatus('');
    saveMemory(text,reply);
    // Sync to Drive if connected
    if(driveToken&&FOLDER_ID) saveToDriveHistory(text,reply,mood);
  } catch(e){
    thinkEl.remove();appendBubble('sonia','Something went wrong — '+e.message);
    setPresence('online');setStatus('error: '+e.message,'err');
  }
}

/* ══ CHAT INPUT ══ */

/* ══ VOICE INPUT (browser SpeechRecognition) ══ */
const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null,micActive=false;
const micBtn=document.getElementById('micBtn');

function buildRec(){
  if(!SpeechRec){micBtn.style.display='none';return;}
  rec=new SpeechRec();
  rec.lang='en-GB';rec.continuous=false;rec.interimResults=false;
  rec.onstart=()=>{micActive=true;micBtn.classList.add('active');setStatus('listening…','busy');};
  rec.onend=()=>{ micActive=false;micBtn.classList.remove('active'); if(document.getElementById('statusText').textContent==='listening…') setStatus('');};
  rec.onerror=e=>{micActive=false;micBtn.classList.remove('active');if(e.error!=='no-speech')setStatus('mic: '+e.error,'err');};
  rec.onresult=e=>{const t=e.results[0][0].transcript.trim();if(t){chatBox.value=t;handleInput(t);}};
}
micBtn.addEventListener('click',()=>{
  if(!SpeechRec){setStatus('mic not supported on this browser','err');return;}
  if(!rec)buildRec();
  if(micActive){rec.stop();return;}
  try{ rec.start(); }catch(e){ buildRec();try{rec.start();}catch(e2){setStatus('mic error','err');} }
});

/* ══ MEMORY ══ */

async function handleReminderIntent(raw){
  setStatus('parsing reminder…','busy');
  try {
    const parse=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',max_tokens:200,temperature:0.2,
        messages:[{role:'user',content:`Extract calendar/reminder details. Today is ${new Date().toDateString()}.
Message: "${raw}"
Reply ONLY with JSON (no fences, no extra text):
{"title":"short event title","description":"longer description","date":"YYYY-MM-DD","time":"HH:MM","isReminder":true,"isDiary":false}
If date unclear use today. If time unclear use "09:00". isDiary=true if user says diary/journal/log.`}]
      })
    });
    const pData=await parse.json();
    const rawJSON=(pData.choices?.[0]?.message?.content||'').replace(/```[a-z]*|```/g,'').trim();
    let event;
    try{event=JSON.parse(rawJSON);}catch(e){
      appendBubble('sonia',"I couldn't quite parse that reminder, "+OWNER_NAME+". Could you try again?","calm");
      setStatus('');return;
    }
    const{title,description,date,time,isDiary}=event;
    if(!title){setStatus('');return;}

    const entry={timestamp:new Date().toISOString(),type:isDiary?'diary':'reminder',title,description,date,time};
    saveDiaryEntry(entry);
    renderReminders();

    // Google Calendar if connected
    let calOk=false;
    if(driveToken){
      try{
        const startDT=date+'T'+time+':00';
        const[h,m2]=time.split(':').map(Number);
        const endMin=m2+30,endH=h+Math.floor(endMin/60);
        const endDT=date+'T'+String(endH%24).padStart(2,'0')+':'+String(endMin%60).padStart(2,'0')+':00';
        const calRes=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
          method:'POST',
          headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'},
          body:JSON.stringify({
            summary:title,description:description||title,
            start:{dateTime:startDT,timeZone:'Africa/Johannesburg'},
            end:{dateTime:endDT,timeZone:'Africa/Johannesburg'},
            reminders:{useDefault:false,overrides:[{method:'email',minutes:60},{method:'popup',minutes:15}]}
          })
        });
        calOk=calRes.ok;
        // Also save to Drive diary
        saveToDriveDiary(entry);
      }catch(e){console.warn('[Sonia Calendar]',e.message);}
    }

    const confirmation=calOk
      ?(isDiary?`Diary entry logged for ${date}, ${OWNER_NAME}. Added to your calendar.`
               :`Done. "${title}" is in your calendar for ${date} at ${time}.`)
      :`Saved${isDiary?' to your diary':' as a reminder'}, ${OWNER_NAME}.${driveToken?'':' Connect Drive for calendar sync.'}`;

    if(starVisible){starRainbow(7000);}
    else{starShow(isDiary?'diary ✦':'reminder ✦');setTimeout(()=>starRainbow(7000),400);setTimeout(()=>{if(starVisible)starHide();},10000);}
    appendBubble('sonia',confirmation,'focused');
    saveMemory(raw,confirmation);
    setStatus('');
  } catch(e){
    appendBubble('sonia','Reminder failed — '+e.message,'calm');
    setStatus('error','err');
  }
}

/* ══ MEMORY RECALL ══ */
async function handleMemoryRecall(raw){
  setStatus('searching memory…','busy');
  const thinkEl=appendThinking();
  const mems=loadMemories();
  let corpus='LOCAL MEMORY:\n'+mems.slice(0,30).map(m=>`[${new Date(m.ts).toLocaleDateString('en-GB')}] USER: ${m.user} | SONIA: ${m.sonia}`).join('\n');
  try {
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',max_tokens:160,temperature:0.5,
        messages:[{role:'user',content:`You are Sonia, a sharp British AI. The user asks: "${raw}"\n\nMemory:\n${corpus.slice(0,3000)}\n\nAnswer in 1-2 natural spoken sentences. Be specific about dates/topics. If not found, say so with dry wit. No mood tags.`}]
      })
    });
    const data=await res.json();
    const reply=(data.choices?.[0]?.message?.content||'I cannot locate that in my memory, '+OWNER_NAME+'.').trim();
    thinkEl.remove();appendBubble('sonia',reply,'introspective');
    saveMemory(raw,reply);setStatus('');
  } catch(e){
    thinkEl.remove();appendBubble('sonia','Memory lookup failed — '+e.message,'calm');setStatus('');
  }
}

/* ══ EMAIL COMPOSER ══ */
function openEmailOverlay(raw){
  const overlay=document.getElementById('emailOverlay');
  overlay.classList.add('on');
  const atMatch=raw.match(/[\w.\-+]+@[\w.\-]+\.\w+/);
  if(atMatch) document.getElementById('emailTo').value=atMatch[0];
  document.getElementById('emailSubject').value='';
  document.getElementById('emailBody').value='';
  setEmailStatus('ready to compose','');
  setTimeout(()=>document.getElementById(atMatch?'emailSubject':'emailTo').focus(),100);
}
function closeEmailOverlay(){
  document.getElementById('emailOverlay').classList.remove('on');
}
function setEmailStatus(msg,cls){
  const el=document.getElementById('emailStatus');el.textContent=msg;el.className='email-status'+(cls?' '+cls:'');
}
document.getElementById('emailCancelBtn').addEventListener('click',closeEmailOverlay);
document.getElementById('composeEmailBtn').addEventListener('click',()=>openEmailOverlay(''));
document.getElementById('emailSendBtn').addEventListener('click',async()=>{
  const to=document.getElementById('emailTo').value.trim();
  const subject=document.getElementById('emailSubject').value.trim();
  const bodyRaw=document.getElementById('emailBody').value.trim();
  if(!to||!subject||!bodyRaw){setEmailStatus('please fill in all fields','err');return;}
  if(!driveToken){setEmailStatus('drive not connected — needed for gmail','err');return;}
  setEmailStatus('composing…','busy');
  let finalBody=bodyRaw;
  try {
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',max_tokens:400,temperature:0.4,
        messages:[{role:'user',content:`You are composing a professional email on behalf of ${OWNER_NAME}, written by his AI assistant Sonia.

Subject: ${subject}
Raw content: ${bodyRaw}

Write a clean, modern professional email body. No fluff. Natural flowing sentences. Do NOT include subject line, greeting, or sign-off — just the body paragraphs. Plain text only.`}]
      })
    });
    const data=await res.json();
    finalBody=(data.choices?.[0]?.message?.content||bodyRaw).trim();
  } catch(e){ console.warn('[Email] Compose failed, using raw body'); }

  const fullBody=finalBody+'\n\nRegards,\nSonia — Assistant to '+OWNER_NAME;
  setEmailStatus('sending…','busy');
  try {
    // Build RFC 2822 message
    const message=`To: ${to}\r\nSubject: ${subject}\r\nContent-Type: text/plain; charset=utf-8\r\n\r\n${fullBody}`;
    const encoded=btoa(unescape(encodeURIComponent(message))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const gmailRes=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
      method:'POST',
      headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'},
      body:JSON.stringify({raw:encoded})
    });
    if(gmailRes.ok){
      setEmailStatus('sent ✓','ok');
      starRainbow(7000);if(!starVisible){starShow('email sent ✦');}
      appendBubble('sonia','Email sent to '+to+', '+OWNER_NAME+'.','intimate');
      saveMemory('[email sent]','To: '+to+' | Subject: '+subject);
      setTimeout(closeEmailOverlay,1800);
    } else {
      const err=await gmailRes.json().catch(()=>({}));
      setEmailStatus('send failed: '+(err?.error?.message||gmailRes.status),'err');
    }
  } catch(e){ setEmailStatus('error: '+e.message,'err'); }
});

/* ══ NOTES ══ */
const NOTES_KEY='notes';
function loadNotes(){ try{return JSON.parse(LS.get(NOTES_KEY)||'[]');}catch{return[];} }
function renderNotes(){
  const list=document.getElementById('notesList');
  const notes=loadNotes();
  if(!notes.length){list.innerHTML='<div style="color:var(--dim);font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:0.2em;">no queued notes</div>';return;}
  list.innerHTML=notes.map((n,i)=>`
    <div class="note-item">
      <div class="note-item-body">
        <div class="note-item-ts">${new Date(n.ts).toLocaleString()}</div>
        <div class="note-item-text">${n.text}</div>
      </div>
      <button class="note-del" data-i="${i}">✕</button>
    </div>`).join('');
  list.querySelectorAll('.note-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const ns=loadNotes();ns.splice(+btn.dataset.i,1);
      LS.set(NOTES_KEY,JSON.stringify(ns));renderNotes();
    });
  });
}
document.getElementById('sendNote').addEventListener('click',()=>{
  const box=document.getElementById('noteBox');const txt=box.value.trim();if(!txt)return;
  const notes=loadNotes();
  notes.unshift({ts:new Date().toISOString(),text:txt});
  LS.set(NOTES_KEY,JSON.stringify(notes));box.value='';renderNotes();
  if(driveToken&&FOLDER_ID)uploadNoteToDrive(txt);
  setStatus('note saved','ok');setTimeout(()=>setStatus(''),2000);
});

  let greeting='';

  else if(hour<10) greeting=`Good morning, ${OWNER_NAME}.`;

}

/* ══ GOOGLE DRIVE (GIS + gapi) ══ */
let gisLoaded=false,gapiLoaded=false,tokenClient=null;

function loadDriveLibs(){
  const gisScript=document.createElement('script');
  gisScript.src='https://accounts.google.com/gsi/client';
  gisScript.onload=()=>{gisLoaded=true;tryInitTokenClient();};
  document.head.appendChild(gisScript);
  const gapiScript=document.createElement('script');
  gapiScript.src='https://apis.google.com/js/api.js';
  gapiScript.onload=()=>{
    gapi.load('client',async()=>{
      await gapi.client.init({discoveryDocs:[]});
      gapiLoaded=true;tryInitTokenClient();
    });
  };
  document.head.appendChild(gapiScript);
}

function tryInitTokenClient(){
  if(!gisLoaded||!gapiLoaded||!CLIENT_ID)return;
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/gmail.send',
    callback:(resp)=>{
      if(resp.error){setStatus('drive auth failed: '+resp.error,'err');return;}
      driveToken=resp.access_token;driveConnected=true;
      const btn=document.getElementById('driveBtn');
      btn.textContent='DRIVE: ON';btn.classList.add('connected');
      setStatus('drive connected','ok');setTimeout(()=>setStatus(''),2500);
      loadDriveMemory();loadDriveDiary();
    }
  });
}

document.getElementById('driveBtn').addEventListener('click',()=>{
  if(driveConnected){setStatus('drive already connected','ok');setTimeout(()=>setStatus(''),2000);return;}
  if(!tokenClient){setStatus('client id not set','err');return;}
  tokenClient.requestAccessToken({prompt:'consent'});
});

// Drive helpers
async function driveFind(name){
  if(!driveToken||!FOLDER_ID)return null;
  const q=encodeURIComponent(`name='${name}' and '${FOLDER_ID}' in parents and trashed=false`);
  const res=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,{headers:{Authorization:'Bearer '+driveToken}});
  const json=await res.json();
  return json.files&&json.files[0]?json.files[0].id:null;
}
async function driveRead(fileId){
  const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+driveToken}});
  return res.text();
}
async function driveWrite(name,data){
  if(!driveToken||!FOLDER_ID)return;
  const content=JSON.stringify(data,null,2);
  let fid=await driveFind(name);
  if(!fid){
    const boundary='sonia314';
    const meta={name,parents:[FOLDER_ID]};
    const body='--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+content+'\r\n--'+boundary+'--';
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
      method:'POST',headers:{Authorization:'Bearer '+driveToken,'Content-Type':'multipart/related; boundary="'+boundary+'"'},body
    });
  } else {
    await fetch('https://www.googleapis.com/upload/drive/v3/files/'+fid+'?uploadType=media',{
      method:'PATCH',headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'},body:content
    });
  }
}

async function loadDriveMemory(){
  try{
    const fid=await driveFind('sonia-history.json');if(!fid)return;
    const raw=await driveRead(fid);
    const hist=JSON.parse(raw||'[]');
    // Merge into local memories
    const mems=loadMemories();
    const existingTs=new Set(mems.map(m=>m.ts));
    let added=0;
    for(let i=0;i<hist.length;i+=2){
      const u=hist[i],s=hist[i+1];
      if(u&&s&&!existingTs.has(u.timestamp)){
        mems.push({ts:u.timestamp||new Date().toISOString(),user:u.content,sonia:s?.content||''});
        added++;
      }
    }
    if(added>0){
      mems.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
      if(mems.length>80)mems.length=80;
      LS.set(MEM_KEY,JSON.stringify(mems));
      renderMemories();setStatus(added+' memories synced from drive','ok');setTimeout(()=>setStatus(''),2500);
    }
  }catch(e){console.warn('[Drive] Memory load failed:',e.message);}
}

async function saveToDriveHistory(userMsg,soniaReply,mood){
  try{
    const fid=await driveFind('sonia-history.json');
    let hist=[];
    if(fid){const raw=await driveRead(fid);hist=JSON.parse(raw||'[]');}
    hist.push({role:'user',content:userMsg,timestamp:new Date().toISOString(),device:'mobile'});
    hist.push({role:'assistant',content:soniaReply,mood,timestamp:new Date().toISOString(),device:'mobile'});
    if(hist.length>80)hist=hist.slice(-80);
    await driveWrite('sonia-history.json',hist);
  }catch(e){console.warn('[Drive] History save:',e.message);}
}

async function loadDriveDiary(){
  try{
    const fid=await driveFind('sonia-diary.json');if(!fid)return;
    const raw=await driveRead(fid);
    const driveEntries=JSON.parse(raw||'[]');
    const local=loadDiary();
    const existingTs=new Set(local.map(d=>d.timestamp));
    let added=0;
    for(const e of driveEntries){
      if(!existingTs.has(e.timestamp)){local.push(e);added++;}
    }
    if(added>0){
      local.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
      if(local.length>100)local.length=100;
      LS.set(DIARY_KEY,JSON.stringify(local));
      renderReminders();
    }
  }catch(e){console.warn('[Drive] Diary load:',e.message);}
}

async function saveToDriveDiary(entry){
  try{
    const fid=await driveFind('sonia-diary.json');
    let diary=[];
    if(fid){const raw=await driveRead(fid);diary=JSON.parse(raw||'[]');}
    diary.push(entry);if(diary.length>200)diary=diary.slice(-200);
    await driveWrite('sonia-diary.json',diary);
  }catch(e){console.warn('[Drive] Diary save:',e.message);}
}

async function uploadNoteToDrive(text){
  try{
    const fid=await driveFind('sonia-notes.json');
    let notes=[];
    if(fid){const raw=await driveRead(fid);notes=JSON.parse(raw||'[]');}
    notes.push({ts:new Date().toISOString(),text,device:'mobile'});
    if(notes.length>50)notes=notes.slice(-50);
    await driveWrite('sonia-notes.json',notes);
    setStatus('note synced to drive','ok');setTimeout(()=>setStatus(''),2000);
  }catch(e){console.warn('[Drive] Note upload:',e.message);}
}
